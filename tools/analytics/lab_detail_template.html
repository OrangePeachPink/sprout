<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title><!--__TITLE__--> · Sprout Lab</title>
<style>
/*__SPROUT_TOKENS__*/
* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--font-ui);
  padding: 24px; max-width: 1100px; margin-inline: auto; }
.top { display: flex; align-items: baseline; justify-content: space-between; gap: 16px;
  margin-bottom: 16px; }
.top h1 { font-family: var(--font-display); font-size: 24px; margin: 0; overflow-wrap: anywhere; }
.top .eid { color: var(--muted); font-size: 11px; font-family: var(--font-data); margin-top: 2px; }
.back { color: var(--muted); font-size: 13px; text-decoration: none; white-space: nowrap; }
.back:hover { color: var(--leaf); }
.facts { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 4px 14px; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-tile); padding: 12px 16px; margin-bottom: 16px; }
.facts .fk { color: var(--muted); font-size: 11px; text-transform: lowercase; }
.facts .fv { font-family: var(--font-data); font-size: 13px; }
.facts > span { min-width: 0; overflow-wrap: anywhere; }
.facts .fk, .facts .fv { display: block; }
.tracewrap { background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-tile); padding: 12px 14px; margin-bottom: 16px; }
.tracewrap .cap { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
.etrace { width: 100%; height: 220px; display: block; }
.scards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
.scard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-tile);
  padding: 12px 14px; position: relative; overflow: hidden; border-left: 4px solid var(--accent); }
.scard .sid { font-family: var(--font-display); font-weight: 700; font-size: 15px; }
.scard .gpio { color: var(--muted); font-size: 11px; font-family: var(--font-data); font-weight: 400; }
.scard .smeta { margin-top: 8px; display: grid; grid-template-columns: auto 1fr; gap: 2px 10px;
  font-size: 12px; }
.scard .smeta > * { min-width: 0; }
.scard .smeta .k { color: var(--muted); }
.scard .smeta .num { color: var(--ink); font-family: var(--font-data); overflow-wrap: anywhere; }
.empty { color: var(--muted); }
</style>
</head>
<body>
  <div class="top">
    <div>
      <h1><!--__TITLE__--></h1>
      <div class="eid"><!--__EID__--> · isolated experiment capture</div>
    </div>
    <a class="back" href="/lab">← experiments</a>
  </div>
  <div class="facts"><!--__FACTS__--></div>
  <div class="tracewrap">
    <div class="cap">raw trajectory · per probe · higher = drier</div>
    <!--__SVG__-->
  </div>
  <div class="scards"><!--__CARDS__--></div>
</body>
</html>
