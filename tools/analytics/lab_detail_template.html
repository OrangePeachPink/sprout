<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title><!--__TITLE__--> · Sprout Lab</title>
<style>
/*__SPROUT_TOKENS__*/
* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--font-ui);
  padding: 24px; max-width: 1100px; margin-inline: auto; }
.top { display: flex; align-items: baseline; justify-content: space-between; gap: 16px;
  margin-bottom: 16px; }
.top h1 { font-family: var(--font-display); font-size: 24px; margin: 0; overflow-wrap: anywhere; }
.top .eid { color: var(--muted); font-size: 11px; font-family: var(--font-data); margin-top: 2px; }
.back { color: var(--muted); font-size: 13px; text-decoration: none; white-space: nowrap; }
.back:hover { color: var(--leaf); }
.facts { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 4px 14px; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-tile); padding: 12px 16px; margin-bottom: 16px; }
.facts .fk { color: var(--muted); font-size: 11px; text-transform: lowercase; }
.facts .fv { font-family: var(--font-data); font-size: 13px; }
.facts > span { min-width: 0; overflow-wrap: anywhere; }
.facts .fk, .facts .fv { display: block; }
.tracewrap { background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-tile); padding: 12px 14px; margin-bottom: 16px; }
.tracewrap .cap { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
.etrace { width: 100%; height: 250px; display: block; }
/* #325 chart-as-instrument: axes, raw-scale labels, intervention markers */
.etrace .axis { stroke: var(--border); stroke-width: 1; }
.etrace .grid { stroke: var(--border); stroke-width: .5; opacity: .5; }
.etrace .ylab { fill: var(--muted); font-family: var(--font-data); font-size: 10px; text-anchor: end; }
.etrace .xlab { fill: var(--muted); font-family: var(--font-data); font-size: 10px; }
.etrace .axttl { fill: var(--muted); font-size: 10px; }
.etrace .ivmark { stroke: var(--st-dry, #b8860b); stroke-width: 1; stroke-dasharray: 3 3; }
.etrace .ivlab { fill: var(--st-dry, #b8860b); font-size: 10px; }
.chartcap { color: var(--muted); font-size: 11px; margin: 4px 0 0; }
.scards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
.scard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-tile);
  padding: 12px 14px; position: relative; overflow: hidden; border-left: 4px solid var(--accent); }
.scard .sid { font-family: var(--font-display); font-weight: 700; font-size: 15px; }
.scard .gpio { color: var(--muted); font-size: 11px; font-family: var(--font-data); font-weight: 400; }
.scard .smeta { margin-top: 8px; display: grid; grid-template-columns: auto 1fr; gap: 2px 10px;
  font-size: 12px; }
.scard .smeta > * { min-width: 0; }
.scard .smeta .k { color: var(--muted); }
.scard .smeta .num { color: var(--ink); font-family: var(--font-data); overflow-wrap: anywhere; }
.empty { color: var(--muted); }
.notes { background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-tile); padding: 14px 16px; margin-top: 16px; }
.notes .nhead { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
.notes h2 { font-family: var(--font-display); font-size: 16px; margin: 0; }
.notes .saved { color: var(--muted); font-size: 11px; font-family: var(--font-data); }
.notes .nfields { display: grid; gap: 12px; margin-top: 12px; }
.notes label { display: block; }
.notes label > span { display: block; font-family: var(--font-display); font-weight: 600;
  font-size: 11px; text-transform: uppercase; letter-spacing: .1em;
  color: var(--st-predicted); margin-bottom: 5px; }
/* #336: a writing surface — taller default, restrained corners (the pill radius
   clipped text on resize), generous padding so a dragged-larger box reveals text */
.notes textarea { width: 100%; min-height: 96px; resize: vertical; font-family: var(--font-ui);
  font-size: 14px; line-height: 1.5; color: var(--ink); background: var(--bg);
  border: 1px solid var(--border); border-radius: var(--r-control, 8px); padding: 10px 12px; }
.notes textarea:focus { outline: none; border-color: var(--leaf); }
.notes .nactions { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
.notes .nbtn { font-family: var(--font-ui); font-size: 13px; font-weight: 600; color: #fff;
  background: var(--leaf); border: none; border-radius: var(--r-pill, 999px);
  padding: 7px 16px; cursor: pointer; white-space: nowrap; }
.notes .nbtn:disabled { opacity: .6; cursor: default; }
.notes .nhint { color: var(--muted); font-size: 11px; }
.notes .nhint code { font-family: var(--font-data); }
.notes a.nhint { text-decoration: underline; }
.notes .nerr { margin-top: 10px; font-size: 12px; color: var(--st-fault, #c0392b);
  background: color-mix(in srgb, var(--st-fault, #c0392b) 8%, transparent);
  border: 1px solid var(--st-fault, #c0392b); border-radius: 6px; padding: 8px 12px; }
</style>
</head>
<body>
  <div class="top">
    <div>
      <h1><!--__TITLE__--></h1>
      <div class="eid"><!--__EID__--> · isolated experiment capture</div>
    </div>
    <a class="back" href="/lab">← experiments</a>
  </div>
  <div class="facts"><!--__FACTS__--></div>
  <div class="tracewrap">
    <div class="cap">raw trajectory · per probe · higher = drier</div>
    <!--__SVG__-->
  </div>
  <div class="scards"><!--__CARDS__--></div>

  <section class="notes" id="notes" data-eid="<!--__EID__-->">
    <div class="nhead">
      <h2>Lab notes</h2>
      <span class="saved" id="nsaved"><!--__SAVED__--></span>
    </div>
    <div class="nfields">
      <label><span>Hypothesis</span><textarea data-f="hypothesis" rows="4"><!--__HYP__--></textarea></label>
      <label><span>Method</span><textarea data-f="method" rows="4"><!--__MET__--></textarea></label>
      <label><span>Findings</span><textarea data-f="findings" rows="4"><!--__FIN__--></textarea></label>
      <label><span>Conclusion</span><textarea data-f="conclusion" rows="4"><!--__CON__--></textarea></label>
    </div>
    <div class="nactions">
      <button id="nsave" class="nbtn" type="button">Save notes</button>
      <a class="nhint" id="njson" href="/lab/<!--__EID__-->/notes" target="_blank" rel="noopener">view note JSON</a>
      <span class="nhint">writes <code>docs/experiments/<!--__EID__-->.json</code> · commit to back it up</span>
    </div>
    <div class="nerr" id="nerr" hidden></div>
  </section>

  <script>
    (function () {
      // #327: save resilience — never lose typed text to a failed save / stale server.
      var sec = document.getElementById("notes");
      var eid = sec.dataset.eid;
      var btn = document.getElementById("nsave");
      var saved = document.getElementById("nsaved");
      var errEl = document.getElementById("nerr");
      var areas = Array.prototype.slice.call(sec.querySelectorAll("textarea[data-f]"));
      var DRAFT = "sprout-notes-draft-" + eid;

      function readFields() {
        var b = {};
        areas.forEach(function (t) { b[t.dataset.f] = t.value; });
        return b;
      }
      function lsGet(k) { try { return localStorage.getItem(k); } catch (e) { return null; } }
      function lsSet(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }
      function lsDel(k) { try { localStorage.removeItem(k); } catch (e) {} }
      function showErr(msg) { if (errEl) { errEl.textContent = msg; errEl.hidden = false; } }
      function clearErr() { if (errEl) { errEl.hidden = true; errEl.textContent = ""; } }

      // Restore an unsaved draft (e.g. a prior save failed, or the server had restarted)
      var draft = lsGet(DRAFT);
      if (draft) {
        try {
          var d = JSON.parse(draft);
          areas.forEach(function (t) { if (d[t.dataset.f] != null) t.value = d[t.dataset.f]; });
          saved.textContent = "restored unsaved draft — review and Save";
        } catch (e) {}
      }
      // Keep a live draft so typed text survives a crash / restart / accidental reload
      areas.forEach(function (t) {
        t.addEventListener("input", function () { lsSet(DRAFT, JSON.stringify(readFields())); });
      });

      btn.addEventListener("click", function () {
        var body = readFields();
        lsSet(DRAFT, JSON.stringify(body));  // persist before the network call
        clearErr();
        btn.disabled = true;
        btn.textContent = "Saving…";
        fetch("/lab/" + encodeURIComponent(eid) + "/notes", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        })
          .then(function (r) { return r.json().then(function (n) { return { ok: r.ok, n: n }; }); })
          .then(function (res) {
            var n = res.n || {};
            if (res.ok && n.version) {
              saved.textContent = "saved " + (n.path || "") + " · " + (n.saved_at || "") + " · v" + n.version;
              lsDel(DRAFT);  // safely persisted -> drop the local draft
            } else {
              // failure: keep text + draft, show why and where it tried to write
              var where = n.path ? (" — couldn't write " + n.path) : "";
              showErr("save failed: " + (n.error || "unknown error") + where + " · your text is kept; click Save to retry");
              saved.textContent = "unsaved";
            }
          })
          .catch(function (e) {
            showErr("save failed: " + e + " · server may be down; your text is kept — retry when it's back");
            saved.textContent = "unsaved";
          })
          .finally(function () {
            btn.disabled = false;
            btn.textContent = "Save notes";
          });
      });
    })();
  </script>
</body>
</html>
