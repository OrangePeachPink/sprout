<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bench package · Sprout Lab</title>
<style>
/*__SPROUT_TOKENS__*/
* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--font-ui);
  padding: 24px; max-width: 1000px; margin-inline: auto; }
.top { display: flex; align-items: baseline; justify-content: space-between; gap: 16px;
  margin-bottom: 18px; }
.top h1 { font-family: var(--font-display); font-size: 24px; margin: 0;
  overflow-wrap: anywhere; }
.top .sub { color: var(--muted); font-size: 13px; margin-top: 2px; }
.back { color: var(--muted); font-size: 13px; text-decoration: none; white-space: nowrap; }
.back:hover { color: var(--leaf); }
h2 { font-family: var(--font-display); font-size: 15px; margin: 22px 0 8px; }
.purpose { color: var(--ink); font-size: 14px; line-height: 1.5; }
.facts { font-family: var(--font-data); font-size: 13px; border-collapse: collapse; }
.facts td { padding: 3px 14px 3px 0; vertical-align: top; }
.facts td.k { color: var(--muted); white-space: nowrap; }
table.wt { width: 100%; border-collapse: collapse; font-family: var(--font-data);
  font-size: 12px; }
table.wt th, table.wt td { text-align: left; padding: 5px 10px 5px 0;
  border-bottom: 1px solid var(--border); }
table.wt th { color: var(--muted); font-weight: 500; }
.chips { display: flex; flex-wrap: wrap; gap: 5px; }
.lchip { font-size: 11px; font-family: var(--font-data); color: var(--muted);
  background: var(--bg); border: 1px solid var(--border); border-radius: 999px;
  padding: 1px 8px; }
.slices { font-family: var(--font-data); font-size: 12px; color: var(--muted);
  list-style: none; padding: 0; margin: 0; }
.slices li { padding: 2px 0; overflow-wrap: anywhere; }
.note { color: var(--muted); font-size: 13px; }
.benchnotes { margin-top: 8px; display: grid; gap: 10px; }
.benchnotes label { display: block; font-family: var(--font-data); font-size: 12px;
  color: var(--muted); }
.benchnotes textarea { width: 100%; margin-top: 4px; resize: vertical; padding: 8px;
  font-family: var(--font-ui); font-size: 13px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--surface); color: var(--ink); }
.bn-actions { display: flex; align-items: center; gap: 10px; }
#bn-save { font-family: var(--font-ui); font-size: 13px; padding: 6px 14px;
  border-radius: 6px; border: 1px solid var(--leaf); background: var(--leaf);
  color: #fff; cursor: pointer; }
#bn-save:disabled { opacity: .6; cursor: default; }
.tabnav { display: flex; gap: 4px; margin-bottom: var(--space-md); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.tab { font-family: var(--font-ui); font-size: 14px; font-weight: 600; color: var(--muted);
  background: none; border: none; border-bottom: 2px solid transparent; margin-bottom: -1px;
  padding: 9px 16px; cursor: pointer; text-decoration: none; border-radius: var(--r-control) var(--r-control) 0 0; }
.tab:hover { color: var(--ink); background: var(--surface-2); }
.tab.active { color: var(--ink); border-bottom-color: var(--leaf); }
</style>
</head>
<body>
  <!-- #684: the shell's four-tab nav on /lab pages so Lab stays a first-class tab (links, Lab active). -->
  <nav class="tabnav" role="tablist" aria-label="Views">
    <a class="tab" href="/#monitor" role="tab">Monitor</a>
    <a class="tab" href="/#capture" role="tab">Capture</a>
    <a class="tab active" href="/lab" role="tab" aria-selected="true">Lab</a>
    <a class="tab" href="/#diagnostics" role="tab">Diagnostics &amp; Logs</a>
  </nav>
  <div class="top">
    <div>
      <h1>🌱 <!--__TITLE__--></h1>
      <div class="sub"><!--__SUB__--></div>
    </div>
    <div class="topnav"><a class="back" href="/lab">← lab notebook</a></div>
  </div>
  <main><!--__BODY__--></main>
</body>
</html>
