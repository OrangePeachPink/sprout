; PlatformIO project config - plants auto-watering controller
; Board: classic ESP32 dev board (SoC marked ESP-32D / ESP32-D0WD class)
; Reference: https://docs.platformio.org/page/projectconf.html

[platformio]
; LOCAL SECRET OVERRIDE (#1252, ADR-0026). `platformio_local.ini` is GITIGNORED and
; OPTIONAL: if it is absent PlatformIO simply skips it (verified - a missing
; extra_configs file is not an error), so a fresh clone builds with the documented
; Phase-0 placeholder and nothing to set up. When it IS present it overrides the real
; OTA password on BOTH sides from ONE file - the firmware's -D OTA_PASSWORD and the
; uploader's --auth - which is the point: the two MUST match, and a single source is
; what keeps them from drifting into a silent auth failure. Copy
; platformio_local.example.ini to platformio_local.ini and set your own value.
; NEVER commit a real password; the placeholder below is an example, not a secret.
extra_configs = platformio_local.ini
default_envs = esp32dev

[env:esp32dev]
; One exact pin for the whole active matrix (#529, ADR-0024 revised 2026-07-01 by maintainer
; direction on #283) — pre-1.0, no install base, near-zero migration seam (the one IDF4/IDF5
; API break, esp_task_wdt_init, is already dual-path from #499/#502). Was espressif32@7.0.1;
; now the same pioarduino tag esp32c5 already proved, so esp32dev/_env/_wdttest/s3/c5 all
; share ONE toolchain instead of two. Still an exact `==` pin, never floating — reproducibility
; discipline unchanged, just consolidated. Live-logger cutover still gated on the wedge test
; re-passing on this toolchain at the bench (#443) before it drives real hardware.
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.39
board = esp32dev
framework = arduino
monitor_speed = 19200                  ; matches SERIAL_BAUD in include/config.h
; #302 Phase-0 OTA: pin the dual-app OTA layout (app0/app1 + otadata) explicitly.
; esp32dev already defaults to this (app0 = 0x140000, NVS @ 0x9000 unchanged, so the
; minted device_id survives a normal reflash); pinning it GUARANTEES the same OTA
; scheme on esp32c5 (extends this) whose board default is otherwise unverified.
board_build.partitions = default.csv
extra_scripts =
  pre:scripts/git_rev.py               ; injects GIT_REV (commit hash + dirty) at build
  post:scripts/factory_bin.py          ; merges a browser-flashable factory image + ESP Web Tools manifest (#271)
; upload_speed = 921600    ; uncomment if uploads prove reliable at this rate
; lib_deps =               ; add libraries here as the project needs them

; --- Native host unit tests (#260) -----------------------------------------
; Compiles and runs firmware/test/test_irrigation.c on the host (no ESP32,
; no flash). PlatformIO auto-discovers test suites in firmware/test/ and bundles
; the Unity framework — no separate download or system gcc needed.
;   Run:  pio test -e native -d firmware    (or: just test-native)
[env:native]
platform = native
test_framework = unity
build_flags = -std=gnu11 -Wall -Wextra

; --- Watchdog wedge-test build (#191 / #93) ---------------------------------
; The SHIPPING firmware PLUS a guarded `!wedge` command that strands relay ch0 ON
; and then spins forever WITHOUT feeding the task watchdog. It lets the bench prove,
; on real hardware, that (1) a hung loop resets the chip within WDT_TIMEOUT_MS and
; (2) the reboot's allRelaysOff() leaves the stranded relay de-energized - i.e. a
; fault can never strand a pump on (#93). Identical to esp32dev except the guard.
;   Flash it:  pio run -e esp32dev_wdttest -t upload
; NEVER ship this env - `!wedge` only exists when WDT_WEDGE_TEST is defined.
[env:esp32dev_wdttest]
extends = env:esp32dev
build_flags = -D WDT_WEDGE_TEST

; --- Bench contextual env-sensor build (#373 / #374) -----------------------
; The shipping firmware PLUS the optional I2C/Qwiic contextual sensors — SHT45
; ambient temp/RH + AS7263 NIR spectral — compiled in via -D ENABLE_ENV_SENSORS.
; BENCH INSTRUMENTATION for sensor characterization (raw context, not plant data,
; breadboard-mounted near the ESP32). The default esp32dev build pulls none of it.
;   Flash it when the sensors are wired:  pio run -e esp32dev_env -t upload
[env:esp32dev_env]
extends = env:esp32dev
build_flags = -D ENABLE_ENV_SENSORS

; --- OTA upload path (#302 Phase-0) ----------------------------------------
; SAME firmware as esp32dev - only the UPLOAD transport differs: espota over WiFi
; instead of esptool over USB. Drive it with `just ota <device_id>`. LAN-only,
; password-gated (the OTA_PASSWORD the image was built with; the Phase-0 placeholder
; below matches include/config.h's default - a real password moves to a gitignored
; local config with the ADR-0026 fence). Known limits: a DEAD or NEW/unprovisioned
; board has no OTA receiver yet -> flash those WIRED.
[env:esp32dev_ota]
extends = env:esp32dev
upload_protocol = espota
upload_flags = --auth=sprout-phase0

; === ADDITIONAL BOARD TARGETS (multi-board support, #436) ===================
; PRE-WORK SCAFFOLD. The classic `esp32dev` above is the KNOWN BASELINE — unchanged.
; These build the SAME firmware but are NOT flash-ready: config.h's pins (soil
; 36/39/34/35, relays 25/26/27/32) + the env I2C (21/22) are CLASSIC-SPECIFIC.
; See docs/hardware/BOARDS.md — bench-verify every pin before flashing a real board.
;
; `default_envs = esp32dev` above means CI's `just build` (= `pio run`, no -e flag)
; only ever processes esp32dev, regardless of what other [env:] sections exist below
; — verified directly (`pio run` unscoped: "Processing esp32dev" only, nothing else
; touched). So esp32s3 and esp32c5 (both wired below) can stay UNCOMMENTED without
; costing the default build path anything. Both now share esp32dev's ONE pioarduino
; pin (#529, ADR-0024 revised) — no separate toolchain fetch for either. Both are
; still compile-checked (non-blocking) in CI — see the "experimental boards" job in
; ci.yml — because neither board is bench-verified yet (#443); the toolchain being
; shared and the board being hardware-proven are separate axes.

; --- ESP32-S3 (Amazon "DevKitC N8R2"-style; verify the module marking) -------
; Same pin as esp32dev (inherited via `extends`). Pins come from board_capability.h's
; S3 entry (#436) - PROVISIONAL, from docs/hardware/BOARDS.md's candidate map. Do NOT
; flash until bench-verified (#443).
[env:esp32s3]
extends = env:esp32dev
board = esp32-s3-devkitc-1   ; module marking N8R2 (8MB flash + 2MB PSRAM, esptool-confirmed 2026-07-03). Board def is the N8 variant (PSRAM unmapped); Sprout uses no PSRAM so kept deliberately - revisit if a feature needs it (#443).
; Serial over the NATIVE USB port (USB-Serial/JTAG). Board default is ARDUINO_USB_MODE=1
; (HW CDC/JTAG); this flag routes Arduino Serial to it so telemetry comes out the native port.
; Forced by hardware on the lab s3-n8r2-01: its CH343 UART-bridge port died at the bench
; (2026-07-03, #443) - the native port is the only working path. Also the simpler untethered
; path (one fewer chip in the chain). A bridge-equipped S3 can drop this flag if ever needed.
build_flags = -D ARDUINO_USB_CDC_ON_BOOT=1

; --- ESP32-C5 (Amazon 3-pack; CH340, 4MB, 32-pin) ---------------------------
; Same pin as esp32dev now too (#529) — no explicit `platform =` override needed here
; anymore; this was the isolated pin the rest of the matrix has since joined (ADR-0024
; revised 2026-07-01). `extends = env:esp32dev` alone carries it.
;
; C5 pin map is REAL now (was PLACEHOLDER): board_capability.h's CONFIG_IDF_TARGET_ESP32C5
; entry (#436/#443) carries valid C5 GPIOs — soil {1,4,5,6}, relay {0,8,9,10} — and config.h
; sources pins from BOARD_CAP, so `-e esp32c5` compiles the valid map, not the classic
; placeholder. FLASH-VERIFIED 2026-07-09: the official deployed C5 was reflashed and runs on
; it (sensors reading on gpio 1/4/5, WiFi + OTA good). The one remaining caveat is CALIBRATION
; only — cal_verified=false, so its moisture BANDS stay provisional (raw is real) until the
; C5's bench characterization (#443). A data caveat, NOT a do-not-flash. Build / flash:
;   just build-c5                                       # compile
;   pio run -e esp32c5 -t upload --upload-port <COMx>   # flash (native USB port is driverless)
;
; Board id `esp32-c5-devkitc-1` — confirmed against the bench board (#442).
[env:esp32c5]
extends = env:esp32dev
board = esp32-c5-devkitc-1

; --- C5 RECOVERY flash profile (bench, flaky CH340/USB-JTAG auto-reset) ---------
; For a C5 whose auto-reset won't hold download mode: LATCH download mode by hand
; (hold BOOT, tap RESET, release), then flash with this env. --before no-reset (esptool v5
; hyphen form; matches the flag below) tells
; esptool to NOT reset the chip (so it stays in the latched bootloader), and --no-stub
; uses the ROM loader (sidesteps the USB-Serial/JTAG "start stub flasher" bug). No
; sustained button-hold needed. Slower, but reliable.  just build-c5 / manual upload.
[env:esp32c5_recover]
extends = env:esp32c5
upload_flags =
    --no-stub
    --before
    no-reset

; --- C5 OTA profile (espota over WiFi, #302 Phase-0) ----------------------------
; Push a build to a RUNNING C5 by IP/hostname (no USB). Auth = the Phase-0
; OTA_PASSWORD.  pio run -e esp32c5_ota -t upload --upload-port <ip | sprout-<id>.local>
;
; MULTI-HOMED HOST GOTCHA: if espota reports "No response from device" AFTER a
; successful auth, your PC advertised the wrong callback interface, so the board
; couldn't connect back to pull the image. Fix: pin YOUR PC's LAN IP by appending
;   --host_ip=<YOUR_LAN_IP>       e.g.  --host_ip=192.168.1.42
; to upload_flags below (or pass it at invoke time). Left out here so the env isn't
; tied to one machine; the 2026-07-06 proof run pinned the maintainer's LAN IP.
;
; ...BUT IF YOU PASS IT VIA THE ENVIRONMENT, TWO BEHAVIORS BITE TOGETHER (#1225,
; 2026-07-19 bench). PLATFORMIO_UPLOAD_FLAGS is NOT a convenient shortcut here:
;   1. It *REPLACES* the upload_flags below - it does NOT merge with them. Whatever
;      you set must repeat --auth=... itself, or the password is simply gone.
;   2. PlatformIO splits multi-value env vars on NEWLINES, not spaces. A space-joined
;      value reaches espota as ONE argv token, so the board ends up checking the
;      literal password  sprout-phase0 --host_ip=<ip>  instead of the password.
; FINGERPRINT: the espota invitation SUCCEEDS, then authentication fails
; deterministically on BOTH PBKDF2-HMAC-SHA256 and MD5. That reads like "the board
; rejected us" while the board is perfectly healthy and reachable - the password was
; malformed before it ever left the host.
;   WRONG:  PLATFORMIO_UPLOAD_FLAGS="--auth=sprout-phase0 --host_ip=192.168.1.42"
;   RIGHT:  PLATFORMIO_UPLOAD_FLAGS=$'--auth=sprout-phase0\n--host_ip=192.168.1.42'
; Simplest of all: leave the env var alone and edit upload_flags below.
[env:esp32c5_ota]
extends = env:esp32c5
upload_protocol = espota
upload_flags =
    --auth=sprout-phase0

; --- S3 OTA profile (espota over WiFi, #302 Phase-0) -----------------------------
; Same as esp32c5_ota, for the S3. The multi-homed --host_ip gotcha applies (see the
; esp32c5_ota note above): if espota reports "No response from device" AFTER a successful
; auth, append your PC's LAN IP  --host_ip=<YOUR_LAN_IP>  to upload_flags below. Left out
; so the env isn't machine-tied; the 2026-07-08 S3 OTA proof run pinned the maintainer's IP.
[env:esp32s3_ota]
extends = env:esp32s3
upload_protocol = espota
upload_flags =
    --auth=sprout-phase0
