; PlatformIO project config - plants auto-watering controller
; Board: classic ESP32 dev board (SoC marked ESP-32D / ESP32-D0WD class)
; Reference: https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32dev

[env:esp32dev]
; One exact pin for the whole active matrix (#529, ADR-0024 revised 2026-07-01 by maintainer
; direction on #283) — pre-1.0, no install base, near-zero migration seam (the one IDF4/IDF5
; API break, esp_task_wdt_init, is already dual-path from #499/#502). Was espressif32@7.0.1;
; now the same pioarduino tag esp32c5 already proved, so esp32dev/_env/_wdttest/s3/c5 all
; share ONE toolchain instead of two. Still an exact `==` pin, never floating — reproducibility
; discipline unchanged, just consolidated. Live-logger cutover still gated on the wedge test
; re-passing on this toolchain at the bench (#443) before it drives real hardware.
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.39
board = esp32dev
framework = arduino
monitor_speed = 19200                  ; matches SERIAL_BAUD in include/config.h
extra_scripts =
  pre:scripts/git_rev.py               ; injects GIT_REV (commit hash + dirty) at build
  post:scripts/factory_bin.py          ; merges a browser-flashable factory image + ESP Web Tools manifest (#271)
; upload_speed = 921600    ; uncomment if uploads prove reliable at this rate
; lib_deps =               ; add libraries here as the project needs them

; --- Native host unit tests (#260) -----------------------------------------
; Compiles and runs firmware/test/test_irrigation.c on the host (no ESP32,
; no flash). PlatformIO auto-discovers test suites in firmware/test/ and bundles
; the Unity framework — no separate download or system gcc needed.
;   Run:  pio test -e native -d firmware    (or: just test-native)
[env:native]
platform = native
test_framework = unity
build_flags = -std=gnu11 -Wall -Wextra

; --- Watchdog wedge-test build (#191 / #93) ---------------------------------
; The SHIPPING firmware PLUS a guarded `!wedge` command that strands relay ch0 ON
; and then spins forever WITHOUT feeding the task watchdog. It lets the bench prove,
; on real hardware, that (1) a hung loop resets the chip within WDT_TIMEOUT_MS and
; (2) the reboot's allRelaysOff() leaves the stranded relay de-energized - i.e. a
; fault can never strand a pump on (#93). Identical to esp32dev except the guard.
;   Flash it:  pio run -e esp32dev_wdttest -t upload
; NEVER ship this env - `!wedge` only exists when WDT_WEDGE_TEST is defined.
[env:esp32dev_wdttest]
extends = env:esp32dev
build_flags = -D WDT_WEDGE_TEST

; --- Bench contextual env-sensor build (#373 / #374) -----------------------
; The shipping firmware PLUS the optional I2C/Qwiic contextual sensors — SHT45
; ambient temp/RH + AS7263 NIR spectral — compiled in via -D ENABLE_ENV_SENSORS.
; BENCH INSTRUMENTATION for sensor characterization (raw context, not plant-truth,
; breadboard-mounted near the ESP32). The default esp32dev build pulls none of it.
;   Flash it when the sensors are wired:  pio run -e esp32dev_env -t upload
[env:esp32dev_env]
extends = env:esp32dev
build_flags = -D ENABLE_ENV_SENSORS

; === ADDITIONAL BOARD TARGETS (multi-board support, #436) ===================
; PRE-WORK SCAFFOLD. The classic `esp32dev` above is the KNOWN BASELINE — unchanged.
; These build the SAME firmware but are NOT flash-ready: config.h's pins (soil
; 36/39/34/35, relays 25/26/27/32) + the env I2C (21/22) are CLASSIC-SPECIFIC.
; See docs/hardware/BOARDS.md — bench-verify every pin before flashing a real board.
;
; `default_envs = esp32dev` above means CI's `just build` (= `pio run`, no -e flag)
; only ever processes esp32dev, regardless of what other [env:] sections exist below
; — verified directly (`pio run` unscoped: "Processing esp32dev" only, nothing else
; touched). So esp32s3 and esp32c5 (both wired below) can stay UNCOMMENTED without
; costing the default build path anything. Both now share esp32dev's ONE pioarduino
; pin (#529, ADR-0024 revised) — no separate toolchain fetch for either. Both are
; still compile-checked (non-blocking) in CI — see the "experimental boards" job in
; ci.yml — because neither board is bench-verified yet (#443); the toolchain being
; shared and the board being hardware-proven are separate axes.

; --- ESP32-S3 (Amazon "DevKitC N8R2"-style; verify the module marking) -------
; Same pin as esp32dev (inherited via `extends`). Pins come from board_capability.h's
; S3 entry (#436) - PROVISIONAL, from docs/hardware/BOARDS.md's candidate map. Do NOT
; flash until bench-verified (#443).
[env:esp32s3]
extends = env:esp32dev
board = esp32-s3-devkitc-1   ; module marking N8R2 (8MB flash + 2MB PSRAM, esptool-confirmed 2026-07-03). Board def is the N8 variant (PSRAM unmapped); Sprout uses no PSRAM so kept deliberately - revisit if a feature needs it (#443).
; Serial over the NATIVE USB port (USB-Serial/JTAG). Board default is ARDUINO_USB_MODE=1
; (HW CDC/JTAG); this flag routes Arduino Serial to it so telemetry comes out the native port.
; Forced by hardware on the lab s3-n8r2-01: its CH343 UART-bridge port died at the bench
; (2026-07-03, #443) - the native port is the only working path. Also the simpler untethered
; path (one fewer chip in the chain). A bridge-equipped S3 can drop this flag if ever needed.
build_flags = -D ARDUINO_USB_CDC_ON_BOOT=1

; --- ESP32-C5 (Amazon 3-pack; CH340, 4MB, 32-pin) ---------------------------
; Same pin as esp32dev now too (#529) — no explicit `platform =` override needed here
; anymore; this was the isolated pin the rest of the matrix has since joined (ADR-0024
; revised 2026-07-01). `extends = env:esp32dev` alone carries it.
;
; Pins are still PLACEHOLDER (classic map) — do NOT flash to a C5 until #436's
; board-conditional pin map lands + is bench-verified (BOARDS.md leaves the C5
; pin map intentionally blank pending bench work). Opt-in / Contributors-Welcome
; build — a non-blocking CI dry-run compile-checks it on every PR (never gates the
; required check); build it locally:
;   just build-c5
;
; Board id `esp32-c5-devkitc-1` confirmed present in the fork's board defs via web
; research; Firmware, please confirm/correct against the bench board (#442).
[env:esp32c5]
extends = env:esp32dev
board = esp32-c5-devkitc-1
