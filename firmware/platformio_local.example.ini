; platformio_local.example.ini — TEMPLATE for the gitignored per-machine override
; ---------------------------------------------------------------------------------------
; Copy to `platformio_local.ini` (same folder) if you need machine-specific build settings:
;
;     cp platformio_local.example.ini platformio_local.ini
;
; `platformio_local.ini` is GITIGNORED. The file is OPTIONAL — if it is absent PlatformIO
; simply skips it, so a fresh clone builds, tests, and flashes with zero setup. Nothing here
; is required to build or contribute.
;
; #1340: this file used to carry the OTA password for the espota PUSH receiver. That receiver
; and its password are RETIRED — WiFi updates are signed PULL only, so there is no shared
; secret to provision on either side. An existing local file with `-D OTA_PASSWORD` still
; builds fine: the define is simply unused and does not reach the image (verified). You can
; delete that line whenever convenient.
;
; NEVER commit secrets here or in the copy.
; ---------------------------------------------------------------------------------------

; --- example: a per-machine build flag -------------------------------------------------
; esp32dev has no build_flags of its own, so anything set here is inherited by every env
; that `extends = env:esp32dev` WITHOUT redefining build_flags.
;
; [env:esp32dev]
; build_flags = -D SOME_LOCAL_FLAG

; CAUTION — envs that define their own `build_flags` REPLACE the inherited ones rather than
; merging, so they do NOT pick up a line set above. If you build one of these, repeat your
; flag alongside that env's own:
;
; [env:esp32s3]
; build_flags = -D ARDUINO_USB_CDC_ON_BOOT=1 -D SOME_LOCAL_FLAG
;
; [env:esp32dev_env]
; build_flags = -D ENABLE_ENV_SENSORS -D SOME_LOCAL_FLAG
