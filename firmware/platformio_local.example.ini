; platformio_local.example.ini — TEMPLATE for the gitignored local secret override (#1252)
; ---------------------------------------------------------------------------------------
; Copy to `platformio_local.ini` (same folder) and set YOUR value:
;
;     cp platformio_local.example.ini platformio_local.ini
;
; `platformio_local.ini` is GITIGNORED — never commit it, and never put a real password in
; THIS example file. The file is OPTIONAL: if it is absent, PlatformIO skips it and the build
; falls back to the documented Phase-0 placeholder in include/config.h, so a fresh clone works
; with zero setup. Nothing here is required to build, test, or contribute.
;
; WHY ONE FILE DRIVES BOTH SIDES. The OTA password exists in two places that MUST match:
;   * the FIRMWARE image  — `-D OTA_PASSWORD` (compiled in; what the board will accept)
;   * the UPLOADER        — `--auth=` (what espota presents)
; If they disagree the flash fails with `Authentication Failed` on BOTH hash schemes while the
; espota invitation still succeeds — a confusing signature that reads like a rejecting board
; when the board is perfectly healthy (see docs/OTA_FLASH.md). Setting both from this single
; file is what prevents that drift. Change the value in one place, change it in all of them.
;
; ROTATION: changing the value here only affects the NEXT build. A board keeps accepting its
; OLD password until it is re-flashed with the new image — so rotate by flashing every board
; in the fleet (ideally in one coordinated bundle), then verify each one answers.
;
; ---------------------------------------------------------------------------------------

; --- firmware side: compiled into the image -------------------------------------------
; esp32dev has no build_flags of its own, so this is inherited by every env that
; `extends = env:esp32dev` WITHOUT redefining build_flags — which covers the live fleet
; (esp32dev, esp32dev_ota, esp32c5, esp32c5_ota).
[env:esp32dev]
build_flags = -D OTA_PASSWORD='"CHANGE-ME-LOCALLY"'

; CAUTION — envs that define their own `build_flags` REPLACE the inherited ones rather than
; merging, so they do NOT pick up the line above. If you ever build/flash one of these, repeat
; the -D here alongside that env's own flag. (None of these are in the deployed fleet today.)
;
; [env:esp32s3]
; build_flags = -D ARDUINO_USB_CDC_ON_BOOT=1 -D OTA_PASSWORD='"CHANGE-ME-LOCALLY"'
;
; [env:esp32dev_env]
; build_flags = -D ENABLE_ENV_SENSORS -D OTA_PASSWORD='"CHANGE-ME-LOCALLY"'

; --- uploader side: what espota presents ----------------------------------------------
; Must equal the value compiled in above. One OTA env per board class.
[env:esp32dev_ota]
upload_flags = --auth=CHANGE-ME-LOCALLY

[env:esp32c5_ota]
upload_flags = --auth=CHANGE-ME-LOCALLY

; [env:esp32s3_ota]
; upload_flags = --auth=CHANGE-ME-LOCALLY
