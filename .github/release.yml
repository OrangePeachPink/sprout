# Categorizes auto-generated GitHub Release notes by `type:` label (ADR-0009 §6).
# `type:chore` is intentionally excluded from notes — git history is its record.
changelog:
  exclude:
    labels:
      - type:chore
  categories:
    - title: "✨ Features"
      labels:
        - type:feat
    - title: "🐛 Bug fixes"
      labels:
        - type:fix
    - title: "♻️ Refactors"
      labels:
        - type:refactor
    - title: "📖 Documentation"
      labels:
        - type:docs
    - title: "🔧 Other changes"
      labels:
        - "*"
