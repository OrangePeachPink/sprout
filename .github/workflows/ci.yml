name: CI

# The pre-merge gate (#89): one fast job that runs the SAME checks you run locally
# (`just check` = `pre-commit run --all-files` + `just test`), so CI and your machine
# never drift. Right-sized per ADR-0002 #12 — deliberately NOT here: coverage gates,
# mypy, SBOM, security scanners, multi-OS matrices. Add one only when a real need shows up.

on:
  pull_request:
  push:
    branches: [main]

# One run per ref; a newer push cancels the in-flight run (no wasted minutes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only needs to read the code.
permissions:
  contents: read

jobs:
  check:
    name: lint + tests
    runs-on: ubuntu-latest
    steps:
      # Full history so the changed-scope clang-format step (#120) can diff against
      # the PR base / the previous main commit.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv (+ the locked Python)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up just
        uses: extractions/setup-just@v2

      - name: Sync the locked environment
        run: uv sync

      # PlatformIO — needed for native unit tests (pio test -e native) and the
      # ESP32 compile-verify (pio run -e esp32dev). Cached by platformio.ini hash
      # so re-installs only when the toolchain config changes.
      - name: Install PlatformIO
        run: pip install platformio

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      # Cache the npm download store so the pinned npx tools (markdownlint-cli2 +
      # cspell — see .pre-commit-config.yaml) aren't re-fetched every run. Keyed on the
      # hook config so it busts the moment a tool version bumps; restored BEFORE the
      # lint step below. Pure speedup — changes nothing about which checks run (#468).
      - name: Cache npx tooling (markdownlint / cspell)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npx-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: npx-${{ runner.os }}-

      # The single definition of lint/format/hygiene — identical to a local commit.
      # clang-format is SKIPped here: it is the one check scoped to changed files, not
      # --all-files (the firmware's manual column alignment must survive a full-tree
      # sweep — AGENTS.md §code-style, #120, ADR-0002 #10). It runs changed-scope next.
      - name: Lint + format + hygiene (pre-commit; clang-format runs changed-scope below)
        run: SKIP=clang-format uv run pre-commit run --all-files --show-diff-on-failure

      # clang-format — ONLY the C/C++ *lines* this PR changed (never whole files,
      # never the whole tree) — #352. Diffs against the PR merge-base (the blocking
      # authority, Trellis sign-off). Same wrapper + pinned clang-format==22.1.5 as
      # local commits + `just lint-fw`, so local == CI.
      - name: clang-format (changed LINES vs merge-base — #352)
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          [ -z "$base" ] && base="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
          mb="$(git merge-base "$base" HEAD)"
          uv run python tools/clang_format_changed_lines.py --base "$mb" --check

      - name: Tests — native C firmware logic + host Python
        run: just test

      # Compile the ESP32 firmware so regressions in src/ are caught before flash.
      # Runs after tests so a fast logic failure surfaces first. (#260)
      - name: Compile firmware (ESP32 — catch src/ regressions)
        run: just build
