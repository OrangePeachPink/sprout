name: CI

# The pre-merge gate (#89, parallelized #472; restored for the public repo #905): the SAME
# checks you run locally (`just check`), so CI and your machine never drift — split into
# concurrent jobs so wall-clock is max(job), not sum(steps). NOTHING is skipped or
# path-filtered on the required path — every check runs on every PR (#466: a skipped
# required check reading as green is the exact onboarding-safety surprise this repo
# closed on purpose, ADR-0002 #12). The #740 slim sprint posture (private phase,
# minutes-constrained) was reverted here: the repo is public, GitHub-hosted minutes are
# free for public repos, and a contributor must never find CI isn't actually running
# (maintainer directive, 2026-07-10). weekly-battery.yml stays as the scheduled backstop.
# Right-sized per ADR-0002 #12 — deliberately NOT here: coverage gates, mypy, SBOM,
# security scanners, multi-OS matrices. Add one only when a real need shows up.

on:
  pull_request:
  push:
    branches: [main]

# One run per ref; a newer push cancels the in-flight run (no wasted minutes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only needs to read the code.
permissions:
  contents: read

# #1346 (maintainer ruling: 6.1.19 everywhere): pin PlatformIO so CI compiles with the
# SAME toolchain the release and Pages paths use. A release built with a different
# PlatformIO than the one CI proved is a gap the pinned ref can't close on its own.
# Must match sign-release.yml and pages.yml.
env:
  PIO_VERSION: "6.1.19"

jobs:
  # Host lint/format/hygiene + the changed-lines firmware format check — no PlatformIO,
  # so this stays fast (~1 min with warm caches).
  lint:
    name: lint + hygiene
    runs-on: ubuntu-latest
    steps:
      # Full history so the changed-lines clang-format step (#352) can diff against
      # the PR merge-base / the previous main commit.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Set up uv (+ the locked Python)
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
          version: "0.11.14"   # pin uv (#254) — kills cross-version uv.lock re-serialization

      - name: Set up just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Sync the locked environment
        run: uv sync --locked   # assert uv.lock is current; fail loud, never rewrite it (#254)

      # Cache the npm download store so the pinned npx tools (markdownlint-cli2 +
      # cspell — see .pre-commit-config.yaml) aren't re-fetched every run. Keyed on the
      # hook config so it busts the moment a tool version bumps. Pure speedup — changes
      # nothing about which checks run (#468).
      - name: Cache npx tooling (markdownlint / cspell)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.npm
          key: npx-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: npx-${{ runner.os }}-

      # The single definition of lint/format/hygiene — identical to a local commit.
      # clang-format is SKIPped here: it is the one check scoped to changed LINES, not
      # --all-files (the firmware's manual column alignment must survive — AGENTS.md
      # §code-style, changed-lines via git-clang-format, #352). It runs next, below.
      - name: Lint + format + hygiene (pre-commit; clang-format runs changed-lines below)
        run: |
          set -o pipefail
          SKIP=clang-format uv run pre-commit run --all-files --show-diff-on-failure 2>&1 \
            | tee /tmp/precommit.log

      # #1190: the per-hook readout — every hook's result as a table on the run's
      # Summary page (the maintainer's drift-watch: ~15 hooks otherwise hide behind
      # this job's single ✓). Parses whatever pre-commit ACTUALLY ran, so it is
      # self-maintaining — a new hook appears here the day it joins the config, and
      # there is no second list to drift. The pytest suites below need no rows: each
      # is already its own named step. cspell's advisory notes get a count line so
      # the signal stays visible without being load-bearing (#524 posture).
      - name: Job summary — per-hook results (#1190)
        if: always()
        run: |
          {
            echo "### Pre-commit battery — per-hook results"
            echo ""
            echo "| Hook | Result |"
            echo "|---|---|"
            sed -nE 's/^(.+[^.])\.{4,}(\(no files to check\))?(Passed|Failed|Skipped)$/| \1 | \3\2 |/p' \
              /tmp/precommit.log
            n=$(grep -c "Unknown word" /tmp/precommit.log || true)
            echo ""
            echo "_cspell advisory notes: ${n} (never blocking — #524)_"
          } >> "$GITHUB_STEP_SUMMARY"

      # clang-format — ONLY the C/C++ *lines* this PR changed (never whole files, never
      # the whole tree) — #352. Diffs against the PR merge-base (the blocking authority,
      # Trellis sign-off). This needs only the pinned clang-format wheel (in the uv env
      # via pyproject.toml), NOT the PlatformIO toolchain.
      - name: clang-format (changed LINES vs merge-base — #352)
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          [ -z "$base" ] && base="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
          mb="$(git merge-base "$base" HEAD)"
          uv run python tools/clang_format_changed_lines.py --base "$mb" --check

      - name: Tests — host Python
        run: just test-host

      # The full host-side suite (no PlatformIO needed): DX tooling + analytics were
      # local-gate-only under the #740 posture (justfile: "CI runs test-host only") —
      # public posture runs everything a contributor's PR can break (#905, #884).
      - name: Tests — DX tooling
        run: just test-dx

      - name: Tests — analytics
        run: just test-analytics

      # Warn-only release-notes hygiene (#730): PR titles become release-notes lines,
      # grouped by `type:` label (ADR-0009 §6) — a missing type: label or placeholder
      # title silently makes bad notes. Rides this job (zero extra runner spend);
      # never fails the build.
      - name: Release-notes hygiene — PR title + type label (warn-only)
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          case ",$PR_LABELS," in
            *,type:*) : ;;
            *) echo "::warning title=No type label::This PR has no type:* label - it lands in the release notes uncategorized (ADR-0009 §6). Add type:feat/fix/docs/refactor/chore." ;;
          esac
          if [ "${#PR_TITLE}" -lt 20 ] || echo "$PR_TITLE" | grep -Eqi '^(wip|fix|update|changes|misc|test)[[:punct:]]*$'; then
            echo "::warning title=Title is release-notes copy::'$PR_TITLE' will appear verbatim in the auto-generated release notes - consider a fuller, self-explanatory title."
          fi

  # PlatformIO: native-C firmware-logic tests + the ESP32 compile-verify. Isolated in
  # its own job so its toolchain install/cache never blocks (or is blocked by) lint.
  firmware:
    name: firmware (native tests + compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Set up uv (+ the locked Python)
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
          version: "0.11.14"   # pin uv (#254) — kills cross-version uv.lock re-serialization

      - name: Set up just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Sync the locked environment
        run: uv sync --locked   # assert uv.lock is current; fail loud, never rewrite it (#254)

      # PlatformIO — needed for native unit tests (pio test -e native) and the
      # ESP32 compile-verify (pio run -e esp32dev). Cached by platformio.ini hash
      # so re-installs only when the toolchain config changes.
      - name: Install PlatformIO
        run: pip install --quiet "platformio==${PIO_VERSION}"

      - name: Cache PlatformIO packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Tests — native C firmware logic
        run: just test-native

      # Compile the ESP32 firmware so regressions in src/ are caught before flash. (#260)
      - name: Compile firmware (ESP32 — catch src/ regressions)
        run: just build

  # Experimental board compile-checks (#436 S3, #442 C5) — deliberately NOT in `gate`'s
  # needs, so a toolchain break here (community fork, unproven pins) can NEVER red the
  # required check (ADR-0024: "an experimental toolchain break stays contained").
  # Visible on every PR, blocking nothing — the dry-run Firmware asked for on #442 so
  # this class of break surfaces before hardware instead of only at someone's next
  # local `just build-s3`/`build-c5`.
  #
  # NON-BLOCKING = EVERY STEP, not just the compile (#1439). The green-reporting design
  # (#504/#546) uses step-level continue-on-error so the JOB's own check reports success
  # (a green badge, matching the "non-blocking" name) rather than job-level, which shows a
  # red X. The defect #1439 fixes: continue-on-error was on the COMPILE step ONLY, so any
  # OTHER step failing (uv sync, pip install, a cache miss) still red the job — and reds
  # main. The job name promised non-blocking; the wiring delivered it for one step. So
  # EVERY step here is continue-on-error: the job can never fail whatever breaks, and
  # test_experimental_nonblocking.py asserts that invariant so a newly-added step can't
  # silently reintroduce the hole (it broke *because* nothing tested it — #546 regressed).
  experimental-boards:
    name: experimental board (${{ matrix.env }}) — non-blocking
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [esp32s3, esp32c5]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        continue-on-error: true

      - name: Set up uv (+ the locked Python)
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        continue-on-error: true
        with:
          enable-cache: true
          version: "0.11.14"   # pin uv (#254) — kills cross-version uv.lock re-serialization

      - name: Set up just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
        continue-on-error: true

      - name: Sync the locked environment
        continue-on-error: true
        run: uv sync --locked   # assert uv.lock is current; fail loud, never rewrite it (#254)

      - name: Install PlatformIO
        continue-on-error: true
        run: pip install --quiet "platformio==${PIO_VERSION}"

      - name: Cache PlatformIO packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        continue-on-error: true
        with:
          path: ~/.platformio
          key: pio-experimental-${{ matrix.env }}-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: pio-experimental-${{ matrix.env }}-${{ runner.os }}-

      # Same underlying command as `just build-s3` / `just build-c5` locally (just
      # wraps `pio run -d firmware -e <env>`) — called directly here so the matrix
      # env name maps straight through without a fragile string transform in YAML.
      - name: Compile-check (${{ matrix.env }})
        id: compile
        continue-on-error: true
        run: pio run -d firmware -e ${{ matrix.env }}

      # always() so it reports even if an earlier step was the thing that broke; a
      # non-success compile (failed OR skipped-because-env-broke) surfaces as a warning.
      - name: Surface a non-blocking failure
        if: always() && steps.compile.outcome != 'success'
        continue-on-error: true
        run: |
          echo "::warning title=Experimental board build failed (non-blocking)::${{ matrix.env }} did not build clean on the pinned toolchain. This never blocks merge (ADR-0024) - see the steps above for the real error, then fix or file it."

  # The single required status check (#472/#466): passes only if BOTH upstream jobs
  # succeeded. Splitting into two jobs changes their names, so branch protection is
  # re-pointed at this one job — "gate" always exists and never silently reads as green
  # from a skip (there is no path-filtering anywhere in this workflow to skip).
  # experimental-boards is intentionally OUTSIDE this gate's `needs` — see its own
  # comment above.
  gate:
    name: gate
    needs: [lint, firmware]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: All required jobs passed
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || [ "${{ needs.firmware.result }}" != "success" ]; then
            echo "lint=${{ needs.lint.result }}  firmware=${{ needs.firmware.result }}"
            exit 1
          fi
