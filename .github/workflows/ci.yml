name: CI

# Right-sized gate (issue #89): lint + the tests we already have — green-or-not, fast.
# CI runs the SAME `just` recipes you run locally, so your machine and CI never drift.
#
# Deliberately NOT here (the over-engineering trap, per ADR-0002 #12): coverage gates,
# mypy, SBOM, security scanners, multi-OS matrices. Add one only when a real need shows up.

on:
  pull_request:
  push:
    branches: [main]

# One run per ref; a newer push cancels the in-flight run (no wasted minutes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only needs to read the code.
permissions:
  contents: read

jobs:
  check:
    name: lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up just (the repo runner)
        uses: extractions/setup-just@v2

      - name: Install Python deps (ruff + the host-test runtime)
        run: python -m pip install --upgrade ruff pyserial

      - name: Lint — ruff (just lint)
        run: just lint

      - name: Lint — markdown (repo .markdownlint-cli2.jsonc)
        run: npx --yes markdownlint-cli2

      - name: Tests — native C firmware logic + host Python (just test)
        run: just test
