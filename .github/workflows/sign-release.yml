name: sign release firmware (#302)

# Build the board-aware factory bins (classic + C5, firmware/scripts/factory_bin.py) and
# SIGN each with the release signing key (ed25519, ADR-0026 Decision 2), then attach
# <bin> + <bin>.sig to the release WHILE IT IS STILL A DRAFT. A future pull-OTA (#302) +
# the web-flasher verify against the committed public key (firmware/keys/).
#
# ATTACH AT DRAFT TIME, NOT AFTER PUBLISH (#1438). Immutable releases (#1406) lock a
# release's assets at publish, so `gh release upload` on a published release is refused
# (HTTP 422 — it took v0.8.0 down live). The two protections are each correct alone; the
# fix is sequence: sign into the draft, then the maintainer's Publish click seals it
# immutable *with* its assets. Because the tag does not exist until publish, we build the
# draft's `target_commitish` (the commit that becomes the tag), not the tag ref.
#
# CEREMONY (the automated path can't self-trigger — GITHUB_TOKEN-created drafts don't fire
# `release: created`, the recursion guard): the drafter (release-draft.yml) prints the exact
# dispatch command in its success notice. Run it on the draft BEFORE publishing:
#   gh workflow run sign-release.yml -f tag=vX.Y.Z
# A human-created draft DOES fire `release: created`, so that path auto-signs.
#
# FAILS CLOSED on the SPROUT_SIGNING_KEY secret (#1346): no key -> no release. A warning in
# a green log is not a gate. Run the key ceremony first: docs/process/signing-key-ceremony.md
#
# INTEGRITY INVARIANTS (#1346), each one load-bearing:
#   * builds the EXACT commit the tag will point at (the draft's target_commitish) - the
#     version label is true by construction, not by whatever HEAD was at publish time;
#   * uploads WITHOUT --clobber - a release artifact is written once and never overwritten;
#   * actions pinned to full SHAs and PlatformIO to an exact version - a re-run builds the
#     same way it did the first time.

on:
  release:
    types: [created] # a DRAFT firing point; published is too late to attach (#1438)
  workflow_dispatch:
    inputs:
      tag:
        description: "Draft release tag to build + sign (e.g. v0.8.1)"
        required: true
        type: string

permissions:
  contents: write # attach draft-release assets

# #1346 (maintainer ruling: 6.1.19 everywhere) — same declaration shape as ci.yml,
# pages.yml and weekly-battery.yml, so `grep PIO_VERSION .github/workflows/` shows the
# whole fleet and a bump is the same one-line edit in every file.
env:
  PIO_VERSION: "6.1.19"

jobs:
  sign:
    name: build + sign factory bins
    runs-on: ubuntu-latest
    steps:
      # Resolve the release BEFORE anything else, and gate on draft: only a draft can
      # accept assets (#1438). A published release is immutable — skip loud, don't fail,
      # because "already published" is a legitimate no-op, not a broken run.
      - name: Resolve the draft release
        id: rel
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          tag="${EVENT_TAG:-$INPUT_TAG}"
          [ -n "$tag" ] || { echo "::error title=No tag::nothing to build - no release tag and no dispatch input."; exit 1; }
          draft="$(gh release view "$tag" --json isDraft -q .isDraft 2>/dev/null || echo missing)"
          if [ "$draft" = "missing" ]; then
            echo "::error title=No such release::$tag has no release. Draft it first (release-draft.yml), then dispatch this."; exit 1
          fi
          if [ "$draft" != "true" ]; then
            echo "::notice title=Already published::$tag is published and immutable - assets can only be attached while it is a draft (#1438). Nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          commitish="$(gh release view "$tag" --json targetCommitish -q .targetCommitish)"
          [ -n "$commitish" ] || { echo "::error title=No target::$tag draft has no target_commitish to build."; exit 1; }
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "commitish=$commitish" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      # Fail closed BEFORE the build, not after: no key means no release, so spending ~5
      # minutes compiling first would only delay the same answer.
      - name: Require the signing key
        if: steps.rel.outputs.skip != 'true'
        # Via env, never inlined into the command: `${{ secrets.X }}` in a run: line puts the
        # key itself in the shell command. Presence is all we test here.
        env:
          SIGNING_KEY: ${{ secrets.SPROUT_SIGNING_KEY }}
        run: |
          if [ -z "$SIGNING_KEY" ]; then
            echo "::error title=No signing key::SPROUT_SIGNING_KEY is not set, so this release cannot be signed - and an unsigned release is not one we publish (#1346). Run docs/process/signing-key-ceremony.md, add the secret, then re-run this job."
            exit 1
          fi

      # The commit the tag WILL point at (the draft's target_commitish), not the tag ref —
      # the tag does not exist until publish (#1438). This preserves #1346's exact-ref
      # promise: what we sign is exactly what the published tag will name.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        if: steps.rel.outputs.skip != 'true'
        with:
          ref: ${{ steps.rel.outputs.commitish }}

      # Requesting the ref fixes the bug; PROVING it keeps the claim checkable, not trusted
      # (#1346). We compare HEAD to the independently-resolved target_commitish rather than
      # to a tag (which is not created yet).
      - name: Confirm the checkout IS the draft's target commit
        id: prov
        if: steps.rel.outputs.skip != 'true'
        env:
          COMMITISH: ${{ steps.rel.outputs.commitish }}
        run: |
          sha="$(git rev-parse HEAD)"
          target="$(git rev-parse --verify --quiet "${COMMITISH}^{commit}" || true)"
          if [ -z "$target" ]; then
            echo "::error title=Cannot prove the ref::target_commitish '$COMMITISH' did not resolve to a commit. Refusing rather than assuming."
            exit 1
          fi
          if [ "$sha" != "$target" ]; then
            echo "::error title=Ref mismatch::HEAD ($sha) is not the draft target ($target)."
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        if: steps.rel.outputs.skip != 'true'
        with:
          python-version: "3.12"

      # Pinned so a re-run of an old tag builds with the same toolchain it shipped with.
      - name: Install PlatformIO
        if: steps.rel.outputs.skip != 'true'
        run: pip install --quiet "platformio==${PIO_VERSION}"

      - name: Build board-aware factory bins (classic + C5)
        if: steps.rel.outputs.skip != 'true'
        working-directory: firmware
        run: |
          pio run -e esp32dev
          pio run -e esp32c5

      - name: Collect artifacts
        if: steps.rel.outputs.skip != 'true'
        # The .bin is the signed trust anchor (its .sig verifies against the committed
        # public key). The manifest-*.json ride along as release-provenance pointers,
        # attached UNSIGNED by design: the web-flasher's AUTHORITATIVE manifest is the
        # Pages-served combined one (#271 / ADR-0032), not a release asset - so manifest
        # signing belongs to the Pages half, out of scope here. A consumer that reads a
        # release manifest still cross-checks the bin's sha256 + .sig, so an unsigned
        # pointer can't smuggle a bad image past the signature gate.
        run: |
          mkdir -p dist
          cp firmware/.pio/build/esp32dev/sprout-esp32-factory.bin dist/
          cp firmware/.pio/build/esp32c5/sprout-esp32c5-factory.bin dist/
          cp firmware/.pio/build/esp32dev/manifest-esp32.json dist/ 2>/dev/null || true
          cp firmware/.pio/build/esp32c5/manifest-esp32c5.json dist/ 2>/dev/null || true
          ls -l dist

      - name: Sign factory bins (ed25519) + verify against the committed public key
        if: steps.rel.outputs.skip != 'true'
        env:
          SIGNING_KEY: ${{ secrets.SPROUT_SIGNING_KEY }}
        run: |
          umask 077
          printf '%s' "$SIGNING_KEY" > signing.key
          # #1282 / ADR-0026 Decision 2 — sign a DOMAIN-SEPARATED message, never the
          # bare image. The 10-byte tag "sprout-fw\0" means a firmware signature can
          # never be replayed as a signature over a different artifact class (a
          # config, a manifest, a future signed asset). The device-side verify
          # (#1282 S1) prepends the SAME tag, and its KAT asserts that a signature
          # over the bare image FAILS - so signer and verifier must agree here or
          # every real release is rejected on-device.
          printf 'sprout-fw\0' > domain.tag
          for bin in dist/*.bin; do
            cat domain.tag "$bin" > "$bin.signme"
            openssl pkeyutl -sign -inkey signing.key -rawin -in "$bin.signme" -out "$bin.sig"
            openssl pkeyutl -verify -pubin \
              -inkey firmware/keys/sprout-signing-ed25519.pub.pem \
              -rawin -in "$bin.signme" -sigfile "$bin.sig"
            rm -f "$bin.signme"   # never shipped - the signed BYTES are the bin itself
            echo "signed + verified $(basename "$bin") (domain-separated)"
          done
          rm -f domain.tag
          shred -u signing.key 2>/dev/null || rm -f signing.key

      # The exact-bytes receipt (#1346). The flasher must serve the RELEASED bytes and be
      # able to prove it - a rebuild from the same tag is a second build merely *expected*
      # to match. This records the digest of every published asset alongside the commit
      # they were built from, so a consumer can check bytes-on-disk against bytes-as-
      # published without trusting the build to be reproducible.
      #
      # The leading '#' line is a comment to `sha256sum -c` (GNU coreutils skips it), so
      # the file stays directly verifiable: `sha256sum -c SHA256SUMS`.
      - name: Write the exact-bytes receipt (SHA256SUMS)
        if: steps.rel.outputs.skip != 'true'
        env:
          COMMIT: ${{ steps.prov.outputs.sha }}
          TAG: ${{ steps.rel.outputs.tag }}
        run: |
          cd dist
          # Capture BEFORE writing: `{ ...; } > SHA256SUMS` would create the (empty) file
          # first, so `*` would glob the receipt into its own manifest and `-c` would then
          # fail on every release. Verified both forms; this is the one that holds.
          sums="$(printf '# sprout %s - built from %s\n' "$TAG" "$COMMIT"; sha256sum -- *)"
          printf '%s\n' "$sums" > SHA256SUMS
          sha256sum -c SHA256SUMS   # the receipt must describe what is actually here
          cat SHA256SUMS

      - name: Attach artifacts to the draft release
        if: steps.rel.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.rel.outputs.tag }}
        # Attaches to the DRAFT — drafts accept uploads; publish then seals them immutable
        # (#1438). No --clobber (#1346): an artifact is written ONCE; a name collision fails
        # loud, which is correct - it means something is trying to replace bytes.
        run: |
          gh release upload "$TAG" dist/*
          echo "::notice title=Signed + attached to the draft::$TAG carries its signed bins. Review the draft, then Publish - publishing seals these assets immutable (#1438)."
