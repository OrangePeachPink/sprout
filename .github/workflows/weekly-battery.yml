name: weekly full battery

# The comprehensive backstop for the #740 velocity-first sprint posture: everything the
# per-PR gate no longer runs — the PlatformIO firmware compile + native C tests and the
# experimental-board matrix — plus the fast lint lane, all together, once a week (and on
# demand via dispatch, e.g. before cutting a release or after a firmware-heavy day).
# Findings become follow-up patches (maintainer-accepted trade, #740). Revert-before-public:
# these jobs return to per-PR blocking CI per #740's launch checklist.

on:
  schedule:
    - cron: "0 14 * * 1" # Mondays 14:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

# #1346 (maintainer ruling: 6.1.19 everywhere) — must match ci.yml, pages.yml and
# sign-release.yml. This is the scheduled backstop, so an unpinned PlatformIO here would
# report a *different* toolchain's result than the one the release actually ships with.
env:
  PIO_VERSION: "6.1.19"

concurrency:
  group: weekly-battery
  cancel-in-progress: true

jobs:
  lint:
    name: lint + hygiene (full)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Set up uv (+ the locked Python)
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          version: "0.11.14"

      - name: Set up just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Sync the locked environment
        run: uv sync --locked

      - name: Cache npx tooling (markdownlint / cspell)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.npm
          key: npx-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: npx-${{ runner.os }}-

      - name: Lint + format + hygiene
        run: SKIP=clang-format uv run pre-commit run --all-files --show-diff-on-failure

      - name: Tests — host Python
        run: just test-host

  firmware:
    name: firmware (native tests + compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Set up uv (+ the locked Python)
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          version: "0.11.14"

      - name: Set up just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Sync the locked environment
        run: uv sync --locked

      - name: Install PlatformIO
        run: pip install --quiet "platformio==${PIO_VERSION}"

      - name: Cache PlatformIO packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Tests — native C firmware logic
        run: just test-native

      - name: Compile firmware (ESP32 — catch src/ regressions)
        run: just build

  # Experimental boards (#436 S3, #442 C5) — still non-blocking-informational (ADR-0024);
  # step-level continue-on-error keeps the job's own check green while a warning
  # annotation surfaces a real break (#504).
  experimental-boards:
    name: experimental board (${{ matrix.env }}) — non-blocking
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [esp32s3, esp32c5]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up uv (+ the locked Python)
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          version: "0.11.14"

      - name: Set up just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Sync the locked environment
        run: uv sync --locked

      - name: Install PlatformIO
        run: pip install --quiet "platformio==${PIO_VERSION}"

      - name: Cache PlatformIO packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.platformio
          key: pio-experimental-${{ matrix.env }}-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: pio-experimental-${{ matrix.env }}-${{ runner.os }}-

      - name: Compile-check (${{ matrix.env }})
        id: compile
        continue-on-error: true
        run: pio run -d firmware -e ${{ matrix.env }}

      - name: Surface a non-blocking failure
        if: steps.compile.outcome == 'failure'
        run: |
          echo "::warning title=Experimental board compile failed (non-blocking)::${{ matrix.env }} failed to compile on the pinned toolchain. Non-blocking (ADR-0024) - see the Compile-check log, then fix or file it."

  # External-link check (#913) — the ONE link job that goes online. Internal/relative links are
  # the per-PR gate (tools/dx/link_check.py, a uv-native pre-commit hook); EXTERNAL links rot on
  # the internet's schedule, so lychee checks them here, weekly — never per-PR, where rate limits
  # make them flaky (Workflow ruling on #913). Non-blocking, like the rest of this battery (#740):
  # a dead external link becomes a follow-up patch, never a red gate. Config: lychee.toml.
  external-links:
    name: external links (lychee) — non-blocking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Check external links (lychee — config in lychee.toml)
        id: lychee
        continue-on-error: true
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          args: "--config lychee.toml --no-progress ./**/*.md ./**/*.html"
          fail: true

      - name: Surface a non-blocking failure
        if: steps.lychee.outcome == 'failure'
        run: |
          echo "::warning title=External link(s) unreachable (non-blocking)::lychee found dead external links. Non-blocking (weekly battery, #740) - see the lychee report in the step summary, then fix or file follow-ups."
