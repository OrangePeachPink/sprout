name: release draft on milestone close

# ADR-0009 ¬ß6 automated (#728): closing a version milestone (title `vX.Y.Z`) leaves a DRAFT
# GitHub Release with auto-generated notes (categorized by .github/release.yml from each PR's
# `type:` label, tag-to-tag since the previous release). The maintainer curates + publishes ‚Äî
# publishing is what creates the tag. Guards: only vX.Y.Z-titled milestones; skips if a
# release for that tag already exists. Fires once per release cycle ‚Äî negligible minutes.

on:
  milestone:
    types: [closed]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to draft (e.g. v0.7.1) ‚Äî for manual/retry runs"
        required: true
        type: string

permissions:
  contents: write

jobs:
  draft:
    name: draft the release
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: v
        env:
          MS_TITLE: ${{ github.event.milestone.title }}
          MS_CLOSED: ${{ github.event.milestone.closed_issues }}
          INPUT_V: ${{ inputs.version }}
        run: |
          v="${INPUT_V:-$MS_TITLE}"
          if ! echo "$v" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "not a version milestone ('$v') ‚Äî nothing to draft"; echo "skip=true" >> "$GITHUB_OUTPUT"
          elif [ -z "$INPUT_V" ] && [ "${MS_CLOSED:-0}" -eq 0 ]; then
            # #1346 ‚Äî a milestone closed with ZERO completed issues was COLLAPSED or
            # abandoned, not shipped. v0.8.2 was emptied into v0.8.1 and closed; drafting
            # a release for it produces a ghost: notes for a version that will never exist,
            # sitting in the releases list looking like a real cut someone forgot to
            # publish. Manual dispatch is never skipped by this ‚Äî passing a version IS the
            # decision to draft it.
            echo "milestone '$v' closed with 0 completed issues ‚Äî collapsed, not shipped; nothing to draft"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=$v" >> "$GITHUB_OUTPUT"; echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Draft release with generated notes
        if: steps.v.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          V: ${{ steps.v.outputs.version }}
        run: |
          if gh release view "$V" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "release $V already exists ‚Äî leaving it alone"; exit 0
          fi
          gh release create "$V" \
            --repo "$GITHUB_REPOSITORY" \
            --draft \
            --generate-notes \
            --target "$GITHUB_SHA" \
            --title "$V"
          echo "::notice title=Release drafted::$V drafted with generated notes ‚Äî curate against the ADR-0009 quality bar, then publish (publishing creates the tag)."
