name: 🐛 Bug report
description: Something isn't working as expected.
labels: ["type:fix"]
body:
  - type: markdown
    attributes:
      value: |
        Something not behaving as it should? Thanks for flagging it — noticing the gap is how Sprout stays honest. The clearer the steps, and the firmware/host versions you were on, the faster we can see what you're seeing.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: The actual behavior you saw.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can someone else see the same thing?
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the system is affected? A maintainer confirms the `area:*` label at triage.
      multiple: true
      options:
        - "Control — watering brain, safety, timing"
        - "Logging — capture, schema, data integrity"
        - "Sensing — probes, ADC, calibration"
        - "Actuators — pumps, relays, display, connectivity"
        - "Analytics — dashboards, forecasts, analysis"
        - "Not sure / cross-cutting"
    validations:
      required: true
  - type: dropdown
    id: layer
    attributes:
      label: Layer
      options:
        - "Firmware — runs on the ESP32 (needs a reflash)"
        - "Host — Python / tooling (build anytime)"
        - "Both"
        - "Not sure"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment (optional)
      description: Firmware version (`firmware/include/config.h`), host OS, Python version, board — whatever's relevant.
      placeholder: "firmware 0.7.0 · Windows 11 · Python 3.14 · ESP32-D0WD"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / evidence (optional)
      description: Paste serial output, log lines, or drop in screenshots.
      render: text
    validations:
      required: false
