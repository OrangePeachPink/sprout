# .pre-commit-config.yaml — the single definition of "the checks" (ADR-0002 #10).
#
#   pre-commit install          # once: hooks run on every commit and fix what they can
#   pre-commit run --all-files  # on demand; this is exactly what CI runs
#
# Right-sized: format + lint + basic hygiene. No coverage / typing / security gates here
# (deliberately out of scope per ADR-0002 #10/#12). Frozen design provenance
# (docs/design/_archive) and the retired BACKLOG are left untouched.

exclude: '^(docs/design/_archive/|BACKLOG\.md$|firmware/lib/monocypher/)'

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        name: ruff (lint + autofix)
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]

  # C/C++ formatting via clang-format — CHANGED-LINES (#352, v2; supersedes the
  # changed-files v1, #120/#343). git-clang-format formats only the lines a diff
  # touched, so hand-aligned =-columns / tables survive byte-identical even in a
  # file you're editing — closing the residual that forced the move-out-of-config.h
  # workaround on #376/#348 (so config.h no longer needs a carve-out). Both
  # clang-format and git-clang-format come from the pinned `clang-format==22.1.5`
  # wheel in the uv env (one hash-pinned source in uv.lock; the wrapper binds them
  # via --binary, never an ambient toolchain — the #259 "no ambient compiler"
  # principle).
  #
  # CHANGED-SCOPE — still the ONE deliberate exception to the repo's --all-files
  # gate (AGENTS.md §code-style + ADR-0002 #10). Local: vs HEAD (the lines in the
  # commit you're making) — apply + fail so you re-stage. In CI it stays OUT of
  # `pre-commit run --all-files` (via `SKIP=clang-format`); a dedicated ci.yml step
  # runs `--check` vs the PR merge-base (the blocking authority). `just lint-fw` /
  # `just format-fw` route through the same wrapper, so local == CI.
  - repo: local
    hooks:
      - id: clang-format
        name: clang-format (changed lines, #352)
        entry: uv run python tools/clang_format_changed_lines.py --base HEAD
        language: system
        files: '\.(c|cpp|h)$'
        exclude: '^docs/reference/'
        pass_filenames: false

  # markdownlint via the repo's own .markdownlint-cli2.jsonc (globs + ignores), so it
  # behaves identically to just / CI. Runs as a pre-commit-managed `language: node` hook:
  # pre-commit builds its own nodeenv and invokes node.exe DIRECTLY — no `cmd.exe /c
  # npx.CMD` shim layers (the focus-stealing console windows #664 diagnosed on Windows,
  # dozens/hour across five lanes), and nothing re-resolves per run. Version PINNED via
  # additional_dependencies (like cspell@10.0.1, #240) so the toolchain resolves the same
  # every run — kills the unpinned-npx drift-flake class DX flagged on #226.
  - repo: local
    hooks:
      - id: markdownlint-cli2
        name: markdownlint-cli2
        entry: markdownlint-cli2
        language: node
        additional_dependencies: ['markdownlint-cli2@0.22.1']
        types: [markdown]
        pass_filenames: false

  # cspell — prose spelling, driven by the repo's own cspell.json dictionary (#109). Scoped to
  # Markdown (docs/design/** is cspell-ignored — Design's brand words). Same `language: node`
  # pattern as markdownlint (#664 — node.exe direct, no cmd.exe/npx shim), so local == CI with
  # no package.json. (Python/firmware scope is a later step — checking code identifiers needs
  # its own tuning to avoid false positives.)
  #
  # Advisory, not a gate (#524): one day, four PRs, six red-CI-and-bounce round trips for
  # legitimate specialist/vendor terms and English spelling variants, zero real typos caught.
  # "en,en-GB" in cspell.json (also #524) closes the biggest recurring class (behaviour/
  # colour/analyse) for good, but a brand-new proper noun or product name will always be able
  # to surprise a spell checker — no dictionary is ever complete. So: --no-exit-code means an
  # unknown word never fails the commit or the CI job; verbose:true keeps it printing findings
  # on every run (not just failures) so the signal isn't lost, it's just not load-bearing
  # anymore. Add real typos to flagWords in cspell.json if this ever needs to bite harder.
  #
  # --gitignore-root . (found chasing #524): `useGitignore: true` walks UP from cwd looking
  # for .gitignore files. Any lane working from a `dev/<repo>-<lane>-wt` worktree (the
  # standard lane worktree pattern) has a `.git` FILE, not a directory
  # (worktree gitlink) - and the dev workspace root is itself a git repo with a default-deny `/*`
  # .gitignore. Without a root pin, cspell's gitignore walk escapes the worktree, hits that
  # deny-all, and silently checks ZERO files - a false-green local `just check` while CI
  # (a clean checkout, unaffected) still catches real issues. That's the actual mechanism
  # behind #524's "red CI, not red local" bounces. `--gitignore-root .` stops the walk at
  # this repo's own root - this repo's real ignores (docs/design, docs/experiments, _scratch)
  # still apply, nothing above it leaks in.
  - repo: local
    hooks:
      - id: cspell
        name: cspell
        # Repo-wide on every commit (pass_filenames:false + always_run) so LOCAL scope == CI's
        # `pre-commit run --all-files`; pinned via additional_dependencies (#226) so the toolchain
        # resolves the same version every run. `language: node` (not system npx) — pre-commit invokes
        # node.exe directly, no `cmd.exe /c npx.CMD` shim (the #664 focus-stealer fix).
        entry: cspell lint --no-progress --no-summary --no-must-find-files --no-exit-code --gitignore-root . "**/*.md"
        language: node
        additional_dependencies: ['cspell@10.0.1']
        pass_filenames: false
        always_run: true
        verbose: true

  # identifier-guard (#558) — hardware/network PII gate: image metadata (EXIF/XMP/IPTC)
  # + MAC (incl. EUI-64 ff:fe), USB instance-ID/VID&PID, and operator-local SSID/hostname
  # denylist in committed text. BLOCKING, unlike cspell's advisory posture, on purpose:
  # an identifier that lands in history needs git filter-repo to truly remove, so
  # commit time is the one cheap moment to stop it. Mechanizes PR #568's manual
  # pre-merge certification. False positives → tools/dx/identifier_guard_allowlist.txt
  # (with a written reason). The SSID denylist (config/identifiers.local.txt) is
  # operator-local/gitignored — absent in CI, where the regex classes still enforce.
  - repo: local
    hooks:
      - id: identifier-guard
        name: identifier-guard (PII — image metadata + MAC/USB/SSID)
        entry: uv run python tools/dx/identifier_guard.py --check
        language: system
        pass_filenames: false
        always_run: true
      # identity-label-guard (#925) — the plant-first fallback chain (plant_name || … || id) lives ONLY
      # in plantLabel(). A copy-pasted `|| s.id` is exactly how the s2@device machine-id leak class
      # (#803/#804/#805) kept returning. Blocking: keep the class extinct.
      - id: identity-label-guard
        name: identity-label-guard (#925 — raw plant-first chain outside plantLabel)
        entry: uv run python tools/dx/identity_label_guard.py --check
        language: system
        pass_filenames: false
        always_run: true
      # voice-guard (#1161) — the retired register (the PR #1099 wash + the #1138 copula rule)
      # stays out of NEW copy. Changed-lines only; ADVISORY on purpose (always exits 0 — the
      # teaching message is the enforcement; promotion to blocking is a maintainer call).
      # verbose:true so the warning shows even on pass. Release backstop: RELEASE_CUT.md §3.
      - id: voice-guard
        name: voice-guard (#1161 — retired register in changed lines; advisory)
        entry: uv run python tools/dx/voice_guard.py --check
        language: system
        pass_filenames: false
        always_run: true
        verbose: true

  # adr-register-status (#928) — every ADR file's `**Status:**` must match its register row,
  # and no ADR may appear twice. BLOCKING: Trellis caught this drift by hand twice (0025; then
  # a ratification batch collided with a revision PR, leaving two 0029 rows at different
  # statuses). File-based + deterministic, so pre-commit == `just check` == CI.
  - repo: local
    hooks:
      - id: adr-register-status
        name: adr-register-status (ADR Status vs register row)
        entry: uv run python tools/dx/lint_adr_register_status.py --check
        language: system
        pass_filenames: false
        always_run: true
      # svg-geometry-guard (#926) — keep the #886/#895 class extinct: a raw {{ }} in an
      # SVG geometry attr (d/cx/cy/points ...) parse-errors on every load, because the
      # browser validates geometry BEFORE the x-dc runtime substitutes. Fix = the
      # sc-camel- prefix. BLOCKING: a console error on a public design page is public polish.
      - id: svg-geometry-guard
        name: svg-geometry-guard (#886 class — raw {{ }} in SVG d/cx/cy/points)
        entry: uv run python tools/dx/svg_geometry_guard.py --check
        language: system
        pass_filenames: false
        always_run: true
  # link-check (#913) — internal-link gate: every relative / GitHub-self link in md+html
  # resolves to a tracked file, and no self-link carries a broken ref (the /blob/HEAD/ class
  # that produced #908's error/404 pages). BLOCKING. uv-native (identifier-guard pattern) not
  # lychee, on purpose: the per-PR check is internal/offline and lychee's a Rust binary — an
  # ambient toolchain this repo does without (#259); external links are lychee's weekly job in
  # weekly-battery.yml (see ADR-0002 §10 note + the script docstring). Same `always_run` +
  # `pass_filenames:false` as identifier-guard so LOCAL scope == CI's `--all-files`. Known
  # debt lives in tools/dx/link_check_allowlist.txt, each line owing a ticket.
  - repo: local
    hooks:
      - id: link-check
        name: link-check (internal links resolve — #913)
        entry: uv run python tools/dx/link_check.py --check
        language: system
        pass_filenames: false
        always_run: true
