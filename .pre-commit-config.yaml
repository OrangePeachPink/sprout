# .pre-commit-config.yaml — the single definition of "the checks" (ADR-0002 #10).
#
#   pre-commit install          # once: hooks run on every commit and fix what they can
#   pre-commit run --all-files  # on demand; this is exactly what CI runs
#
# Right-sized: format + lint + basic hygiene. No coverage / typing / security gates here
# (deliberately out of scope per ADR-0002 #10/#12). Frozen design provenance
# (docs/design/_archive) and the retired BACKLOG are left untouched.

exclude: '^(docs/design/_archive/|BACKLOG\.md$)'

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        name: ruff (lint + autofix)
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]

  # NOTE: clang-format (C/C++) is intentionally NOT wired here yet. The current
  # clang-format + .clang-format combo is non-idempotent (it reformats on every run),
  # which would make the gate never pass, and it sweeps design-candidate C files. Wiring
  # it needs a pinned, idempotent clang-format version + a scoped file set — tracked
  # separately so this hook config stays green.

  # markdownlint via the repo's own .markdownlint-cli2.jsonc (globs + ignores), so it
  # behaves identically to just / CI. Uses system npx (node is a standard dev tool).
  - repo: local
    hooks:
      - id: markdownlint-cli2
        name: markdownlint-cli2
        entry: npx --yes markdownlint-cli2
        language: system
        types: [markdown]
        pass_filenames: false
