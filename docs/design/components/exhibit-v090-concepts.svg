<svg viewBox="0 0 1440 1020" xmlns="http://www.w3.org/2000/svg"><style>
.h1{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:32px;fill:#1E2A18}
.h2{font-family:'Hanken Grotesk',sans-serif;font-size:15px;fill:#6F7E62}
.draft{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;fill:#B07D12;letter-spacing:1px}
.pt{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:20px;fill:#1E2A18}
.ps{font-family:'Hanken Grotesk',sans-serif;font-size:13px;fill:#6F7E62}
.nm{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:19px;fill:#1E2A18}
.mt{font-family:'Hanken Grotesk',sans-serif;font-size:12.5px;fill:#6F7E62}
.md{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:20px;fill:#1E2A18}
.ap{font-family:'Hanken Grotesk',sans-serif;font-size:15px;fill:#1E2A18}
.btn{font-family:'Hanken Grotesk',sans-serif;font-weight:700;font-size:14px;fill:#FFFFFF}
.btnq{font-family:'Hanken Grotesk',sans-serif;font-weight:600;font-size:13px;fill:#6F7E62}
.wr{font-family:'Hanken Grotesk',sans-serif;font-size:13px;fill:#6F7E62}
.wb{fill:#1E2A18;font-weight:700}
.src{font-family:'JetBrains Mono',monospace;font-size:10px;fill:#8A9880}
.nn{fill:#7C5CFF;font-weight:600}
.tiny{font-family:'Hanken Grotesk',sans-serif;font-size:11.5px;font-style:italic;fill:#9A8480}
.note{font-family:'Hanken Grotesk',sans-serif;font-size:13.5px;fill:#3C4A34}
.li{font-family:'Hanken Grotesk',sans-serif;font-size:13.5px;fill:#1E2A18}
.tklab{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;fill:#1E2A18;letter-spacing:1px}
.tkv{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:17px;fill:#1E2A18}
.vc{font-family:'Hanken Grotesk',sans-serif;font-style:italic;font-size:15px;fill:#2C3A24}
.vc2{font-family:'Hanken Grotesk',sans-serif;font-size:14.5px;fill:#2C3A24}
</style><rect width="1440" height="1020" fill="#EEF4E6"/><text x="40" y="52" class="h1">v0.9.0 concept sketches &#8212; pumps, tank, refill, minimum rig</text><text x="40" y="80" class="h2">Sketch fidelity, not specs (#597). Every voice line here is a DRAFT candidate &#8212; nothing ships without the maintainer&#8217;s read. Iterated at v0.9.0 grooming.</text><rect x="1190" y="30" width="210" height="34" rx="17" fill="none" stroke="#F5A623" stroke-width="2" stroke-dasharray="6 4"/><text x="1295" y="52" class="draft" text-anchor="middle">SKETCH &#183; DRAFT COPY</text><rect x="40" y="110" width="660" height="430" rx="18" fill="#F7FAF2" stroke="#E3E9D8"/><text x="62" y="144" class="pt">1 &#183; The pump story joins the card</text><text x="62" y="166" class="ps">ADR-0022: alert-first &#8212; Sprout proposes, the human approves, only then actuation.</text><rect x="70" y="180" width="600" height="330" rx="18" fill="#FFFFFF" stroke="#F5A623" stroke-width="3"/><rect x="86" y="194" width="46" height="46" rx="10" fill="#F7FAF2" stroke="#E3E9D8"/><text x="144" y="214" class="nm">Pothos (XL)</text><text x="144" y="232" class="mt">#7 &#183; 9in kettle &#183; right windowsill</text><circle cx="100" cy="274" r="8" fill="#F5A623"/><text x="116" y="280" class="md">Thirsty</text><rect x="86" y="298" width="568" height="74" rx="12" fill="#EEF4E6" stroke="#E3E9D8"/><text x="102" y="326" class="ap">I&#8217;d like to water &#8212; about 120 ml from the tank. OK?</text><text x="102" y="344" class="tiny">DRAFT VOICE &#183; the ask is explicit: amount + source, never a surprise</text><rect x="450" y="312" width="118" height="34" rx="17" fill="#34A853"/><text x="509" y="334" class="btn" text-anchor="middle">Water now</text><rect x="576" y="312" width="76" height="34" rx="17" fill="#FFFFFF" stroke="#E3E9D8"/><text x="614" y="334" class="btnq" text-anchor="middle">Not now</text><line x1="86" y1="392" x2="654" y2="392" stroke="#E3E9D8"/><text x="86" y="418" class="wr">watered <tspan class="wb">2d ago</tspan> <tspan class="src">PUMP &#183; APPROVED</tspan>   next <tspan class="nn">~3d</tspan>   pump <tspan class="wb">ready</tspan></text><text x="86" y="450" class="tiny">the pump run is an EVENT with provenance (pump &#183; approved &#183; 120 ml) &#8212; same chip grammar as manual/detected</text><text x="86" y="486" class="note">Frame stays the MOOD (charter rule 1); the approval strip is chrome + one leaf action.</text><rect x="740" y="110" width="660" height="430" rx="18" fill="#F7FAF2" stroke="#E3E9D8"/><text x="762" y="144" class="pt">2 &#183; Tank awareness &#8212; provenance-honest</text><text x="762" y="166" class="ps">A derived number never dresses as a measurement: modeled reads as modeled.</text><rect x="770" y="180" width="280" height="140" rx="14" fill="#FFFFFF" stroke="#6F7E62" stroke-width="2" stroke-dasharray="7 5"/><text x="788" y="210" class="tklab">TANK &#183; <tspan fill="#6F7E62">MODELED</tspan></text><rect x="788" y="224" width="244" height="26" rx="8" fill="#F7FAF2" stroke="#E3E9D8"/><rect x="788" y="224" width="98" height="26" rx="8" fill="#17B6C4" opacity="0.35"/><text x="788" y="276" class="tkv">~40&#37; &#8212; about 9 waterings left</text><text x="788" y="298" class="tiny">book-kept from approved runs &#8212; drift expected; refill resets it</text><rect x="1100" y="180" width="280" height="140" rx="14" fill="#FFFFFF" stroke="#17B6C4" stroke-width="2.5"/><text x="1118" y="210" class="tklab">TANK &#183; <tspan fill="#17B6C4">SENSOR</tspan></text><rect x="1118" y="224" width="244" height="26" rx="8" fill="#F7FAF2" stroke="#E3E9D8"/><rect x="1118" y="224" width="90" height="26" rx="8" fill="#17B6C4" opacity="0.75"/><text x="1118" y="276" class="tkv">37&#37; &#8212; measured just now</text><text x="1118" y="298" class="tiny">a level sensor upgrades the SAME chip &#8212; no restructuring</text><text x="770" y="365" class="note">The grammar: dashed + ~ + MODELED vs solid + SENSOR. Same slot, richer with the peripheral</text><text x="770" y="387" class="note">(ADR-0028: presence enriches, absence never restructures).</text><rect x="770" y="420" width="610" height="96" rx="14" fill="#FFFFFF" stroke="#E3E9D8"/><text x="788" y="448" class="tklab">3 &#183; REFILL VOICE &#8212; ahead of need, never a nag (#479)</text><text x="788" y="476" class="vc">&#8220;My tank&#8217;s running low &#8212; a top-up this week keeps me watering on my own.&#8221;</text><text x="788" y="500" class="tiny">DRAFT &#183; fires ONCE at the ahead-of-need boundary (days early, from the modeled runway), never repeats daily</text><rect x="40" y="580" width="1360" height="400" rx="18" fill="#F7FAF2" stroke="#E3E9D8"/><text x="62" y="614" class="pt">4 &#183; The minimum rig &#8212; one MCU, one sensor. First-class, not degraded.</text><text x="62" y="636" class="ps">Present-or-silent: no pump/tank/display elements appear AT ALL &#8212; no greyed slots, no upsell holes. The n=1 portrait is already complete.</text><rect x="80" y="660" width="520" height="280" rx="18" fill="#FFFFFF" stroke="#8BD24F" stroke-width="3"/><rect x="98" y="676" width="56" height="56" rx="12" fill="#F7FAF2" stroke="#E3E9D8"/><text x="168" y="700" class="nm">Basil</text><text x="168" y="718" class="mt">#1 &#183; 4in terracotta &#183; kitchen sill</text><rect x="98" y="748" width="484" height="96" rx="12" fill="#8BD24F" opacity="0.09"/><circle cx="120" cy="780" r="9" fill="#8BD24F"/><text x="138" y="787" class="md">Content</text><text x="116" y="820" class="vc2">&#8220;Comfortable and green. Just sipping slowly.&#8221;</text><line x1="98" y1="864" x2="582" y2="864" stroke="#E3E9D8"/><text x="98" y="892" class="wr">watered <tspan class="wb">&#8212;</tspan> <tspan class="src">not seen yet</tspan>   next <tspan class="wb">&#8212;</tspan> <tspan class="src">learning its rhythm</tspan></text><text x="98" y="922" class="tiny">no glug-to-pump upsell, no tank chip, no approval strip &#8212; they simply don&#8217;t exist here</text><text x="650" y="700" class="note">The same card, three rigs:</text><text x="650" y="736" class="li">&#183; sensor only &#8212; what you see left: complete.</text><text x="650" y="766" class="li">&#183; + pump &#8212; the water row gains &#8220;pump ready&#8221; + the approval moment when needed.</text><text x="650" y="796" class="li">&#183; + tank sensor &#8212; the tank chip upgrades MODELED &#8594; SENSOR in place.</text><text x="650" y="836" class="note">Each peripheral ENRICHES a slot that already holds; nothing restructures,</text><text x="650" y="858" class="note">nothing apologizes for absence. (ADR-0028 &#183; ADR-0022 &#183; the charter.)</text></svg>
