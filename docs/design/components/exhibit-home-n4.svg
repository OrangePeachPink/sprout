</style><rect width="1360" height="720" fill="#EEF4E6"/><text x="56" y="62" class="h1">Four plants from your windowsill — today vs. proposed</text><text x="56" y="94" class="h2">Today, three cards carry a frame colour that has nothing to do with their state. Proposed, the frame is the state — the content plant is the calm one.</text><text x="184" y="146" class="colcap">Today</text><text x="852" y="146" class="colcap">Proposed</text><g transform="translate(56 176)"><defs><clipPath id="c2"><rect width="300" height="200" rx="18"/></clipPath></defs><g clip-path="url(#c2)"><rect width="300" height="200" fill="#E0483D"/><rect x="10" width="290" height="200" fill="#FFFFFF"/></g><rect width="300" height="200" rx="18" fill="none" stroke="#E3E9D8" stroke-width="1.5"/><text x="26" y="36" class="gname">Corn-plant? (mini)</text><text x="26" y="58" class="gmeta2">s1 · classic (left)</text><text x="26" y="118" class="graw">2,297</text><rect x="26" y="140" width="119" height="26" rx="13" fill="#E8703A"/><text x="85" y="158" class="gpill" text-anchor="middle">Dry · parched</text></g><g transform="translate(728 176)"><rect width="300" height="200" rx="18" fill="#FFFFFF" stroke="#E8703A" stroke-width="3"/><rect x="18" y="18" width="52" height="52" rx="12" fill="#F7FAF2" stroke="#E3E9D8"/><g><path d="M40 18 C22 8,14 28,38 40" fill="#5FA23C"/><path d="M48 18 C66 8,74 28,50 40" fill="#5FA23C"/><path d="M44 8 C34 18,36 38,44 42 C52 38,54 18,44 8 Z" fill="#6FB446"/><rect x="41" y="34" width="6" height="18" rx="2" fill="#4F7D34"/><path d="M22 44 L66 44 L60 74 Q44 78 28 74 Z" fill="#C9A488"/><rect x="19" y="40" width="50" height="8" rx="3" fill="#B98F6F"/></g><text x="84" y="40" class="gname">Corn-plant? (mini)</text><text x="84" y="62" class="gmeta">mini · left</text><rect x="18" y="88" width="264" height="94" rx="12" fill="#E8703A" opacity="0.08"/><circle cx="38" cy="118" r="8" fill="#E8703A"/><text x="54" y="126" class="gmood">Parched</text><text x="34" y="162" class="gsay">Parched — plea