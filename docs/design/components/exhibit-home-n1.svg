</style><rect width="1360" height="820" fill="#EEF4E6"/><text x="56" y="62" class="h1">The Home card — today vs. proposed</text><text x="56" y="94" class="h2">Anthurium 'Lovable Hearts', from your windowsill. Today the frame is an assigned identity colour; the plant's real state is a small pill.</text><text x="128" y="146" class="colcap">Today</text><text x="128" y="168" class="colsub">the teal frame says “wet” — the plant is parched</text><text x="512" y="146" class="colcap">Proposed</text><text x="512" y="168" class="colsub">the frame IS the state · the plant speaks</text><text x="936" y="146" class="colcap">Proposed · first-run</text><text x="936" y="168" class="colsub">complete with nothing filled in yet (ADR-0028)</text><g transform="translate(56 190)"><defs><clipPath id="c1"><rect x="0" y="0" width="400" height="560" rx="24"/></clipPath></defs><g clip-path="url(#c1)"><rect x="0" y="0" width="400" height="560" fill="#17B6C4"/><rect x="12" y="0" width="388" height="560" fill="#FFFFFF"/></g><rect x="0" y="0" width="400" height="560" rx="24" fill="none" stroke="#E3E9D8" stroke-width="1.5"/><text x="34" y="52" class="td-name">Anthurium &#x27;Lovable Hearts&#x27; <tspan class="td-type">anthurium</tspan></text><text x="34" y="76" class="td-meta">5in · s3 · classic (left)</text><text x="34" y="140" class="td-raw">2,154</text><text x="234" y="140" class="td-rawu">raw</text><rect x="34" y="158" width="131" height="30" rx="15" fill="#E8703A"/><text x="100" y="178" class="td-pill" text-anchor="middle">Dry · parched</text><rect x="34" y="200" width="150" height="4" rx="2" fill="#E8703A"/><text x="34" y="250" class="td-slab">fw band</text><text x="366" y="250" class="td-sval" text-anchor="end">DRY</text><text x="34" y="277" class="td-slab">spread</text><text x="366" y="277" class="td-sval" text-anchor="end">15</text><text x="34" y="304" class="td-slab">quality</text><text x="366" y="304" class="td-sval" text-anchor="end">OK</text><text x="34" y="331" class="td-slab">range</text><text x="366" y="331" class="td-sval" text-anchor="end">1,249–2,229</text><text x="34" y="358" class="td-slab">median</text><text x="366" y="358" class="td-sval" text-anchor="end">1,902</text><text x="34" y="385" class="td-slab">slope</text><text x="366" y="385" class="td-sval" text-anchor="end">+1.77/h</text><text x="34" y="412" class="td-slab">pressure</text><text x="366" y="412" class="td-sval" text-anchor="end">991.5 hPa</text><text x="366" y="445" class="td-src" text-anchor="end">(weather_openmeteo · exterior)</text></g><g transform="translate(464 190)"><rect x="0" y="0" width="400" height="560" rx="24" fill="#FFFFFF" stroke="#E8703A" stroke-width="3"/><rect x="28" y="28" width="120" height="120" rx="16" fill="#F7FAF2" stroke="#E3E9D8"/><g><path d="M84 62 C66 52,58 72,82 84" fill="#5FA23C"/><path d="M92 62 C110 52,118 72,94 84" fill="#5FA23C"/><path d="M88 52 C78 62,80 82,88 86 C96 82,98 62,88 52 Z" fill="#6FB446"/><rect x="85" y="78" width="6" height="18" rx="2" fill="#4F7D34"/><path d="M66 88 L110 88 L104 118 Q88 122 72 118 Z" fill="#C9A488"/><rect x="63" y="84" width="50" height="8" rx="3" fill="#B98F6F"/></g><text x="168" y="60" class="name">Anthurium</text><text x="168" y="86" class="num">&#x27;Lovable Hearts&#x27;</text><text x="168" y="112" class="meta">5in · glazed</text><rect x="168" y="124" width="145" height="24" rx="12" fill="#EEF4E6" stroke="#E3E9D8"/><circle cx="181" cy="136" r="3" fill="#6F7E62"/><text x="190" y="140" class="chip">Kitchen windowsill</text><rect x="28" y="176" width="344" height="150" rx="16" fill="#E8703A" opacity="0.08"/><circle cx="52" cy="214" r="11" fill="#E8703A"/><text x="74" y="224" class="mood">Parched</text><text x="360" y="222" class="bandtag" text-anchor="end">band · Dry</text><text x="52" y="262" class="say">I’m parched — a good soak,</text><text x="52" y="290" class="say">please, when you get a moment.</text><line x1="28" y1="356" x2="372" y2="356" stroke="#E3E9D8"/><text x="52" y="392" class="wlabel">LAST WATERED</text><path d="M40 413 C46 419,45 425,40 425 C35 425,34 419,40 413 Z" fill="#17B6C4"/><text x="52" y="426" class="wval">6 days ago</text><text x="52" y="462" class="wlabel">NEXT CHECK</text><circle cx="40" cy="490" r="5" fill="#7C5CFF"/><text x="52" y="496" class="wval">now — overdue</text><text x="360" y="392" class="wlabel" text-anchor="end">DETECTED</text><text x="360" y="462" class="wlabel" text-anchor="end">FORECAST</text><line x1="28" y1="516" x2="372" y2="516" stroke="#E3E9D8"/><text x="28" y="544" class="foot">The raw number + stats live on the Workbench →</text></g><g transform="translate(872 190)"><rect x="0" y="0" width="400" height="560" rx="24" fill="#FFFFFF" stroke="#34A853" stroke-width="3"/><rect x="28" y="28" width="120" height="120" rx="16" fill="#F7FAF2" stroke="#E3E9D8"/><path d="M88 94 C85 84,74 83,75 94 C68 90,66 99,74 101 L102 101 C110 99,108 90,101 94 C102 83,91 84,88 94 Z" fill="none" stroke="#9A8480" stroke-width="1.6" opacity="0.55"/><text x="88" y="132" class="tiny" text-anchor="middle">no photo yet</text><text x="168" y="60" class="name">New plant</text><text x="168" y="86" class="num">unnamed</text><text x="168" y="112" class="meta">pot not set yet</text><rect x="168" y="124" width="131" height="24" rx="12" fill="#EEF4E6" stroke="#E3E9D8"/><circle cx="181" cy="136" r="3" fill="#6F7E62"/><text x="190" y="140" class="chip">Location not set</text><rect x="28" y="176" width="344" height="150" rx="16" fill="#34A853" opacity="0.08"/><circle cx="52" cy="214" r="11" fill="#34A853"/><text x="74" y="224" class="mood">Thriving</text><text x="360" y="222" class="bandtag" text-anchor="end">band · Moist</text><text x="52" y="262" class="say">Hi! I’m settling in.</text><text x="52" y="290" class="say">Watching my soil — more soon.</text><line x1="28" y1="356" x2="372" y2="356" stroke="#E3E9D8"/><text x="52" y="392" class="wlabel">LAST WATERED</text><path d="M40 413 C46 419,45 425,40 425 C35 425,34 419,40 413 Z" fill="#17B6C4"/><text x="52" y="426" class="wval">— not seen yet</text><text x="52" y="462" class="wlabel">NEXT CHECK</text><circle cx="40" cy="490" r="5" fill="#7C5CFF"/><text x="52" y="496" class="wval">— learning my rhythm</text><text x="360" y="392" class="wlabel" text-anchor="end">DETECTED</text><text x="360" y="462" class="wlabel" text-anchor="end">FORECAST</text><line x1="28" y1="516" x2="372" y2="516" stroke="#E3E9D8"/><text x="28" y="544" class="foot">The raw number + stats live on the Workbench →</text></g><text x="56" y="784" class="pin">The stats block (spread, range, median, slope, pressure…) moves to the Workbench — the card keeps only what you act on. Water story is 0.8.0 design intent.</text></svg>
