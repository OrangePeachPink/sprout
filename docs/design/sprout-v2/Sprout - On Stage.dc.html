<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background:#0b0c0f; }
  @keyframes stg-breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }
  @keyframes stg-blink { 0%,92%,100% { transform: scaleY(1); } 96% { transform: scaleY(0.12); } }
  @keyframes stg-mote { 0% { transform: translateY(0); opacity:0; } 25% { opacity:0.7; } 100% { transform: translateY(-220px); opacity:0; } }
  @keyframes stg-rain { 0% { transform: translateY(-34px); opacity:0; } 18% { opacity:1; } 100% { transform: translateY(96px); opacity:0; } }
  @keyframes stg-sip { 0% { transform: translateY(10px) scale(0.5); opacity:0; } 45% { opacity:1; } 100% { transform: translateY(-8px) scale(1); opacity:0; } }
  .stg-breathe { transform-box: fill-box; transform-origin: 50% 100%; animation: stg-breathe 4.2s ease-in-out infinite; }
  .stg-blink { transform-box: fill-box; transform-origin: 50% 50%; animation: stg-blink 5.5s ease-in-out infinite; }
  .stg-rain { transform-box: fill-box; animation: stg-rain 1.05s linear infinite; }
  .stg-sip { transform-box: fill-box; animation: stg-sip 1.2s ease-in infinite; }
  @media (prefers-reduced-motion: reduce){ .stg-breathe,.stg-blink,.stg-rain,.stg-sip { animation:none !important; } }
</style>
</helmet>

<div style="min-height:100vh; background:#0b0c0f; display:flex; align-items:center; justify-content:center; padding:30px;">
  <div style="position:relative; width:100%; max-width:920px; height:600px; border-radius:24px; overflow:hidden; background:radial-gradient(120% 80% at 50% 4%, #1a1d24 0%, #0b0c0f 60%); box-shadow:inset 0 0 120px rgba(0,0,0,0.7);">

    <!-- light beam -->
    <div style="position:absolute; top:0; left:50%; transform:translateX(-50%); width:520px; height:560px; background:linear-gradient(180deg, rgba(255,243,210,0.20), rgba(255,243,210,0.02) 70%, transparent); clip-path:polygon(38% 0, 62% 0, 84% 100%, 16% 100%); opacity:{{ spot }}; transition:opacity 1.3s ease; pointer-events:none;"></div>

    <!-- dust motes -->
    <div style="position:absolute; inset:0; opacity:{{ spot }}; transition:opacity 1.3s ease; pointer-events:none;">
      <div style="position:absolute; left:44%; bottom:120px; width:4px; height:4px; border-radius:50%; background:#fff3d2; animation:stg-mote 9s ease-in infinite;"></div>
      <div style="position:absolute; left:54%; bottom:140px; width:3px; height:3px; border-radius:50%; background:#fff3d2; animation:stg-mote 11s ease-in infinite 2s;"></div>
      <div style="position:absolute; left:48%; bottom:100px; width:3px; height:3px; border-radius:50%; background:#fff3d2; animation:stg-mote 10s ease-in infinite 4s;"></div>
      <div style="position:absolute; left:58%; bottom:160px; width:4px; height:4px; border-radius:50%; background:#fff3d2; animation:stg-mote 12s ease-in infinite 1s;"></div>
    </div>

    <!-- floor pool -->
    <div style="position:absolute; left:50%; bottom:64px; transform:translateX(-50%); width:360px; height:80px; border-radius:50%; background:radial-gradient(50% 60% at 50% 50%, rgba(255,240,200,0.22), transparent 72%); opacity:{{ spot }}; transition:opacity 1.3s ease;"></div>

    <!-- SPROUT -->
    <div style="position:absolute; left:50%; bottom:70px; transform:translateX(-50%);">
      <svg width="300" height="360" viewBox="0 0 200 250">
        <ellipse cx="100" cy="216" rx="58" ry="11" fill="#000" opacity="0.45"></ellipse>
        <path d="M70 196 L130 196 L124 222 Q100 230 76 222 Z" fill="#7a4a2c"></path>
        <path d="M66 190 L134 190 L131 200 Q100 207 69 200 Z" fill="#8a5634"></path>

        <g style="transform:translateY({{ bodyY }}px) rotate({{ tilt }}deg); transform-box:fill-box; transform-origin:50% 96%; transition:transform 1.0s cubic-bezier(.34,1.25,.5,1);">
          <g style="transform:scale({{ sx }},{{ sy }}); transform-box:fill-box; transform-origin:50% 100%; transition:transform 1.0s cubic-bezier(.34,1.2,.55,1);">

            <g style="transform:rotate({{ lRot }}deg) scale({{ lScale }}); transform-box:fill-box; transform-origin:100% 100%; transition:transform 1.0s ease;">
              <path d="M100 142 C74 134 58 108 64 80 C92 92 104 118 100 142 Z" style="fill:{{ leafColor }}; transition:fill 1.2s ease;" stroke="#1e3a14" stroke-width="3" stroke-linejoin="round"></path>
            </g>
            <g style="transform:rotate({{ rRot }}deg) scale({{ lScale }}); transform-box:fill-box; transform-origin:0% 100%; transition:transform 1.0s ease;">
              <path d="M100 142 C126 134 142 108 136 80 C108 92 96 118 100 142 Z" style="fill:{{ leafColor }}; transition:fill 1.2s ease;" stroke="#1e3a14" stroke-width="3" stroke-linejoin="round"></path>
            </g>
            <g style="transform:rotate({{ tipRot }}deg); transform-box:fill-box; transform-origin:50% 100%; transition:transform 1.0s ease;">
              <path d="M100 120 C93 104 97 86 109 76 C114 94 110 112 100 120 Z" style="fill:{{ tipColor }}; transition:fill 1.2s ease;" stroke="#1e3a14" stroke-width="2.5" stroke-linejoin="round"></path>
            </g>

            <g class="stg-breathe">
              <ellipse cx="100" cy="174" rx="27" ry="31" style="fill:{{ bodyColor }}; transition:fill 1.2s ease;" stroke="#1e3a14" stroke-width="3"></ellipse>
              <circle cx="80" cy="182" r="5" fill="#ff9e7a" opacity="{{ cheekOpacity }}" style="transition:opacity 1.2s ease;"></circle>
              <circle cx="120" cy="182" r="5" fill="#ff9e7a" opacity="{{ cheekOpacity }}" style="transition:opacity 1.2s ease;"></circle>
              <g transform="translate(100 172)">
                <g class="stg-blink" style="transform-origin:89px 172px;">
                  <circle cx="{{ eyeShiftL }}" cy="0" r="2.8" fill="#243018" opacity="{{ pupilOpacity }}"></circle>
                  <path d="{{ lidD }}" transform="translate(-11 0)" fill="none" stroke="#243018" stroke-width="2" stroke-linecap="round" opacity="{{ lidOpacity }}"></path>
                </g>
                <g class="stg-blink" style="transform-origin:111px 172px;">
                  <circle cx="{{ eyeShiftR }}" cy="0" r="2.8" fill="#243018" opacity="{{ pupilOpacity }}"></circle>
                  <path d="{{ lidD }}" transform="translate(11 0)" fill="none" stroke="#243018" stroke-width="2" stroke-linecap="round" opacity="{{ lidOpacity }}"></path>
                </g>
                <path d="{{ mouthD }}" transform="translate(0 11)" fill="none" stroke="#243018" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="{{ mouthLineOpacity }}"></path>
                <ellipse cx="0" cy="12" rx="2.6" ry="3.4" fill="#243018" opacity="{{ mouthOOpacity }}"></ellipse>
              </g>
            </g>

            <g opacity="{{ sparkle }}" style="transition:opacity 0.6s ease;">
              <path d="M150 96 l2 5 l5 2 l-5 2 l-2 5 l-2 -5 l-5 -2 l5 -2 Z" fill="#bff0ff"></path>
              <path d="M60 110 l1.5 3.5 l3.5 1.5 l-3.5 1.5 l-1.5 3.5 l-1.5 -3.5 l-3.5 -1.5 l3.5 -1.5 Z" fill="#bff0ff"></path>
            </g>
          </g>
        </g>

        <!-- SHOWER (rains over Sprout) -->
        <g opacity="{{ showerOpacity }}" style="transition:opacity 0.5s ease;">
          <ellipse cx="68" cy="64" rx="2" ry="3.6" fill="#5fd6e6" class="stg-rain" style="animation-delay:0s;"></ellipse>
          <ellipse cx="80" cy="58" rx="2" ry="3.6" fill="#3fd0de" class="stg-rain" style="animation-delay:0.35s;"></ellipse>
          <ellipse cx="92" cy="66" rx="2" ry="3.6" fill="#5fd6e6" class="stg-rain" style="animation-delay:0.7s;"></ellipse>
          <ellipse cx="104" cy="56" rx="2" ry="3.6" fill="#3fd0de" class="stg-rain" style="animation-delay:0.15s;"></ellipse>
          <ellipse cx="116" cy="64" rx="2" ry="3.6" fill="#5fd6e6" class="stg-rain" style="animation-delay:0.55s;"></ellipse>
          <ellipse cx="128" cy="60" rx="2" ry="3.6" fill="#3fd0de" class="stg-rain" style="animation-delay:0.9s;"></ellipse>
          <ellipse cx="100" cy="62" rx="2" ry="3.6" fill="#7fe0ec" class="stg-rain" style="animation-delay:0.45s;"></ellipse>
        </g>

        <!-- DRINK (sips at the mouth) -->
        <g opacity="{{ drinkOpacity }}" style="transition:opacity 0.4s ease;">
          <ellipse cx="92" cy="196" rx="2" ry="3.4" fill="#3fd0de" class="stg-sip" style="animation-delay:0s;"></ellipse>
          <ellipse cx="100" cy="200" rx="2.2" ry="3.8" fill="#17b6c4" class="stg-sip" style="animation-delay:0.4s;"></ellipse>
          <ellipse cx="108" cy="196" rx="2" ry="3.4" fill="#5fd6e6" class="stg-sip" style="animation-delay:0.8s;"></ellipse>
        </g>
      </svg>
    </div>

    <div style="position:absolute; inset:0; box-shadow:inset 0 0 160px 40px rgba(0,0,0,0.65); border-radius:24px; pointer-events:none;"></div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:920,&quot;height&quot;:660}}">
class Component extends DCLogic {
  state = { i: 0 };
  // hold, spot, by, tilt, sx, sy, lRot, rRot, tipRot, lScale, body, leaf, tip, eyes, mouth, shift, sparkle, cheek, shower, drink
  poses = [
    // ---- NIGHT: lying down, asleep ----
    { hold:3200, spot:0.20, by:16, tilt:-58, sx:1.06, sy:0.92, lRot:30, rRot:-30, tipRot:16, lScale:0.9,  body:'#6f9e4a', leaf:'#3a6b2a', tip:'#4a7a30', eyes:'closed', mouth:'soft',      shift:0,   sparkle:0, cheek:0, shower:0, drink:0 },
    { hold:1700, spot:0.22, by:16, tilt:-56, sx:1.05, sy:0.93, lRot:29, rRot:-29, tipRot:15, lScale:0.9,  body:'#6f9e4a', leaf:'#3a6b2a', tip:'#4a7a30', eyes:'closed', mouth:'soft',      shift:0,   sparkle:0, cheek:0, shower:0, drink:0 },
    { hold:1500, spot:0.40, by:10, tilt:-34, sx:1.04, sy:0.95, lRot:22, rRot:-22, tipRot:12, lScale:0.94, body:'#7fb24a', leaf:'#34a853', tip:'#6cae3a', eyes:'half',   mouth:'soft',      shift:0,   sparkle:0, cheek:0, shower:0, drink:0 },
    // ---- WAKE ----
    { hold:1900, spot:0.85, by:-12,tilt:0,   sx:0.92, sy:1.14, lRot:-14,rRot:14,  tipRot:-8, lScale:1.05, body:'#8bd24f', leaf:'#34a853', tip:'#a9da6e', eyes:'open',   mouth:'o',         shift:0,   sparkle:0, cheek:0, shower:0, drink:0 },
    { hold:1600, spot:1.0,  by:-3, tilt:0,   sx:1.04, sy:1.0,  lRot:-30,rRot:30,  tipRot:0,  lScale:1.1,  body:'#8bd24f', leaf:'#34a853', tip:'#a9da6e', eyes:'happy',  mouth:'smile',     shift:0,   sparkle:0, cheek:1, shower:0, drink:0 },
    // ---- MORNING DRINK ----
    { hold:1400, spot:0.95, by:2,  tilt:0,   sx:1.0,  sy:1.0,  lRot:-18,rRot:18,  tipRot:0,  lScale:1.02, body:'#8bd24f', leaf:'#34a853', tip:'#a9da6e', eyes:'open',   mouth:'neutral',   shift:0,   sparkle:0, cheek:0, shower:0, drink:0 },
    { hold:2000, spot:1.0,  by:0,  tilt:0,   sx:1.02, sy:1.0,  lRot:-16,rRot:16,  tipRot:0,  lScale:1.02, body:'#8bd24f', leaf:'#34a853', tip:'#a9da6e', eyes:'happy',  mouth:'o',         shift:0,   sparkle:0, cheek:1, shower:0, drink:1 },
    { hold:1600, spot:1.0,  by:-6, tilt:0,   sx:0.95, sy:1.08, lRot:-28,rRot:28,  tipRot:-4, lScale:1.08, body:'#8bd24f', leaf:'#34a853', tip:'#a9da6e', eyes:'happy',  mouth:'smile',     shift:0,   sparkle:0.5,cheek:1,shower:0, drink:0 },
    // ---- MIDDAY PLAY ----
    { hold:1800, spot:1.0,  by:-5, tilt:0,   sx:1.07, sy:1.0,  lRot:-38,rRot:38,  tipRot:0,  lScale:1.12, body:'#8bd24f', leaf:'#34a853', tip:'#a9da6e', eyes:'happy',  mouth:'smile',     shift:0,   sparkle:0, cheek:1, shower:0, drink:0 },
    { hold:1000, spot:1.0,  by:-3, tilt:9,   sx:1.02, sy:1.0,  lRot:-30,rRot:30,  tipRot:8,  lScale:1.08, body:'#8bd24f', leaf:'#34a853', tip:'#a9da6e', eyes:'happy',  mouth:'smile',     shift:0,   sparkle:0, cheek:1, shower:0, drink:0 },
    { hold:1000, spot:1.0,  by:-3, tilt:-9,  sx:1.02, sy:1.0,  lRot:-30,rRot:30,  tipRot:-8, lScale:1.08, body:'#8bd24f', leaf:'#34a853', tip:'#a9da6e', eyes:'happy',  mouth:'smile',     shift:0,   sparkle:0, cheek:1, shower:0, drink:0 },
    { hold:1800, spot:0.95, by:0,  tilt:-5,  sx:1.0,  sy:1.0,  lRot:-22,rRot:8,   tipRot:-10,lScale:1.04, body:'#8bd24f', leaf:'#34a853', tip:'#a9da6e', eyes:'side',   mouth:'neutral',   shift:1.9, sparkle:0, cheek:0, shower:0, drink:0 },
    // ---- SHOWER ----
    { hold:1500, spot:1.0,  by:0,  tilt:0,   sx:1.0,  sy:1.04, lRot:-20,rRot:20,  tipRot:-4, lScale:1.04, body:'#8bd24f', leaf:'#34a853', tip:'#a9da6e', eyes:'open',   mouth:'o',         shift:0,   sparkle:0, cheek:0, shower:1, drink:0 },
    { hold:2400, spot:1.0,  by:-4, tilt:0,   sx:1.03, sy:1.0,  lRot:-34,rRot:34,  tipRot:0,  lScale:1.1,  body:'#8be0c0', leaf:'#17b6c4', tip:'#7fdce6', eyes:'happy',  mouth:'smile',     shift:0,   sparkle:0, cheek:1, shower:1, drink:0 },
    { hold:1000, spot:1.0,  by:-3, tilt:8,   sx:1.02, sy:1.0,  lRot:-32,rRot:32,  tipRot:6,  lScale:1.08, body:'#8be0c0', leaf:'#17b6c4', tip:'#7fdce6', eyes:'happy',  mouth:'smile',     shift:0,   sparkle:0, cheek:1, shower:1, drink:0 },
    { hold:1000, spot:1.0,  by:-3, tilt:-8,  sx:1.02, sy:1.0,  lRot:-32,rRot:32,  tipRot:-6, lScale:1.08, body:'#8be0c0', leaf:'#17b6c4', tip:'#7fdce6', eyes:'happy',  mouth:'smile',     shift:0,   sparkle:0, cheek:1, shower:1, drink:0 },
    { hold:1800, spot:1.0,  by:-10,tilt:0,   sx:0.92, sy:1.14, lRot:-34,rRot:34,  tipRot:-4, lScale:1.12, body:'#8be0c0', leaf:'#17b6c4', tip:'#7fdce6', eyes:'happy',  mouth:'o',         shift:0,   sparkle:1, cheek:1, shower:0, drink:0 },
    // ---- AFTERNOON DRINK ----
    { hold:2000, spot:0.98, by:0,  tilt:0,   sx:1.02, sy:1.0,  lRot:-16,rRot:16,  tipRot:0,  lScale:1.02, body:'#8bd24f', leaf:'#34a853', tip:'#a9da6e', eyes:'happy',  mouth:'o',         shift:0,   sparkle:0, cheek:1, shower:0, drink:1 },
    { hold:2400, spot:0.9,  by:0,  tilt:0,   sx:1.02, sy:1.0,  lRot:-16,rRot:16,  tipRot:0,  lScale:1.04, body:'#9bd85a', leaf:'#3a9e48', tip:'#bfe87a', eyes:'happy',  mouth:'smilesoft', shift:0,   sparkle:0, cheek:1, shower:0, drink:0 },
    // ---- EVENING WIND DOWN ----
    { hold:1800, spot:0.7,  by:4,  tilt:0,   sx:1.0,  sy:1.0,  lRot:-2, rRot:2,   tipRot:0,  lScale:1.0,  body:'#7fb24a', leaf:'#34a853', tip:'#6cae3a', eyes:'half',   mouth:'soft',      shift:0,   sparkle:0, cheek:0, shower:0, drink:0 },
    { hold:1600, spot:0.6,  by:6,  tilt:-6,  sx:1.04, sy:0.96, lRot:14, rRot:-14, tipRot:8,  lScale:0.96, body:'#7fb24a', leaf:'#34a853', tip:'#6cae3a', eyes:'half',   mouth:'o',         shift:0,   sparkle:0, cheek:0, shower:0, drink:0 },
    // ---- LAY DOWN TO SLEEP ----
    { hold:1600, spot:0.45, by:10, tilt:-34, sx:1.05, sy:0.95, lRot:24, rRot:-24, tipRot:12, lScale:0.94, body:'#7fb24a', leaf:'#3a6b2a', tip:'#6cae3a', eyes:'half',   mouth:'soft',      shift:0,   sparkle:0, cheek:0, shower:0, drink:0 },
    { hold:1800, spot:0.30, by:14, tilt:-50, sx:1.06, sy:0.93, lRot:28, rRot:-28, tipRot:15, lScale:0.92, body:'#6f9e4a', leaf:'#3a6b2a', tip:'#4a7a30', eyes:'closed', mouth:'soft',      shift:0,   sparkle:0, cheek:0, shower:0, drink:0 },
    { hold:2600, spot:0.20, by:16, tilt:-58, sx:1.06, sy:0.92, lRot:30, rRot:-30, tipRot:16, lScale:0.9,  body:'#6f9e4a', leaf:'#3a6b2a', tip:'#4a7a30', eyes:'closed', mouth:'soft',      shift:0,   sparkle:0, cheek:0, shower:0, drink:0 }
  ];
  componentDidMount(){
    this._cum = []; let acc = 0;
    for (const p of this.poses){ this._cum.push(acc); acc += p.hold; }
    this._total = acc;
    this._start = performance.now();
    // single persistent interval; pose computed from elapsed time so a missed
    // tick can never permanently stall the loop (ticks in fg + bg).
    this._iv = setInterval(() => {
      const t = ((performance.now() - this._start) % this._total + this._total) % this._total;
      let idx = 0;
      for (let k = 0; k < this.poses.length; k++){ if (t >= this._cum[k]) idx = k; else break; }
      if (idx !== this.state.i) this.setState({ i: idx });
    }, 120);
  }
  componentWillUnmount(){ if (this._iv) clearInterval(this._iv); }

  eyeCfg(s){
    switch(s){
      case 'open':   return { pupil:1, lid:0, lidD:'', sl:0, sr:0 };
      case 'side':   return { pupil:1, lid:0, lidD:'', sl:1.9, sr:1.9 };
      case 'happy':  return { pupil:0, lid:1, lidD:'M-3.6 1.6 Q0 -3.2 3.6 1.6', sl:0, sr:0 };
      case 'sad':    return { pupil:0, lid:1, lidD:'M-3.6 -1.4 Q0 2.6 3.6 -1.4', sl:0, sr:0 };
      case 'half':   return { pupil:0, lid:1, lidD:'M-3.6 0 Q0 1.3 3.6 0', sl:0, sr:0 };
      default:       return { pupil:0, lid:1, lidD:'M-3.6 0 Q0 2.4 3.6 0', sl:0, sr:0 };
    }
  }
  mouthCfg(m){
    const M = { smile:'M-6 0 Q0 6.5 6 0', smilesoft:'M-5 0 Q0 4 5 0', soft:'M-4 0 Q0 2.4 4 0',
      neutral:'M-4 0.5 Q0 0.6 4 0.5', frown:'M-6 3 Q0 -3.4 6 3', frownsoft:'M-5 2 Q0 -1.6 5 2' };
    if (m === 'o') return { d:'', line:0, o:1 };
    return { d: M[m] || M.soft, line:1, o:0 };
  }
  renderVals(){
    const p = this.poses[this.state.i];
    const e = this.eyeCfg(p.eyes), m = this.mouthCfg(p.mouth);
    return {
      spot:p.spot, bodyY:p.by, tilt:p.tilt, sx:p.sx, sy:p.sy,
      lRot:p.lRot, rRot:p.rRot, tipRot:p.tipRot, lScale:p.lScale,
      bodyColor:p.body, leafColor:p.leaf, tipColor:p.tip,
      sparkle:p.sparkle, cheekOpacity:p.cheek, showerOpacity:p.shower, drinkOpacity:p.drink,
      pupilOpacity:e.pupil, lidOpacity:e.lid, lidD:e.lidD,
      eyeShiftL:(e.sl||0), eyeShiftR:(e.sr||0),
      mouthD:m.d, mouthLineOpacity:m.line, mouthOOpacity:m.o
    };
  }
}
</script>
</body>
</html>
