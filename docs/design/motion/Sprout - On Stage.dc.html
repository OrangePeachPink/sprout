<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background:#0b0c0f; }
  @keyframes stg-breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }
  @keyframes stg-blink { 0%,92%,100% { transform: scaleY(1); } 96% { transform: scaleY(0.12); } }
  @keyframes stg-mote { 0% { transform: translateY(0); opacity:0; } 25% { opacity:0.6; } 100% { transform: translateY(-200px); opacity:0; } }
  @keyframes stg-rain { 0% { transform: translateY(-34px); opacity:0; } 18% { opacity:1; } 100% { transform: translateY(96px); opacity:0; } }
  @keyframes stg-sip { 0% { transform: translateY(10px) scale(0.5); opacity:0; } 45% { opacity:1; } 100% { transform: translateY(-8px) scale(1); opacity:0; } }
  @keyframes stg-petal { 0% { transform: translateY(-30px) rotate(0deg); opacity:0; } 14% { opacity:0.95; } 100% { transform: translateY(360px) rotate(220deg); opacity:0; } }
  .stg-breathe { transform-box: fill-box; transform-origin: 50% 100%; animation: stg-breathe 4.2s ease-in-out infinite; }
  .stg-blink { transform-box: fill-box; transform-origin: 50% 50%; animation: stg-blink 5.5s ease-in-out infinite; }
  .stg-rain { transform-box: fill-box; animation: stg-rain 1.05s linear infinite; }
  .stg-sip { transform-box: fill-box; animation: stg-sip 1.2s ease-in infinite; }
  .stg-petal { transform-box: fill-box; animation: stg-petal 6s linear infinite; }
  @media (prefers-reduced-motion: reduce){ .stg-breathe,.stg-blink,.stg-rain,.stg-sip,.stg-petal,.stg-mote { animation:none !important; } }
</style>
</helmet>

<div style="min-height:100vh; background:#0b0c0f; display:flex; align-items:center; justify-content:center; padding:30px;">
  <div style="position:relative; width:100%; max-width:920px; height:600px; border-radius:24px; overflow:hidden; background:{{ skyStyle }}; transition:background 1.4s ease;">

    <!-- sun -->
    <div style="position:absolute; top:60px; right:140px; width:96px; height:96px; border-radius:50%; background:radial-gradient(circle at 42% 38%, #fff6d6, #ffd870); box-shadow:0 0 70px 18px rgba(255,216,112,0.4); opacity:{{ sunOpacity }}; transition:opacity 1.4s ease;"></div>
    <!-- moon -->
    <div style="position:absolute; top:64px; right:150px; width:62px; height:62px; border-radius:50%; background:radial-gradient(circle at 38% 34%, #f4f1e2, #cfc9b0); box-shadow:0 0 30px rgba(230,226,200,0.4); opacity:{{ moonOpacity }}; transition:opacity 1.4s ease;"></div>

    <!-- soft highlight behind sprout (keeps Sprout the lead) -->
    <div style="position:absolute; left:50%; bottom:60px; transform:translateX(-50%); width:420px; height:380px; border-radius:50%; background:radial-gradient(50% 55% at 50% 50%, rgba(255,248,214,0.5), transparent 70%); opacity:{{ highlight }}; transition:opacity 1.4s ease;"></div>

    <!-- ambient pollen (day) -->
    <div style="position:absolute; inset:0; opacity:{{ sunOpacity }}; transition:opacity 1.4s ease; pointer-events:none;">
      <div style="position:absolute; left:30%; bottom:180px; width:4px; height:4px; border-radius:50%; background:#fff3c4; animation:stg-mote 10s ease-in infinite;"></div>
      <div style="position:absolute; left:66%; bottom:200px; width:3px; height:3px; border-radius:50%; background:#fff3c4; animation:stg-mote 12s ease-in infinite 3s;"></div>
      <div style="position:absolute; left:50%; bottom:160px; width:3px; height:3px; border-radius:50%; background:#fffae0; animation:stg-mote 11s ease-in infinite 5s;"></div>
    </div>

    <!-- falling petals (bloom) -->
    <div style="position:absolute; inset:0; opacity:{{ petalOpacity }}; transition:opacity 0.8s ease; pointer-events:none;">
      <div style="position:absolute; left:24%; top:-20px; width:9px; height:7px; border-radius:50% 50% 50% 50%/60% 60% 40% 40%; background:#ff9db0; animation:stg-petal 6s linear infinite;"></div>
      <div style="position:absolute; left:40%; top:-20px; width:8px; height:6px; border-radius:50%; background:#ffc0cd; animation:stg-petal 7.5s linear infinite 1.2s;"></div>
      <div style="position:absolute; left:58%; top:-20px; width:9px; height:7px; border-radius:50%; background:#ff9db0; animation:stg-petal 6.8s linear infinite 2.4s;"></div>
      <div style="position:absolute; left:72%; top:-20px; width:8px; height:6px; border-radius:50%; background:#ffd45e; animation:stg-petal 8s linear infinite 0.6s;"></div>
      <div style="position:absolute; left:86%; top:-20px; width:8px; height:6px; border-radius:50%; background:#ffc0cd; animation:stg-petal 7s linear infinite 3.2s;"></div>
      <div style="position:absolute; left:12%; top:-20px; width:8px; height:6px; border-radius:50%; background:#ffd45e; animation:stg-petal 7.8s linear infinite 1.8s;"></div>
    </div>

    <!-- grass field -->
    <div style="position:absolute; left:0; right:0; bottom:0; height:148px; background:linear-gradient(180deg, {{ grassColor }}, {{ grassDark }}); transition:background 1.4s ease;"></div>
    <svg viewBox="0 0 920 44" preserveAspectRatio="none" style="position:absolute; left:0; right:0; bottom:138px; width:100%; height:44px;">
      <g style="fill:{{ grassColor }}; transition:fill 1.4s ease;">
        <path d="M0 44 L18 8 L36 44 Z"></path><path d="M70 44 L86 14 L102 44 Z"></path><path d="M150 44 L168 6 L186 44 Z"></path><path d="M240 44 L256 16 L272 44 Z"></path><path d="M330 44 L348 10 L366 44 Z"></path><path d="M430 44 L446 18 L462 44 Z"></path><path d="M520 44 L538 8 L556 44 Z"></path><path d="M620 44 L636 15 L652 44 Z"></path><path d="M710 44 L728 7 L746 44 Z"></path><path d="M800 44 L816 16 L832 44 Z"></path><path d="M870 44 L886 10 L902 44 Z"></path>
      </g>
    </svg>

    <!-- SPROUT -->
    <div style="position:absolute; left:50%; bottom:96px; transform:translateX(-50%);">

        <ellipse cx="100" cy="214" rx="52" ry="9" fill="#000" opacity="0.22"></ellipse>

              <g transform="translate(63 84)"><g style="transform:scale({{ flowerScale }}); transform-box:fill-box; transform-origin:center; transition:transform 0.7s ease;" opacity="{{ flowerOpacity }}"><circle cx="0" cy="-6" r="4.6" fill="#ff9db0"></circle><circle cx="6" cy="-1.8" r="4.6" fill="#ff9db0"></circle><circle cx="3.6" cy="5" r="4.6" fill="#ff9db0"></circle><circle cx="-3.6" cy="5" r="4.6" fill="#ff9db0"></circle><circle cx="-6" cy="-1.8" r="4.6" fill="#ff9db0"></circle><circle cx="0" cy="0" r="3.1" fill="#ffd45e"></circle></g></g>

              <g transform="translate(137 84)"><g style="transform:scale({{ flowerScale }}); transform-box:fill-box; transform-origin:center; transition:transform 0.7s ease;" opacity="{{ flowerOpacity }}"><circle cx="0" cy="-6" r="4.6" fill="#ffd45e"></circle><circle cx="6" cy="-1.8" r="4.6" fill="#ffd45e"></circle><circle cx="3.6" cy="5" r="4.6" fill="#ffd45e"></circle><circle cx="-3.6" cy="5" r="4.6" fill="#ffd45e"></circle><circle cx="-6" cy="-1.8" r="4.6" fill="#ffd45e"></circle><circle cx="0" cy="0" r="3.1" fill="#ff9db0"></circle></g></g>

                  <path d="{{ lidD }}" transform="translate(11 0)" fill="none" stroke="#243018" stroke-width="2" stroke-linecap="round" opacity="{{ lidOpacity }}"></path>
                </g>

    </div>

    <div style="position:absolute; inset:0; box-shadow:inset 0 0 130px 30px rgba(20,30,16,0.34); border-radius:24px; pointer-events:none;"></div>
  </div>
</div>

  ];

  randPrime(){ const a=[11,13,17,19]; return a[Math.floor(Math.random()*a.length)]; }
  poseSet(type){ return type==='bloom' ? this.bloom : this.regular; }
  // Precompute a long flat pose timeline (cycles of regular days + periodic
  // prime-spaced blooms) ONCE, persisted on window so remounts/hot-reloads can
  // never reset progress. Pose is a pure function of elapsed time since a
  // window-level epoch — so the loop can never stall, drift, or restart at 0.
  buildTimeline(){
    if (window.__sproutSegs){ this._segs = window.__sproutSegs; this._dur = window.__sproutDur; return; }
    const segs = []; let acc = 0, sinceBloom = 0, every = this.randPrime();
    while (acc < 3600000){
      let type;
      if (sinceBloom >= every){ type='bloom'; sinceBloom=0; every=this.randPrime(); }
      else { type='regular'; sinceBloom++; }
      const poses = this.poseSet(type);
      for (let i=0;i<poses.length;i++){ const h=poses[i].hold; segs.push({ s:acc, e:acc+h, type, i }); acc+=h; }
    }
    this._segs = segs; this._dur = acc;
    window.__sproutSegs = segs; window.__sproutDur = acc;
  }
  // Pure function of elapsed time → current {type, index}. Computed live in
  // renderVals() each render, so the view can never freeze on a stale state.
  currentPose(){
    const segs = this._segs || window.__sproutSegs, dur = this._dur || window.__sproutDur;
    if (!segs || !dur) return { type:'regular', i:0 };
    const ep = window.__sproutEpoch || 0;
    const e = (((performance.now() - ep) % dur) + dur) % dur;
    let lo=0, hi=segs.length-1, idx=0;
    while (lo<=hi){ const mid=(lo+hi)>>1; if (segs[mid].s <= e){ idx=mid; lo=mid+1; } else hi=mid-1; }
    return { type: segs[idx].type, i: segs[idx].i };
  }
  componentDidMount(){
    if (!window.__sproutEpoch) window.__sproutEpoch = performance.now();
    this.buildTimeline();
    // The timer ONLY forces a re-render; renderVals() recomputes the pose live
    // from elapsed time, so a stale/detached state can never freeze the view.
    const loop = () => { this.forceUpdate(); this._raf = requestAnimationFrame(loop); };
    this._raf = requestAnimationFrame(loop);
    this._iv = setInterval(() => this.forceUpdate(), 120);
  }
  componentWillUnmount(){ if(this._iv) clearInterval(this._iv); if(this._raf) cancelAnimationFrame(this._raf); }

  eyeCfg(s){
    switch(s){
      case 'open':  return { pupil:1, lid:0, lidD:'', sl:0, sr:0 };
      case 'side':  return { pupil:1, lid:0, lidD:'', sl:1.9, sr:1.9 };
      case 'happy': return { pupil:0, lid:1, lidD:'M-3.6 1.6 Q0 -3.2 3.6 1.6', sl:0, sr:0 };
      case 'sad':   return { pupil:0, lid:1, lidD:'M-3.6 -1.4 Q0 2.6 3.6 -1.4', sl:0, sr:0 };
      case 'half':  return { pupil:0, lid:1, lidD:'M-3.6 0 Q0 1.3 3.6 0', sl:0, sr:0 };
      default:      return { pupil:0, lid:1, lidD:'M-3.6 0 Q0 2.4 3.6 0', sl:0, sr:0 };
    }
  }
  mouthCfg(m){
    const M={ smile:'M-6 0 Q0 6.5 6 0', smilesoft:'M-5 0 Q0 4 5 0', soft:'M-4 0 Q0 2.4 4 0', neutral:'M-4 0.5 Q0 0.6 4 0.5', frown:'M-6 3 Q0 -3.4 6 3', frownsoft:'M-5 2 Q0 -1.6 5 2' };
    if (m==='o') return { d:'', line:0, o:1 };
    return { d:M[m]||M.soft, line:1, o:0 };
  }
  hx(h){ return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }
  mix(h1,h2,k){ const a=this.hx(h1),b=this.hx(h2); const r=x=>Math.round(x); return `rgb(${r(a[0]+(b[0]-a[0])*k)},${r(a[1]+(b[1]-a[1])*k)},${r(a[2]+(b[2]-a[2])*k)})`; }
  clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

  renderVals(){
    const cur = this.currentPose();
    const poses = this.poseSet(cur.type);
    const p = poses[cur.i] || poses[0];
    const e=this.eyeCfg(p.eyes), m=this.mouthCfg(p.mouth);
    const L=p.spot;
    const skyTop=this.mix('#162449', '#bfe3f2', L), skyBot=this.mix('#1c2c26', '#e8f3da', L);
    return {
      skyStyle:`linear-gradient(180deg, ${skyTop} 0%, ${skyBot} 78%)`,
      sunOpacity:this.clamp((L-0.45)*1.9,0,1),
      moonOpacity:this.clamp((0.36-L)*2.4,0,1),
      highlight:(0.22 + L*0.45).toFixed(3),
      grassColor:this.mix('#1f3320', '#74b24c', L),
      grassDark:this.mix('#16241600'.slice(0,7), '#4f8a36', L),
      soilColor:this.mix('#2a2018', '#6a4a2c', L),
      bodyY:p.by, tilt:p.tilt, sx:p.sx, sy:p.sy,
      lRot:p.lRot, rRot:p.rRot, tipRot:p.tipRot, lScale:p.lScale,
      bodyColor:p.body, leafColor:p.leaf, tipColor:p.tip,
      sparkle:p.sparkle, cheekOpacity:p.cheek, showerOpacity:p.shower, drinkOpacity:p.drink,
      flowerOpacity:(p.flower||0), flowerScale:(0.25+0.75*(p.flower||0)).toFixed(3), petalOpacity:(p.petal||0),
      pupilOpacity:e.pupil, lidOpacity:e.lid, lidD:e.lidD, eyeShiftL:(e.sl||0), eyeShiftR:(e.sr||0),
      mouthD:m.d, mouthLineOpacity:m.line, mouthOOpacity:m.o
    };
  }
