<svg viewBox="0 0 1200 810" xmlns="http://www.w3.org/2000/svg"><style>
.t-title{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:40px;fill:#1E2A18}
.t-sub{font-family:'Hanken Grotesk',sans-serif;font-size:18px;fill:#6F7E62}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;fill:#6F7E62;letter-spacing:2px}
.mood{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:19px;fill:#1E2A18}
.tok{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:15px;fill:#1E2A18}
.role{font-family:'Hanken Grotesk',sans-serif;font-size:13px;fill:#6F7E62}
.hex{font-family:'JetBrains Mono',monospace;font-size:12px;fill:#8A9880}
.note{font-family:'Hanken Grotesk',sans-serif;font-size:16px;fill:#3C4A34}
.note-i{font-family:'Hanken Grotesk',sans-serif;font-size:15px;font-style:italic;fill:#6F7E62}
.foot{font-family:'Hanken Grotesk',sans-serif;font-size:14px;fill:#6F7E62}
</style><rect x="0" y="0" width="1200" height="810" fill="#EEF4E6"/><text x="71" y="66" class="t-title">The color-roles charter</text><text x="71" y="98" class="t-sub">One job per channel. State owns the saturation · chrome stays muted · identity never travels by color.</text><text x="71" y="150" class="eyebrow">THE STATE RAMP — ONE LANGUAGE, WET → DRY</text><rect x="71" y="164" width="134" height="84" rx="14" fill="#0E7A86"/><text x="138" y="272" class="mood" text-anchor="middle">Soaked</text><text x="138" y="292" class="role" text-anchor="middle">Saturated</text><text x="138" y="311" class="hex" text-anchor="middle">#0E7A86</text><rect x="225" y="164" width="134" height="84" rx="14" fill="#17B6C4"/><text x="292" y="272" class="mood" text-anchor="middle">Refreshed</text><text x="292" y="292" class="role" text-anchor="middle">Wet</text><text x="292" y="311" class="hex" text-anchor="middle">#17B6C4</text><rect x="379" y="164" width="134" height="84" rx="14" fill="#34A853"/><text x="446" y="272" class="mood" text-anchor="middle">Thriving</text><text x="446" y="292" class="role" text-anchor="middle">Moist</text><text x="446" y="311" class="hex" text-anchor="middle">#34A853</text><rect x="533" y="164" width="134" height="84" rx="14" fill="#8BD24F"/><text x="600" y="272" class="mood" text-anchor="middle">Content</text><text x="600" y="292" class="role" text-anchor="middle">Ideal</text><text x="600" y="311" class="hex" text-anchor="middle">#8BD24F</text><rect x="687" y="164" width="134" height="84" rx="14" fill="#F5A623"/><text x="754" y="272" class="mood" text-anchor="middle">Thirsty</text><text x="754" y="292" class="role" text-anchor="middle">Drying</text><text x="754" y="311" class="hex" text-anchor="middle">#F5A623</text><rect x="841" y="164" width="134" height="84" rx="14" fill="#E8703A"/><text x="908" y="272" class="mood" text-anchor="middle">Parched</text><text x="908" y="292" class="role" text-anchor="middle">Dry</text><text x="908" y="311" class="hex" text-anchor="middle">#E8703A</text><rect x="995" y="164" width="134" height="84" rx="14" fill="#E0483D"/><text x="1062" y="272" class="mood" text-anchor="middle">Faint</text><text x="1062" y="292" class="role" text-anchor="middle">Parched</text><text x="1062" y="311" class="hex" text-anchor="middle">#E0483D</text><text x="71" y="360" class="eyebrow">OUTSIDE THE RAMP — NEVER A CURRENT MOOD</text><rect x="71" y="374" width="134" height="84" rx="14" fill="#7C5CFF"/><text x="138" y="482" class="mood" text-anchor="middle">Forecast</text><text x="138" y="502" class="role" text-anchor="middle">what's coming</text><text x="138" y="521" class="hex" text-anchor="middle">#7C5CFF</text><rect x="225" y="374" width="134" height="84" rx="14" fill="#9A8480"/><text x="292" y="482" class="mood" text-anchor="middle">No signal</text><text x="292" y="502" class="role" text-anchor="middle">gone quiet</text><text x="292" y="521" class="hex" text-anchor="middle">#9A8480</text><text x="420" y="418" class="note">Forecast is what’s coming.</text><text x="420" y="444" class="note">No-signal is a probe gone quiet — the calm-empty grey.</text><text x="420" y="470" class="note-i">Neither is a mood; both stay off the state ramp on purpose.</text><text x="71" y="570" class="eyebrow">THE CHROME FAMILY — MUTED, NEVER A MOOD</text><rect x="71" y="584" width="134" height="84" rx="14" fill="#EEF4E6" stroke="#DDE6CF" stroke-width="1"/><text x="138" y="692" class="tok" text-anchor="middle">sprout-soft</text><text x="138" y="712" class="role" text-anchor="middle">app background</text><text x="138" y="731" class="hex" text-anchor="middle">#EEF4E6</text><rect x="225" y="584" width="134" height="84" rx="14" fill="#F7FAF2" stroke="#DDE6CF" stroke-width="1"/><text x="292" y="692" class="tok" text-anchor="middle">mist</text><text x="292" y="712" class="role" text-anchor="middle">raised surface</text><text x="292" y="731" class="hex" text-anchor="middle">#F7FAF2</text><rect x="379" y="584" width="134" height="84" rx="14" fill="#FFFFFF" stroke="#DDE6CF" stroke-width="1"/><text x="446" y="692" class="tok" text-anchor="middle">sand</text><text x="446" y="712" class="role" text-anchor="middle">card surface</text><text x="446" y="731" class="hex" text-anchor="middle">#FFFFFF</text><rect x="533" y="584" width="134" height="84" rx="14" fill="#E3E9D8" stroke="#DDE6CF" stroke-width="1"/><text x="600" y="692" class="tok" text-anchor="middle">soil-line</text><text x="600" y="712" class="role" text-anchor="middle">hairline</text><text x="600" y="731" class="hex" text-anchor="middle">#E3E9D8</text><rect x="687" y="584" width="134" height="84" rx="14" fill="#6F7E62"/><text x="754" y="692" class="tok" text-anchor="middle">soil-muted</text><text x="754" y="712" class="role" text-anchor="middle">secondary text</text><text x="754" y="731" class="hex" text-anchor="middle">#6F7E62</text><rect x="841" y="584" width="134" height="84" rx="14" fill="#1E2A18"/><text x="908" y="692" class="tok" text-anchor="middle">soil-ink</text><text x="908" y="712" class="role" text-anchor="middle">primary text</text><text x="908" y="731" class="hex" text-anchor="middle">#1E2A18</text><line x1="71" y1="762" x2="1129" y2="762" stroke="#DDE6CF" stroke-width="1"/><text x="71" y="788" class="foot">Card frame = mood · chip = mood · gauge = mood · watering board = mood · identity = no hue · chrome = neutral</text></svg>
