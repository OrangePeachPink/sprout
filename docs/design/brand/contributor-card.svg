<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="I contribute to Sprout — a glowing seedling beside the words, an optional card for Sprout contributors to share">
  <!--
    Contributor celebration card — optional, generic (no personalization; the poster adds their own caption).
    "I contribute to Sprout" + the repo link, so it doubles as a warm "contribute to Sprout" invitation.
    Honest: celebrates participation, zero scale-claims. On-brand: the living seedling (hero-mark family,
    #1081) + tokens. Warm/community feel — the plain glowing seedling, not the instrument sensor-ring.
    Package: 1200x630 (this) + 1080x1080 square, dark + light. Master for contributor-card.png.
  -->
  <defs>
    <radialGradient id="bg" cx="24%" cy="36%" r="95%">
      <stop offset="0" stop-color="#16281f"/><stop offset="0.55" stop-color="#0c1712"/><stop offset="1" stop-color="#070f0b"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#8BD24F" stop-opacity="0.5"/><stop offset="0.55" stop-color="#8BD24F" stop-opacity="0.13"/><stop offset="1" stop-color="#8BD24F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="leafA" x1="0" y1="1" x2="0.35" y2="0"><stop offset="0" stop-color="#4a9a3f"/><stop offset="1" stop-color="#C7F07E"/></linearGradient>
    <linearGradient id="leafB" x1="0" y1="1" x2="0.35" y2="0"><stop offset="0" stop-color="#2f8a44"/><stop offset="1" stop-color="#8BD24F"/></linearGradient>
    <radialGradient id="soil" cx="50%" cy="0%" r="90%"><stop offset="0" stop-color="#3a2a1c"/><stop offset="1" stop-color="#140d08"/></radialGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&amp;family=JetBrains+Mono:wght@500&amp;display=swap');
      .wm { font-family: 'Baloo 2', system-ui, sans-serif; font-weight: 800; }
      .lead { font-family: 'Baloo 2', system-ui, sans-serif; font-weight: 700; }
      .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-weight: 500; letter-spacing: 1px; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <g fill="#8BD24F" opacity="0.5"><circle cx="120" cy="150" r="2.4"/><circle cx="470" cy="200" r="2"/><circle cx="180" cy="470" r="2.2"/></g>

  <circle cx="300" cy="300" r="220" fill="url(#glow)"/>
  <ellipse cx="300" cy="486" rx="150" ry="24" fill="url(#soil)"/>
  <g transform="translate(144,150) scale(13)" fill="none" stroke="#2f8a44" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 26 V12"/>
    <path d="M12 13 C8 11 6 8 7 5 C11 6 12 10 12 13 Z" fill="url(#leafA)"/>
    <path d="M12 13 C16 11 18 8 17 5 C13 6 12 10 12 13 Z" fill="url(#leafB)"/>
    <path d="M12 11 C9 6 11 3 12 1 C14 4 14 8 12 11 Z" fill="#C7F07E"/>
  </g>

  <text class="lead" x="560" y="286" font-size="46" fill="#8BD24F">I contribute to</text>
  <text class="wm" x="556" y="404" font-size="128" fill="#F1F6EC">Sprout</text>
  <text class="mono" x="560" y="452" font-size="19" fill="#7fae5f">github.com/OrangePeachPink/sprout</text>

  <g>
    <rect x="0" y="616" width="171.5" height="14" fill="#17B6C4"/><rect x="171.5" y="616" width="171.5" height="14" fill="#34A853"/>
    <rect x="343" y="616" width="171.5" height="14" fill="#8BD24F"/><rect x="514.5" y="616" width="171.5" height="14" fill="#C6D84A"/>
    <rect x="686" y="616" width="171.5" height="14" fill="#F5A623"/><rect x="857.5" y="616" width="171.5" height="14" fill="#E8703A"/>
    <rect x="1029" y="616" width="171" height="14" fill="#E0483D"/>
  </g>
</svg>
