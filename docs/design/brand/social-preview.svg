<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Sprout — plants that finally have a voice: a glowing seedling in a sensor ring on a dark ground, with the seven-band mood spectrum along the bottom">
  <!--
    Sprout social-preview card (og:image) — 1200x630, universal social ratio.
    Voice-clean per the pivot: no honesty hook, no overclaim. Keeps the brand line
    ("plants that finally have a voice") as the image line; the og:title carries the "pulse" hook
    (image = brand line, title = hook — an intentional split). Simplified for thumbnail legibility:
    the character is the scroll-stopper, so the seedling is big and bright; no descriptive sentence,
    no signature. Master for social-preview.png. Light sibling: social-preview-light.svg/png.
  -->
  <defs>
    <radialGradient id="bg" cx="24%" cy="34%" r="95%">
      <stop offset="0" stop-color="#16281f"/><stop offset="0.55" stop-color="#0c1712"/><stop offset="1" stop-color="#070f0b"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#8BD24F" stop-opacity="0.45"/><stop offset="0.6" stop-color="#8BD24F" stop-opacity="0.11"/><stop offset="1" stop-color="#8BD24F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="leafA" x1="0" y1="1" x2="0.35" y2="0"><stop offset="0" stop-color="#4a9a3f"/><stop offset="1" stop-color="#C7F07E"/></linearGradient>
    <linearGradient id="leafB" x1="0" y1="1" x2="0.35" y2="0"><stop offset="0" stop-color="#2f8a44"/><stop offset="1" stop-color="#8BD24F"/></linearGradient>
    <radialGradient id="soil" cx="50%" cy="0%" r="90%"><stop offset="0" stop-color="#3a2a1c"/><stop offset="1" stop-color="#140d08"/></radialGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&amp;family=JetBrains+Mono:wght@500&amp;display=swap');
      .wm { font-family: 'Baloo 2', system-ui, sans-serif; font-weight: 800; }
      .tag { font-family: 'Baloo 2', system-ui, sans-serif; font-weight: 700; }
      .cat { font-family: 'JetBrains Mono', ui-monospace, monospace; font-weight: 500; letter-spacing: 5px; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g fill="#8BD24F" opacity="0.5">
    <circle cx="126" cy="200" r="2.4"/><circle cx="406" cy="250" r="2"/><circle cx="176" cy="430" r="2.2"/>
  </g>

  <!-- sensor ring: dark base + a bright gauge arc -->
  <circle cx="288" cy="300" r="192" fill="none" stroke="#2b563a" stroke-width="8" opacity="0.85"/>
  <circle cx="288" cy="300" r="192" fill="none" stroke="#8BD24F" stroke-width="8" stroke-linecap="round"
          stroke-dasharray="330 876" transform="rotate(-125 288 300)" opacity="0.9"/>

  <!-- glow + the seedling (big, bright — the scroll-stopper) -->
  <circle cx="288" cy="312" r="185" fill="url(#glow)"/>
  <ellipse cx="288" cy="476" rx="150" ry="24" fill="url(#soil)"/>
  <g transform="translate(132,142) scale(13)" fill="none" stroke="#2f8a44" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 26 V12"/>
    <path d="M12 13 C8 11 6 8 7 5 C11 6 12 10 12 13 Z" fill="url(#leafA)"/>
    <path d="M12 13 C16 11 18 8 17 5 C13 6 12 10 12 13 Z" fill="url(#leafB)"/>
    <path d="M12 11 C9 6 11 3 12 1 C14 4 14 8 12 11 Z" fill="#C7F07E"/>
  </g>

  <!-- right: category · wordmark · brand line (no sentence, no signature) -->
  <text class="cat" x="520" y="240" font-size="18" fill="#93c96a">SOIL · MOISTURE · CARE</text>
  <text class="wm" x="516" y="362" font-size="112" fill="#F1F6EC">Sprout</text>
  <text class="tag" x="520" y="436" font-size="42" fill="#8BD24F">Plants that finally have a voice.</text>

  <!-- seven-band mood spectrum -->
  <g>
    <rect x="0" y="616" width="171.5" height="14" fill="#17B6C4"/>
    <rect x="171.5" y="616" width="171.5" height="14" fill="#34A853"/>
    <rect x="343" y="616" width="171.5" height="14" fill="#8BD24F"/>
    <rect x="514.5" y="616" width="171.5" height="14" fill="#C6D84A"/>
    <rect x="686" y="616" width="171.5" height="14" fill="#F5A623"/>
    <rect x="857.5" y="616" width="171.5" height="14" fill="#E8703A"/>
    <rect x="1029" y="616" width="171" height="14" fill="#E0483D"/>
  </g>
</svg>
