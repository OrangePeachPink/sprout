<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" role="img" aria-label="Sprout asleep for the night — a three-leaf seedling resting under a crescent moon on a midnight soil ground">
  <!-- Sprout asleep (night scene) — Workflow-authored variant, 2026-07-15.
       Use: sleeping/idle state, user sign-off / logout moment, goodnight surfaces.
       Companion card export: sprout-asleep-night-card.svg (1280x640, social).
       Geometry: canonical three-leaf mark family (sprout-mark.js thriving paths, viewBox 24x28),
       recolored to the night palette below; breathe motion at half speed (sleeping tempo).
       Night palette ("midnight loam" set):
         #0C1311 midnight loam (ground)   #1C2A22 soil shadow (resting earth)
         #2E4A38 dreaming leaf (foliage)  #3E5C48 stem, dimmed
         #557A5E moonlit sage (accent)    #8FA697 starlight (muted ink)  #DCE9DF moon / bright ink
       Self-contained: no scripts, no external fonts (system stack fallback), CSS animation only,
       honors prefers-reduced-motion. -->
  <style>
    @keyframes san-breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }
    @keyframes san-zfloat { 0% { opacity: 0; transform: translateY(6px); } 30% { opacity: .8; } 100% { opacity: 0; transform: translateY(-14px); } }
    #sprout-asleep-night .san-foliage { transform-box: fill-box; transform-origin: 50% 100%; animation: san-breathe 7.5s ease-in-out infinite; }
    #sprout-asleep-night .san-z1 { animation: san-zfloat 6s ease-in-out infinite; }
    #sprout-asleep-night .san-z2 { animation: san-zfloat 6s ease-in-out 2s infinite; }
    #sprout-asleep-night .san-z3 { animation: san-zfloat 6s ease-in-out 4s infinite; }
    @media (prefers-reduced-motion: reduce) {
      #sprout-asleep-night .san-foliage, #sprout-asleep-night .san-z1, #sprout-asleep-night .san-z2, #sprout-asleep-night .san-z3 { animation: none; }
    }
  </style>
  <g id="sprout-asleep-night">
    <rect x="0" y="0" width="680" height="440" rx="16" fill="#0C1311"/>
    <circle cx="560" cy="88" r="26" fill="#DCE9DF" opacity="0.9"/>
    <circle cx="550" cy="80" r="24" fill="#0C1311"/>
    <circle cx="120" cy="70" r="1.8" fill="#8FA697"/><circle cx="180" cy="110" r="1.2" fill="#8FA697"/>
    <circle cx="250" cy="60" r="1.5" fill="#8FA697"/><circle cx="330" cy="95" r="1.2" fill="#8FA697"/>
    <circle cx="420" cy="58" r="1.6" fill="#8FA697"/><circle cx="470" cy="130" r="1.2" fill="#8FA697"/>
    <circle cx="90" cy="150" r="1.3" fill="#8FA697"/>
    <g transform="translate(268,150) scale(6)">
      <g fill="none" stroke="#3E5C48" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 25 C12 20 12 17 12 14"/>
        <g class="san-foliage">
          <path d="M12 15 C9.5 14 8 11.5 8.6 9.2 C11.2 10 12 12.6 12 15 Z" fill="#2E4A38" stroke="#3E5C48"/>
          <path d="M12 16.5 C14.5 15.5 16 13 15.4 10.7 C12.8 11.5 12 14.1 12 16.5 Z" fill="#3E5C48" stroke="#4C6B54"/>
          <path d="M12 14 C11 11.5 11.3 9 12.6 7.4 C13.8 9.3 13.3 11.9 12 14 Z" fill="#557A5E" stroke="#557A5E"/>
        </g>
      </g>
      <path d="M4 25.6 C7 24.4 17 24.4 20 25.6" fill="none" stroke="#1C2A22" stroke-width="2.2" stroke-linecap="round"/>
    </g>
    <g fill="#8FA697" font-family="'Baloo 2','Segoe UI',system-ui,sans-serif">
      <text class="san-z1" x="360" y="180" font-size="15" opacity="0.5">z</text>
      <text class="san-z2" x="374" y="166" font-size="18" opacity="0.65">z</text>
      <text class="san-z3" x="392" y="150" font-size="21" opacity="0.8">Z</text>
    </g>
    <text x="340" y="392" text-anchor="middle" font-family="'Baloo 2','Segoe UI',system-ui,sans-serif" font-size="17" fill="#8FA697">asleep &#183; watering can wait until morning</text>
  </g>
</svg>
