<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080" role="img" aria-label="I contribute to Sprout — a seedling above the words, light-theme square contributor card">
  <!-- Contributor card, square (1:1), light sibling of contributor-card-square.svg. -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="32%" r="82%">
      <stop offset="0" stop-color="#FFFFFF"/><stop offset="0.55" stop-color="#F2F7EA"/><stop offset="1" stop-color="#E3E9D8"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#8BD24F" stop-opacity="0.3"/><stop offset="0.55" stop-color="#8BD24F" stop-opacity="0.08"/><stop offset="1" stop-color="#8BD24F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="leafA" x1="0" y1="1" x2="0.35" y2="0"><stop offset="0" stop-color="#2f8a44"/><stop offset="1" stop-color="#A9DA6E"/></linearGradient>
    <linearGradient id="leafB" x1="0" y1="1" x2="0.35" y2="0"><stop offset="0" stop-color="#26803f"/><stop offset="1" stop-color="#34A853"/></linearGradient>
    <radialGradient id="soil" cx="50%" cy="0%" r="90%"><stop offset="0" stop-color="#6b4a2e"/><stop offset="1" stop-color="#4a3320"/></radialGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&amp;family=JetBrains+Mono:wght@500&amp;display=swap');
      .wm { font-family: 'Baloo 2', system-ui, sans-serif; font-weight: 800; }
      .lead { font-family: 'Baloo 2', system-ui, sans-serif; font-weight: 700; }
      .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-weight: 500; letter-spacing: 1px; }
    </style>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <g fill="#34A853" opacity="0.35"><circle cx="240" cy="230" r="2.6"/><circle cx="840" cy="280" r="2.2"/><circle cx="200" cy="520" r="2.4"/></g>

  <circle cx="540" cy="400" r="230" fill="url(#glow)"/>
  <ellipse cx="540" cy="588" rx="150" ry="24" fill="url(#soil)"/>
  <g transform="translate(372,224) scale(14)" fill="none" stroke="#26803f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 26 V12"/>
    <path d="M12 13 C8 11 6 8 7 5 C11 6 12 10 12 13 Z" fill="url(#leafA)"/>
    <path d="M12 13 C16 11 18 8 17 5 C13 6 12 10 12 13 Z" fill="url(#leafB)"/>
    <path d="M12 11 C9 6 11 3 12 1 C14 4 14 8 12 11 Z" fill="#A9DA6E"/>
  </g>

  <text class="lead" x="540" y="748" font-size="44" fill="#2f9a4d" text-anchor="middle">I contribute to</text>
  <text class="wm" x="540" y="862" font-size="120" fill="#1E2A18" text-anchor="middle">Sprout</text>
  <text class="mono" x="540" y="916" font-size="19" fill="#6f8a54" text-anchor="middle">github.com/OrangePeachPink/sprout</text>

  <g>
    <rect x="0" y="1066" width="154.3" height="14" fill="#17B6C4"/><rect x="154.3" y="1066" width="154.3" height="14" fill="#34A853"/>
    <rect x="308.6" y="1066" width="154.3" height="14" fill="#8BD24F"/><rect x="462.9" y="1066" width="154.3" height="14" fill="#C6D84A"/>
    <rect x="617.2" y="1066" width="154.3" height="14" fill="#F5A623"/><rect x="771.5" y="1066" width="154.3" height="14" fill="#E8703A"/>
    <rect x="925.8" y="1066" width="154.2" height="14" fill="#E0483D"/>
  </g>
</svg>
