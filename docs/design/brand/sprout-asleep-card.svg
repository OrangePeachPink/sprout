<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Sprout asleep social card — a dimmed seedling with folded leaves under a crescent moon, beside the Sprout wordmark and the line 'Resting up. Back to watching at first light.'">
  <!--
    Sprout "asleep" social card — 1200x630 (universal social / OG ratio; renders on LinkedIn, X, and link
    previews). The night "asleep" overlay (BRAND.md §4) as a share-ready piece: sleeping seedling + wordmark +
    a first-person goodnight line + the brand sign-off. Self-contained, CSS-animated; a static frame exports
    cleanly to PNG for posting. Posting cadence stays gated (promotion gate) and the caption is the maker/
    Portfolio lane's — this is the ready asset.
  -->
  <defs>
    <radialGradient id="sky" cx="28%" cy="26%" r="100%">
      <stop offset="0" stop-color="#152c22"/><stop offset="0.55" stop-color="#0d1a15"/><stop offset="1" stop-color="#070f0b"/>
    </radialGradient>
    <radialGradient id="mglow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#cfe7d8" stop-opacity="0.4"/><stop offset="1" stop-color="#cfe7d8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="leafA" x1="0" y1="0" x2="0.2" y2="1"><stop offset="0" stop-color="#7aa961"/><stop offset="1" stop-color="#4a7346"/></linearGradient>
    <linearGradient id="leafB" x1="0" y1="0" x2="0.2" y2="1"><stop offset="0" stop-color="#4f7d4a"/><stop offset="1" stop-color="#33553a"/></linearGradient>
    <radialGradient id="soil" cx="50%" cy="0%" r="95%"><stop offset="0" stop-color="#241b13"/><stop offset="1" stop-color="#100b08"/></radialGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&amp;family=Hanken+Grotesk:wght@400;500&amp;family=JetBrains+Mono:wght@500&amp;display=swap');
      .breath { transform-box: fill-box; transform-origin: 50% 0%; animation: breath 7s ease-in-out infinite; }
      @keyframes breath { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(2px); } }
      .z { animation: floatz 4.8s ease-in-out infinite; }
      .z2 { animation-delay: 0.8s; } .z3 { animation-delay: 1.6s; }
      @keyframes floatz {
        0% { opacity: 0.5; transform: translate(0, 6px); }
        50% { opacity: 0.9; transform: translate(8px, -8px); }
        100% { opacity: 0.5; transform: translate(16px, -20px); }
      }
      @media (prefers-reduced-motion: reduce) { .breath, .z { animation: none; } }
      .wm { font-family: 'Baloo 2', system-ui, sans-serif; font-weight: 800; }
      .hl { font-family: 'Baloo 2', system-ui, sans-serif; font-weight: 600; }
      .sub { font-family: 'Hanken Grotesk', system-ui, sans-serif; font-weight: 400; }
      .brand { font-family: 'JetBrains Mono', ui-monospace, monospace; font-weight: 500; letter-spacing: 1.5px; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#sky)"/>

  <g fill="#cfe7d8">
    <circle cx="90" cy="80" r="1.8" opacity="0.7"/><circle cx="180" cy="150" r="1.2" opacity="0.5"/>
    <circle cx="60" cy="230" r="1.4" opacity="0.55"/><circle cx="300" cy="70" r="1.2" opacity="0.45"/>
    <circle cx="470" cy="120" r="1.3" opacity="0.5"/><circle cx="120" cy="330" r="1.2" opacity="0.45"/>
    <circle cx="880" cy="90" r="1.4" opacity="0.5"/><circle cx="1050" cy="180" r="1.6" opacity="0.6"/>
    <circle cx="1130" cy="300" r="1.2" opacity="0.45"/><circle cx="960" cy="250" r="1.1" opacity="0.4"/>
    <circle cx="740" cy="140" r="1.2" opacity="0.45"/><circle cx="400" cy="180" r="1.1" opacity="0.4"/>
  </g>
  <circle cx="150" cy="410" r="2.6" fill="#8BD24F" opacity="0.5"/>
  <circle cx="560" cy="300" r="2" fill="#A9DA6E" opacity="0.45"/>

  <circle cx="210" cy="150" r="120" fill="url(#mglow)"/>
  <circle cx="210" cy="150" r="60" fill="#E8F0E4"/>
  <circle cx="234" cy="128" r="53" fill="#101d17"/>

  <ellipse cx="350" cy="510" rx="248" ry="36" fill="url(#soil)"/>

  <g transform="translate(242,252) scale(9)" stroke="#2f5a3c" stroke-width="1.1" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 26 C12 20 12 18 12 16"/>
    <g class="breath">
      <path d="M12 16 C8 17 6 20 6 23 C10 22 12 19 12 16 Z" fill="url(#leafA)"/>
      <path d="M12 16 C16 17 18 20 18 23 C14 22 12 19 12 16 Z" fill="url(#leafB)"/>
    </g>
  </g>

  <g fill="#9fbf9a" font-family="'JetBrains Mono', ui-monospace, monospace" font-weight="700">
    <text class="z z1" x="430" y="382" font-size="22" opacity="0.65">z</text>
    <text class="z z2" x="454" y="344" font-size="32" opacity="0.65">z</text>
    <text class="z z3" x="486" y="300" font-size="44" opacity="0.65">Z</text>
  </g>

  <text class="wm" x="712" y="266" font-size="68" fill="#EAF1E5">Sprout</text>
  <text class="hl" x="712" y="338" font-size="42" fill="#dfead9">Resting up.</text>
  <text class="sub" x="714" y="382" font-size="25" fill="#9fb2a3">Back to watching at first light.</text>
  <text class="brand" x="714" y="456" font-size="16" fill="#7f9788">plants with a pulse · tend well.</text>
</svg>
