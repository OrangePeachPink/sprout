<svg width="1400" height="500" viewBox="0 0 1400 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sprout profile header — a moisture trace and two seedlings on a dark-green ground">
  <!-- Sprout profile / cover header. Canvas is 1400x500 (2.8:1) — the exact size Hackaday.io
       (and most cover-photo surfaces) store. The surface then re-crops it with background-size:cover,
       centered, into a much wider-shorter band (~4.6:1 on desktop, wider on big monitors), so only the
       vertical-CENTER ~50-60% ever shows and the full width shows. Everything critical therefore lives
       in the center safe band (y ~130..370) and the horizontal center is kept DARK so an overlaid name
       + summary stay legible. Signature elements: seedling leaves anchored at both edges (vertically
       centered), a full-width raw moisture trace, and the seven calibrated-band hues as a hairline.
       Master source — export a PNG at the surface's store size (sprout-hackaday-header.png is 1400x500). -->
  <defs>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1c12"/><stop offset="0.5" stop-color="#0a1e13"/><stop offset="1" stop-color="#081409"/>
    </linearGradient>
    <radialGradient id="glowL" cx="6%" cy="50%" r="40%">
      <stop offset="0" stop-color="#2f9a4d" stop-opacity="0.6"/><stop offset="1" stop-color="#2f9a4d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="95%" cy="50%" r="42%">
      <stop offset="0" stop-color="#8BD24F" stop-opacity="0.42"/><stop offset="1" stop-color="#8BD24F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="well" cx="50%" cy="50%" r="46%">
      <stop offset="0" stop-color="#050d08" stop-opacity="0.9"/><stop offset="0.55" stop-color="#050d08" stop-opacity="0.5"/><stop offset="1" stop-color="#050d08" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trace" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8BD24F" stop-opacity="0"/><stop offset="0.14" stop-color="#8BD24F" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#8BD24F" stop-opacity="0.18"/><stop offset="0.86" stop-color="#8BD24F" stop-opacity="0.85"/><stop offset="1" stop-color="#8BD24F" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="1" x2="0.4" y2="0"><stop offset="0" stop-color="#2f9a4d"/><stop offset="1" stop-color="#A8E85C"/></linearGradient>
    <linearGradient id="leafDim" x1="0" y1="1" x2="0.4" y2="0"><stop offset="0" stop-color="#26803f"/><stop offset="1" stop-color="#7FC24A"/></linearGradient>
    <linearGradient id="bands" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E0483D"/><stop offset="0.17" stop-color="#E8703A"/><stop offset="0.34" stop-color="#F5A623"/>
      <stop offset="0.5" stop-color="#8BD24F"/><stop offset="0.67" stop-color="#34A853"/><stop offset="0.84" stop-color="#17B6C4"/><stop offset="1" stop-color="#7C5CFF"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="500" fill="url(#ground)"/>
  <rect width="1400" height="500" fill="url(#glowL)"/>
  <rect width="1400" height="500" fill="url(#glowR)"/>

  <!-- sprout leaves at the edges, vertically CENTERED so they survive the top/bottom crop -->
  <g opacity="0.9">
    <g transform="translate(120,300) scale(1.9) rotate(20)"><path d="M0 8 C 46 -6, 50 -78, 6 -120 C -30 -78, -30 -30, 0 8 Z" fill="url(#leaf)" opacity="0.9"/></g>
    <g transform="translate(210,305) scale(1.6) rotate(-24)"><path d="M0 8 C -46 -6, -50 -78, -6 -120 C 30 -78, 30 -30, 0 8 Z" fill="url(#leafDim)" opacity="0.85"/></g>
    <g transform="translate(1290,255) scale(2.1) rotate(-16)"><path d="M0 8 C -46 -6, -50 -78, -6 -120 C 30 -78, 30 -30, 0 8 Z" fill="url(#leaf)" opacity="0.85"/></g>
  </g>

  <!-- the Sprout signature: raw moisture trace, full width, in the SAFE center band -->
  <polyline fill="none" stroke="url(#trace)" stroke-width="3" stroke-linejoin="round"
    points="0,270 70,258 120,296 190,238 270,262 350,300 430,236 510,266 590,298 670,240 760,270 850,300 940,238 1030,266 1110,296 1190,240 1280,264 1350,296 1400,270"/>
  <!-- the seven calibrated bands: a faint hairline riding just under the trace -->
  <rect x="0" y="330" width="1400" height="3" fill="url(#bands)" opacity="0.42"/>

  <!-- faint sensor dots, mid-height, edge-weighted -->
  <g opacity="0.16" fill="#8BD24F">
    <circle cx="70" cy="180" r="2.5"/><circle cx="150" cy="220" r="2.5"/><circle cx="50" cy="380" r="2.5"/>
    <circle cx="1330" cy="190" r="2.5"/><circle cx="1250" cy="360" r="2.5"/><circle cx="1350" cy="300" r="2.5"/>
  </g>

  <!-- center-safe well over everything: keeps the overlaid name + summary crisp -->
  <rect width="1400" height="500" fill="url(#well)"/>
</svg>
