  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {

      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);

    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {

        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {

            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();

              const { done, value } = await reader.read();

              chunks.push(value);

      // and tear down the wrapper. Non-# links navigate the parent to the

      // when the id is one of this bundle's own pages (author #/… links from

              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +

      // ids) before wrapping — same escape level as every sibling JSON island.

        headContent.split('</' + 'script').join('<\\/' + 'script') +

    }

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting

        for (const a of old.attributes) s.setAttribute(a.name, a.value);

        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.

          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();

        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.

      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

pan><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:12px;\"><div style=\"width:46px; height:30px; background:#eef4e6; border:1.5px solid #8bd24f; border-radius:999px;\"><\u002Fdiv><span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#6f7e62;\">999 · pills<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"sd-sec-label\" style=\"margin-bottom:14px;\">Elevation<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:14px;\">\n          <div style=\"background:#fff; border:1px solid #e3e9d8; border-radius:12px; padding:10px 14px; font-family:'JetBrains Mono',monospace; font-size:11px; color:#6f7e62; box-shadow:0 1px 2px rgba(30,42,24,0.06);\">e1 · resting tile<\u002Fdiv>\n          <div style=\"background:#fff; border:1px solid #e3e9d8; border-radius:12px; padding:10px 14px; font-family:'JetBrains Mono',monospace; font-size:11px; color:#6f7e62; box-shadow:0 6px 18px rgba(30,42,24,0.08);\">e2 · raised card<\u002Fdiv>\n          <div style=\"background:#fff; border:1px solid #e3e9d8; border-radius:12px; padding:10px 14px; font-family:'JetBrains Mono',monospace; font-size:11px; color:#6f7e62; box-shadow:0 16px 36px rgba(30,42,24,0.14);\">e3 · popover<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ PLANT PERSONALITY ============ -->\n  <div style=\"background:linear-gradient(180deg,#f3f9ea 0%,#ffffff 100%); border:1px solid #d7e6c2; border-radius:22px; padding:40px;\">\n    <div style=\"display:flex; align-items:baseline; justify-content:space-between; margin-bottom:8px;\">\n      <h2 style=\"font-family:'Baloo 2',sans-serif; font-weight:700; font-size:30px; color:#1e2a18; margin:0;\">The plant personality system<\u002Fh2>\n      <span class=\"sd-sec-label\">04 · Signature<\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"font-size:16px; line-height:1.55; color:#4a5740; margin:0 0 30px; max-width:680px;\">The quiet idea that sets this apart: every channel has a <strong>mood<\u002Fstrong> derived from its data. Not a cartoon mascot — a single designed seedling mark that shifts posture, a color, and one honest line of copy. Enough to make you feel the plant is doing well (or isn't), never enough to feel like a toy.<\u002Fp>\n\n    <!-- Mood reference grid -->\n    <div class=\"sd-sec-label\" style=\"margin-bottom:14px;\">Mood states<\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:34px;\">\n      <!-- Thriving -->\n      <div style=\"background:#fff; border:1px solid #e3e9d8; border-radius:16px; padding:18px; display:flex; gap:14px; align-items:flex-start;\">\n        <div style=\"width:46px; height:46px; border-radius:12px; background:#dff0cc; flex-shrink:0; display:flex; align-items:center; justify-content:center;\"><svg width=\"26\" height=\"30\" viewBox=\"0 0 24 28\" fill=\"#8bd24f\" stroke=\"#247a3a\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 26 V12\" fill=\"none\"><\u002Fpath><path d=\"M12 13 C8 11 6 8 7 5 C11 6 12 10 12 13 Z\"><\u002Fpath><path d=\"M12 13 C16 11 18 8 17 5 C13 6 12 10 12 13 Z\" fill=\"#34a853\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div><div style=\"font-family:'Baloo 2',sans-serif; font-weight:700; font-size:16px; color:#1f6b33;\">Thriving<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#8a9a78; margin:2px 0 6px;\">VWC ≥ 70%<\u002Fdiv><div style=\"font-size:13px; color:#4a5740; line-height:1.45;\">“Lush and steady — no action needed.”<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <!-- Content -->\n      <div style=\"background:#fff; border:1px solid #e3e9d8; border-radius:16px; padding:18px; display:flex; gap:14px; align-items:flex-start;\">\n        <div style=\"width:46px; height:46px; border-radius:12px; background:#e8f4d6; flex-shrink:0; display:flex; align-items:center; justify-content:center;\"><svg width=\"26\" height=\"30\" viewBox=\"0 0 24 28\" fill=\"#a9da6e\" stroke=\"#5a8e2a\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 26 V12\" fill=\"none\"><\u002Fpath><path d=\"M12 13 C8.5 12 6.5 10 7 7 C10.5 8 12 10.5 12 13 Z\"><\u002Fpath><path d=\"M12 13 C15.5 12 17.5 10 17 7 C13.5 8 12 10.5 12 13 Z\" fill=\"#8bd24f\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div><div style=\"font-family:'Baloo 2',sans-serif; font-weight:700; font-size:16px; color:#456b1f;\">Content<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#8a9a78; margin:2px 0 6px;\">VWC 48–69%<\u002Fdiv><div style=\"font-size:13px; color:#4a5740; line-height:1.45;\">“Comfortable, sipping slowly.”<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <!-- Drinking -->\n      <div style=\"background:#fff; border:1px solid #cdeef1; border-radius:16px; padding:18px; display:flex; gap:14px; align-items:flex-start;\">\n        <div style=\"width:46px; height:46px; border-radius:12px; background:#cdeef1; flex-shrink:0; display:flex; align-items:center; justify-content:center;\"><svg width=\"26\" height=\"30\" viewBox=\"0 0 24 28\" fill=\"#8bd24f\" stroke=\"#247a3a\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3 C12 3 14.4 5.6 12 7 C9.6 5.6 12 3 12 3 Z\" fill=\"#17b6c4\" stroke=\"#0e7a86\"><\u002Fpath><path d=\"M12 26 V13\" fill=\"none\"><\u002Fpath><path d=\"M12 14 C8 12 6 9 7 6 C11 7 12 11 12 14 Z\"><\u002Fpath><path d=\"M12 14 C16 12 18 9 17 6 C13 7 12 11 12 14 Z\" fill=\"#34a853\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div><div style=\"font-family:'Baloo 2',sans-serif; font-weight:700; font-size:16px; color:#0e7a86;\">Drinking<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#8a9a78; margin:2px 0 6px;\">pump active<\u002Fdiv><div style=\"font-size:13px; color:#4a5740; line-height:1.45;\">“Having a drink — back shortly.”<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <!-- Thirsty -->\n      <div style=\"background:#fff; border:1px solid #f0dcb0; border-radius:16px; padding:18px; display:flex; gap:14px; align-items:flex-start;\">\n        <div style=\"width:46px; height:46px; border-radius:12px; background:#fbe7c4; flex-shrink:0; display:flex; align-items:center; justify-content:center;\"><svg width=\"26\" height=\"30\" viewBox=\"0 0 24 28\" fill=\"#f5c97a\" stroke=\"#b07d12\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 26 V14\" fill=\"none\"><\u002Fpath><path d=\"M12 15 C8 14 5 14 4 16 C8 18 11 17 12 15 Z\"><\u002Fpath><path d=\"M12 15 C16 14 19 14 20 16 C16 18 13 17 12 15 Z\" fill=\"#f5a623\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div><div style=\"font-family:'Baloo 2',sans-serif; font-weight:700; font-size:16px; color:#9a6410;\">Getting thirsty<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#8a9a78; margin:2px 0 6px;\">VWC 34–47%<\u002Fdiv><div style=\"font-size:13px; color:#4a5740; line-height:1.45;\">“Could use a drink before long.”<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <!-- Parched -->\n      <div style=\"background:#fff; border:1px solid #f0c8b0; border-radius:16px; padding:18px; display:flex; gap:14px; align-items:flex-start;\">\n        <div style=\"width:46px; height:46px; border-radius:12px; background:#fad9c8; flex-shrink:0; display:flex; align-items:center; justify-content:center;\"><svg width=\"26\" height=\"30\" viewBox=\"0 0 24 28\" fill=\"#f0a984\" stroke=\"#c2561f\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 26 C12 20 12 18 12 16\" fill=\"none\"><\u002Fpath><path d=\"M12 16 C8 17 6 20 6 23 C10 22 12 19 12 16 Z\"><\u002Fpath><path d=\"M12 16 C16 17 18 20 18 23 C14 22 12 19 12 16 Z\" fill=\"#e8703a\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div><div style=\"font-family:'Baloo 2',sans-serif; font-weight:700; font-size:16px; color:#a3461a;\">Thirsty<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#8a9a78; margin:2px 0 6px;\">VWC 18–33%<\u002Fdiv><div style=\"font-size:13px; color:#4a5740; line-height:1.45;\">“Ready for water now.”<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <!-- Unwell -->\n      <div style=\"background:#fff; border:1px solid #ecd2cf; border-radius:16px; padding:18px; display:flex; gap:14px; align-items:flex-start;\">\n        <div style=\"width:46px; height:46px; border-radius:12px; background:#f1e4e2; flex-shrink:0; display:flex; align-items:center; justify-content:center;\"><svg width=\"26\" height=\"30\" viewBox=\"0 0 24 28\" fill=\"#cdb6b2\" stroke=\"#8a7470\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 26 C12 20 12 18 12 16\" fill=\"none\"><\u002Fpath><path d=\"M12 16 C8 17 6 20 6 23 C10 22 12 19 12 16 Z\"><\u002Fpath><path d=\"M12 16 C16 17 18 20 18 23 C14 22 12 19 12 16 Z\"><\u002Fpath><path d=\"M19 5 L23 9 M23 5 L19 9\" stroke=\"#e0483d\" fill=\"none\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div><div style=\"font-family:'Baloo 2',sans-serif; font-weight:700; font-size:16px; color:#a32a22;\">Unwell<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#8a9a78; margin:2px 0 6px;\">sensor fault<\u002Fdiv><div style=\"font-size:13px; color:#4a5740; line-height:1.45;\">“Can't feel the soil — check me?”<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Interactive demo -->\n    <div style=\"background:#1b2417; border:1px solid #283322; border-radius:20px; padding:30px; display:grid; grid-template-columns:auto 1fr; gap:36px; align-items:center;\">\n      <!-- gauge -->\n      <div style=\"display:flex; flex-direction:column; align-items:center; gap:16px;\">\n        <div style=\"position:relative; width:188px; height:188px; border-radius:50%; background:{{ ringStyle }}; box-shadow:0 0 34px rgba(158,224,74,0.14);\">\n          <div style=\"position:absolute; inset:16px; border-radius:50%; background:#101a0d; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;\">\n            <sc-if value=\"{{ isPerky }}\" hint-placeholder-val=\"{{ true }}\"><svg width=\"38\" height=\"44\" viewBox=\"0 0 24 28\" fill=\"{{ moodSoft }}\" stroke=\"{{ moodColor }}\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"margin-bottom:2px;\"><path d=\"M12 26 V12\" fill=\"none\"><\u002Fpath><path d=\"M12 13 C8 11 6 8 7 5 C11 6 12 10 12 13 Z\"><\u002Fpath><path d=\"M12 13 C16 11 18 8 17 5 C13 6 12 10 12 13 Z\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n            <sc-if value=\"{{ isThirsty }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"38\" height=\"44\" viewBox=\"0 0 24 28\" fill=\"{{ moodSoft }}\" stroke=\"{{ moodColor }}\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"margin-bottom:2px;\"><path d=\"M12 26 V14\" fill=\"none\"><\u002Fpath><path d=\"M12 15 C8 14 5 14 4 16 C8 18 11 17 12 15 Z\"><\u002Fpath><path d=\"M12 15 C16 14 19 14 20 16 C16 18 13 17 12 15 Z\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n            <sc-if value=\"{{ isDroop }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"38\" height=\"44\" viewBox=\"0 0 24 28\" fill=\"{{ moodSoft }}\" stroke=\"{{ moodColor }}\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"margin-bottom:2px;\"><path d=\"M12 26 C12 20 12 18 12 16\" fill=\"none\"><\u002Fpath><path d=\"M12 16 C8 17 6 20 6 23 C10 22 12 19 12 16 Z\"><\u002Fpath><path d=\"M12 16 C16 17 18 20 18 23 C14 22 12 19 12 16 Z\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n            <span style=\"font-family:'JetBrains Mono',monospace; font-size:34px; font-weight:600; color:#eaf2e0; line-height:1;\">{{ pct }}<\u002Fspan>\n            <span style=\"font-family:'Hanken Grotesk',sans-serif; font-size:12px; color:#7c8a72;\">soil moisture<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:inline-flex; align-items:center; gap:8px; background:{{ moodSoft }}; border-radius:999px; padding:7px 16px;\"><span style=\"width:8px; height:8px; border-radius:50%; background:{{ moodColor }};\"><\u002Fspan><span style=\"font-family:'Baloo 2',sans-serif; font-weight:700; font-size:15px; color:{{ moodText }};\">{{ moodLabel }}<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <!-- controls -->\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.12em; color:#7c8a72; margin-bottom:10px;\">TRY IT · DRAG THE SOIL DRY<\u002Fdiv>\n        <div style=\"font-family:'Baloo 2',sans-serif; font-weight:700; font-size:26px; color:#eaf2e0; line-height:1.15; margin-bottom:6px;\">Monstera is {{ moodLabel }}.<\u002Fdiv>\n        <div style=\"font-family:'Hanken Grotesk',sans-serif; font-size:15px; color:#9fb094; margin-bottom:22px;\">{{ moodMicro }}<\u002Fdiv>\n        <input type=\"range\" min=\"0\" max=\"100\" value=\"{{ moisture }}\" onchange=\"{{ setMoisture }}\" style=\"width:100%; accent-color:#9ee04a; height:6px; cursor:pointer;\">\n        <div style=\"display:flex; justify-content:space-between; font-family:'JetBrains Mono',monospace; font-size:10px; color:#5f6e55; margin-top:6px;\"><span>0% bone dry<\u002Fspan><span>100% saturated<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex; gap:10px; margin-top:22px;\">\n          <button onclick=\"{{ water }}\" style=\"font-family:'Hanken Grotesk',sans-serif; font-size:14px; font-weight:700; color:#101a0d; background:#9ee04a; border:none; border-radius:999px; padding:10px 20px; cursor:pointer; box-shadow:0 0 18px rgba(158,224,74,0.3);\">Water now<\u002Fbutton>\n          <button onclick=\"{{ dry }}\" style=\"font-family:'Hanken Grotesk',sans-serif; font-size:14px; font-weight:700; color:#cfe0c2; background:transparent; border:1.5px solid #3a4633; border-radius:999px; padding:10px 20px; cursor:pointer;\">Skip a few days<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Voice -->\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-top:30px;\">\n      <div style=\"background:#fff; border:1px solid #cfe6b8; border-radius:16px; padding:22px;\">\n        <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:14px;\"><span style=\"width:22px; height:22px; border-radius:50%; background:#dff0cc; display:flex; align-items:center; justify-content:center;\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#247a3a\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 13l4 4L19 7\"><\u002Fpath><\u002Fsvg><\u002Fspan><span style=\"font-family:'Baloo 2',sans-serif; font-weight:700; font-size:16px; color:#1f6b33;\">Voice — do<\u002Fspan><\u002Fdiv>\n        <ul style=\"margin:0; padding-left:18px; font-size:14px; line-height:1.7; color:#3f4a32;\">\n          <li>Calm, attentive, first-person-ish: <em>“Ready for water now.”<\u002Fem><\u002Fli>\n          <li>State the fact, then the feeling — data leads, warmth follows.<\u002Fli>\n          <li>One short line. The plant is a quiet companion, not a chatterbox.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #ecd2cf; border-radius:16px; padding:22px;\">\n        <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:14px;\"><span style=\"width:22px; height:22px; border-radius:50%; background:#fad6d2; display:flex; align-items:center; justify-content:center;\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#a32a22\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 6l12 12M18 6L6 18\"><\u002Fpath><\u002Fsvg><\u002Fspan><span style=\"font-family:'Baloo 2',sans-serif; font-weight:700; font-size:16px; color:#a32a22;\">Voice — don't<\u002Fspan><\u002Fdiv>\n        <ul style=\"margin:0; padding-left:18px; font-size:14px; line-height:1.7; color:#3f4a32;\">\n          <li>No baby-talk, no pleading, no exclamation pile-ups.<\u002Fli>\n          <li>No emoji faces or googly eyes on the seedling mark.<\u002Fli>\n          <li>Never guilt-trip — “you forgot me” is off-limits.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ COMPONENTS ============ -->\n  <div style=\"background:#ffffff; border:1px solid #e3e9d8; border-radius:22px; padding:40px;\">\n    <div style=\"display:flex; align-items:baseline; justify-content:space-between; margin-bottom:8px;\">\n      <h2 style=\"font-family:'Baloo 2',sans-serif; font-weight:700; font-size:30px; color:#1e2a18; margin:0;\">Components<\u002Fh2>\n      <span class=\"sd-sec-label\">05 · Library<\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"font-size:15px; color:#6f7e62; margin:0 0 30px; max-width:620px;\">The working parts — pill-shaped, soft-shadowed, color-coded by meaning. Everything below is built from the same tokens.<\u002Fp>\n\n    <!-- Buttons -->\n    <div class=\"sd-sec-label\" style=\"margin-bottom:14px;\">Buttons<\u002Fdiv>\n    <div style=\"display:flex; flex-wrap:wrap; gap:12px; align-items:center; margin-bottom:14px;\">\n      <button style=\"font-family:'Hanken Grotesk',sans-serif; font-size:15px; font-weight:700; color:#fff; background:#34a853; border:none; border-radius:999px; padding:12px 24px; cursor:pointer; box-shadow:0 4px 12px rgba(52,168,83,0.28);\">Water now<\u002Fbutton>\n      <button style=\"font-family:'Hanken Grotesk',sans-serif; font-size:15px; font-weight:700; color:#2c4a1e; background:#fff; border:1.5px solid #cdddb8; border-radius:999px; padding:12px 24px; cursor:pointer;\">Schedule<\u002Fbutton>\n      <button style=\"font-family:'Hanken Grotesk',sans-serif; font-size:15px; font-weight:700; color:#247a3a; background:#eef4e6; border:none; border-radius:999px; padding:12px 22px; cursor:pointer;\">Calibrate<\u002Fbutton>\n      <button style=\"font-family:'Hanken Grotesk',sans-serif; f ex; flex-direction:column; gap:11px;\">\n            <div style=\"display:flex; gap:10px; align-items:flex-start;\"><span style=\"width:7px; height:7px; border-radius:50%; background:#3fd0de; margin-top:5px; flex-shrink:0; box-shadow:0 0 5px #3fd0de;\"><\u002Fspan><div><div style=\"font-size:12.5px; color:#eaf2e0; line-height:1.35;\">CH2 watering started · 12s<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:10px; color:#7c8a72;\">23:57<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex; gap:10px; align-items:flex-start;\"><span style=\"width:7px; height:7px; border-radius:50%; background:#ff6b5e; margin-top:5px; flex-shrink:0; box-shadow:0 0 5px #ff6b5e;\"><\u002Fspan><div><div style=\"font-size:12.5px; color:#eaf2e0; line-height:1.35;\">CH4 sensor signal lost<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:10px; color:#7c8a72;\">23:30<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex; gap:10px; align-items:flex-start;\"><span style=\"width:7px; height:7px; border-radius:50%; background:#a78bff; margin-top:5px; flex-shrink:0; box-shadow:0 0 5px #a78bff;\"><\u002Fspan><div><div style=\"font-size:12.5px; color:#eaf2e0; line-height:1.35;\">CH3 predicted due within 1h<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:10px; color:#7c8a72;\">22:55<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex; gap:10px; align-items:flex-start;\"><span style=\"width:7px; height:7px; border-radius:50%; background:#9ee04a; margin-top:5px; flex-shrink:0; box-shadow:0 0 5px #9ee04a;\"><\u002Fspan><div><div style=\"font-size:12.5px; color:#eaf2e0; line-height:1.35;\">CH1 finished · 0.3L delivered<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:10px; color:#7c8a72;\">18:20<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ PART DIVIDER ============ -->\n  <div style=\"display:flex; align-items:center; gap:16px; padding:18px 8px 2px;\">\n    <div style=\"font-family:'Baloo 2',sans-serif; font-weight:800; font-size:20px; color:#34691f;\">Instrument &amp; analytics<\u002Fdiv>\n    <div style=\"flex:1; height:1px; background:#cdddb8;\"><\u002Fdiv>\n    <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#8a9a78;\">extension for the dense analytics dashboard<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ READING THE SIGNAL ============ -->\n  <div style=\"background:#ffffff; border:1px solid #e3e9d8; border-radius:22px; padding:40px;\">\n    <div style=\"display:flex; align-items:baseline; justify-content:space-between; margin-bottom:8px;\">\n      <h2 style=\"font-family:'Baloo 2',sans-serif; font-weight:700; font-size:30px; color:#1e2a18; margin:0;\">Reading the signal<\u002Fh2>\n      <span class=\"sd-sec-label\">09 · Data model<\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"font-size:15px; color:#6f7e62; margin:0 0 24px; max-width:680px;\">A correction the dashboard team is right to insist on: the trustworthy value is <strong>raw ADC counts<\u002Fstrong> and the <strong>calibrated band<\u002Fstrong> — not a percentage. A 0–100 figure is shown only as a clearly-labelled <em>relative index<\u002Fem> between the wet and dry calibration anchors, never dressed up as VWC. Every readout therefore carries three layers.<\u002Fp>\n\n    <!-- readout model -->\n    <div style=\"display:grid; grid-template-columns:1.05fr 1fr 1fr; gap:16px; margin-bottom:18px;\">\n      <div style=\"background:#1b2417; border:1px solid #283322; border-radius:18px; padding:22px; display:flex; gap:18px; align-items:center;\">\n        <div style=\"position:relative; width:120px; height:120px; border-radius:50%; background:conic-gradient(#34a853 0deg 248deg,#283322 248deg 360deg); flex-shrink:0;\">\n          <div style=\"position:absolute; inset:11px; border-radius:50%; background:#101a0d; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px;\">\n            <span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#7c8a72;\">RAW<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',monospace; font-size:27px; font-weight:600; color:#eaf2e0; line-height:1;\">1830<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',monospace; font-size:10px; color:#7c8a72;\">counts<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"display:inline-flex; align-items:center; gap:6px; background:rgba(52,168,83,0.14); border:1px solid rgba(52,168,83,0.3); border-radius:999px; padding:5px 12px; margin-bottom:10px;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#34a853;\"><\u002Fspan><span style=\"font-family:'Baloo 2',sans-serif; font-weight:700; font-size:14px; color:#9ee04a;\">Moist<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#9fb094; line-height:1.7;\">index <span style=\"color:#eaf2e0;\">68<\u002Fspan> <span style=\"color:#5f6e55;\">/100<\u002Fspan><br><span style=\"font-size:10px; color:#5f6e55;\">relative · not VWC<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#f7faf2; border:1px solid #e3e9d8; border-radius:18px; padding:20px;\">\n        <div style=\"font-family:'Baloo 2',sans-serif; font-weight:700; font-size:16px; color:#1e2a18; margin-bottom:6px;\">Raw counts — the truth<\u002Fdiv>\n        <p style=\"font-size:13.5px; color:#6f7e62; line-height:1.55; margin:0;\">The instrument value. Inverted ADC (higher = drier). Always available in mono, to 0 decimals. This drives nothing visual on its own but anchors every other layer and the calibration.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#f7faf2; border:1px solid #e3e9d8; border-radius:18px; padding:20px;\">\n        <div style=\"font-family:'Baloo 2',sans-serif; font-weight:700; font-size:16px; color:#1e2a18; margin-bottom:6px;\">Band — the meaning<\u002Fdiv>\n        <p style=\"font-size:13.5px; color:#6f7e62; line-height:1.55; margin:0;\">The honest state. One of seven calibrated bands drives the mood, status color and any automation. <strong>Mood is keyed to band, never to %.<\u002Fstrong><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 7-band scale -->\n    <div class=\"sd-sec-label\" style=\"margin:24px 0 12px;\">The seven bands · wet → dry <span style=\"color:#b3bfa6; text-transform:none; letter-spacing:0;\">(raw ranges are placeholders — set per-pin at calibration)<\u002Fspan><\u002Fdiv>\n    <div style=\"border:1px solid #e3e9d8; border-radius:14px; overflow:hidden;\">\n      <div style=\"display:grid; grid-template-columns:18px 1.1fr 1fr 0.8fr 1.3fr; gap:0; background:#f7faf2; border-bottom:1px solid #e3e9d8; padding:9px 14px 9px 0; font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:0.06em; color:#8a9a78;\"><span><\u002Fspan><span>BAND<\u002Fspan><span>RAW COUNTS<\u002Fspan><span>INDEX<\u002Fspan><span>MOOD MAPPING<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:18px 1.1fr 1fr 0.8fr 1.3fr; align-items:center; padding:10px 14px 10px 0; border-bottom:1px solid #eef2e6;\"><span style=\"height:100%; background:#0e7a86;\"><\u002Fspan><span style=\"font-family:'Hanken Grotesk',sans-serif; font-weight:700; font-size:13px; color:#1e2a18; padding-left:12px;\">Saturated<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#4a5740;\">≤ 1300<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#4a5740;\">96–100<\u002Fspan><span style=\"font-size:12.5px; color:#6f7e62;\">Soggy · ease off<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:18px 1.1fr 1fr 0.8fr 1.3fr; align-items:center; padding:10px 14px 10px 0; border-bottom:1px solid #eef2e6;\"><span style=\"height:100%; background:#17b6c4;\"><\u002Fspan><span style=\"font-family:'Hanken Grotesk',sans-serif; font-weight:700; font-size:13px; color:#1e2a18; padding-left:12px;\">Wet<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#4a5740;\">1300–1600<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#4a5740;\">80–95<\u002Fspan><span style=\"font-size:12.5px; color:#6f7e62;\">Drinking / fresh<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:18px 1.1fr 1fr 0.8fr 1.3fr; align-items:center; padding:10px 14px 10px 0; border-bottom:1px solid #eef2e6;\"><span style=\"height:100%; background:#34a853;\"><\u002Fspan><span style=\"font-family:'Hanken Grotesk',sans-serif; font-weight:700; font-size:13px; color:#1e2a18; padding-left:12px;\">Moist<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#4a5740;\">1600–1900<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#4a5740;\">62–79<\u002Fspan><span style=\"font-size:12.5px; color:#1f6b33; font-weight:600;\">Thriving<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:18px 1.1fr 1fr 0.8fr 1.3fr; align-items:center; padding:10px 14px 10px 0; border-bottom:1px solid #eef2e6;\"><span style=\"height:100%; background:#8bd24f;\"><\u002Fspan><span style=\"font-family:'Hanken Grotesk',sans-serif; font-weight:700; font-size:13px; color:#1e2a18; padding-left:12px;\">Ideal<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#4a5740;\">1900–2200<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#4a5740;\">48–61<\u002Fspan><span style=\"font-size:12.5px; color:#456b1f; font-weight:600;\">Content<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:18px 1.1fr 1fr 0.8fr 1.3fr; align-items:center; padding:10px 14px 10px 0; border-bottom:1px solid #eef2e6;\"><sp argin-bottom:4px;\">5<\u002Fspan><div style=\"width:100%; height:12%; background:#e8703a; border-radius:4px 4px 0 0;\"><\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;\"><span style=\"font-family:'JetBrains Mono',monospace; font-size:10px; color:#6f7e62; margin-bottom:4px;\">1<\u002Fspan><div style=\"width:100%; height:4%; background:#e0483d; border-radius:4px 4px 0 0;\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:8px; margin-top:8px;\">\n          <span style=\"flex:1; text-align:center; font-family:'JetBrains Mono',monospace; font-size:9px; color:#8a9a78;\">Sat<\u002Fspan>\n          <span style=\"flex:1; text-align:center; font-family:'JetBrains Mono',monospace; font-size:9px; color:#8a9a78;\">Wet<\u002Fspan>\n          <span style=\"flex:1; text-align:center; font-family:'JetBrains Mono',monospace; font-size:9px; color:#8a9a78;\">Moist<\u002Fspan>\n          <span style=\"flex:1; text-align:center; font-family:'JetBrains Mono',monospace; font-size:9px; color:#247a3a; font-weight:600;\">Ideal<\u002Fspan>\n          <span style=\"flex:1; text-align:center; font-family:'JetBrains Mono',monospace; font-size:9px; color:#8a9a78;\">Dry-<\u002Fspan>\n          <span style=\"flex:1; text-align:center; font-family:'JetBrains Mono',monospace; font-size:9px; color:#8a9a78;\">Dry<\u002Fspan>\n          <span style=\"flex:1; text-align:center; font-family:'JetBrains Mono',monospace; font-size:9px; color:#8a9a78;\">Parch<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-size:12.5px; color:#6f7e62; margin-top:14px; line-height:1.5;\">Sits in <strong style=\"color:#247a3a;\">Ideal/Moist 69%<\u002Fstrong> of the time — a well-tuned channel.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- quality strip -->\n      <div style=\"background:#fbfdf8; border:1px solid #e3e9d8; border-radius:16px; padding:20px;\">\n        <div style=\"font-family:'Hanken Grotesk',sans-serif; font-weight:700; font-size:15px; color:#1e2a18;\">Signal integrity<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#8a9a78; margin-bottom:18px;\">CH01 · quality flag · 24h<\u002Fdiv>\n        <!-- timeline -->\n        <div style=\"display:flex; height:30px; border-radius:7px; overflow:hidden; gap:1.5px;\">\n          <div style=\"flex:32; background:#34a853;\"><\u002Fdiv>\n          <div style=\"flex:5; background:#f5a623;\"><\u002Fdiv>\n          <div style=\"flex:18; background:#34a853;\"><\u002Fdiv>\n          <div style=\"flex:3; background:#17b6c4;\"><\u002Fdiv>\n          <div style=\"flex:14; background:#34a853;\"><\u002Fdiv>\n          <div style=\"flex:4; background:#9a8480;\"><\u002Fdiv>\n          <div style=\"flex:24; background:#34a853;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; justify-content:space-between; font-family:'JetBrains Mono',monospace; font-size:10px; color:#8a9a78; margin-top:6px;\"><span>00:00<\u002Fspan><span>06:00<\u002Fspan><span>12:00<\u002Fspan><span>18:00<\u002Fspan><span>now<\u002Fspan><\u002Fdiv>\n        <!-- legend -->\n        <div style=\"display:flex; flex-wrap:wrap; gap:12px; margin-top:14px; font-family:'JetBrains Mono',monospace; font-size:10.5px; color:#6f7e62;\">\n          <span style=\"display:inline-flex; align-items:center; gap:5px;\"><span style=\"width:9px; height:9px; border-radius:2px; background:#34a853;\"><\u002Fspan>OK 92%<\u002Fspan>\n          <span style=\"display:inline-flex; align-items:center; gap:5px;\"><span style=\"width:9px; height:9px; border-radius:2px; background:#f5a623;\"><\u002Fspan>SUSPECT 5%<\u002Fspan>\n          <span style=\"display:inline-flex; align-items:center; gap:5px;\"><span style=\"width:9px; height:9px; border-radius:2px; background:#17b6c4;\"><\u002Fspan>SAT 1%<\u002Fspan>\n          <span style=\"display:inline-flex; align-items:center; gap:5px;\"><span style=\"width:9px; height:9px; border-radius:2px; background:#9a8480;\"><\u002Fspan>NO_SIGNAL 2%<\u002Fspan>\n        <\u002Fdiv>\n        <!-- health stats -->\n        <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:18px; padding-top:16px; border-top:1px solid #eef2e6;\">\n          <div><div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#8a9a78;\">NOISE σ<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:600; color:#1e2a18;\">±8<\u002Fdiv><div style=\"font-size:11px; color:#247a3a;\">low<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#8a9a78;\">SPREAD<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:600; color:#1e2a18;\">42<\u002Fdiv><div style=\"font-size:11px; color:#247a3a;\">stable<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#8a9a78;\">UPTIME<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:600; color:#1e2a18;\">98%<\u002Fdiv><div style=\"font-size:11px; color:#9a6410;\">1 dropout<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ ENGINEERING TOKENS ============ -->\n  <div style=\"background:#ffffff; border:1px solid #e3e9d8; border-radius:22px; padding:40px;\">\n    <div style=\"display:flex; align-items:baseline; justify-content:space-between; margin-bottom:8px;\">\n      <h2 style=\"font-family:'Baloo 2',sans-serif; font-weight:700; font-size:30px; color:#1e2a18; margin:0;\">Tokens for engineering<\u002Fh2>\n      <span class=\"sd-sec-label\">14 · Handoff<\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"font-size:15px; color:#6f7e62; margin:0 0 22px; max-width:680px;\">For the self-contained HTML/Chart.js dashboard: lift these as CSS custom properties and Chart.js color refs. Names match this document. Toggle <code style=\"font-family:'JetBrains Mono',monospace; font-size:12px; background:#eef4e6; padding:1px 5px; border-radius:4px;\">data-theme=\"dark\"<\u002Fcode> on the root for soil mode.<\u002Fp>\n\n    <div style=\"background:#101a0d; border:1px solid #283322; border-radius:14px; padding:24px; overflow-x:auto;\">\n      <pre style=\"margin:0; font-family:'JetBrains Mono',monospace; font-size:12px; line-height:1.7; color:#cfe0c2; white-space:pre;\"><span style=\"color:#7c8a72;\">/* Sprout · core tokens (light) */<\u002Fspan>\n<span style=\"color:#9ee04a;\">:root<\u002Fspan> {\n  <span style=\"color:#7c8a72;\">/* brand + neutrals */<\u002Fspan>\n  <span style=\"color:#82d0ff;\">--leaf<\u002Fspan>: <span style=\"color:#f5b942;\">#34A853<\u002Fspan>;   <span style=\"color:#82d0ff;\">--sprout<\u002Fspan>: <span style=\"color:#f5b942;\">#8BD24F<\u002Fspan>;   <span style=\"color:#82d0ff;\">--ink<\u002Fspan>: <span style=\"color:#f5b942;\">#1E2A18<\u002Fspan>;\n  <span style=\"color:#82d0ff;\">--muted<\u002Fspan>: <span style=\"color:#f5b942;\">#6F7E62<\u002Fspan>;  <span style=\"color:#82d0ff;\">--border<\u002Fspan>: <span style=\"color:#f5b942;\">#E3E9D8<\u002Fspan>;  <span style=\"color:#82d0ff;\">--surface<\u002Fspan>: <span style=\"color:#f5b942;\">#FFFFFF<\u002Fspan>;\n  <span style=\"color:#82d0ff;\">--surface-2<\u002Fspan>: <span style=\"color:#f5b942;\">#F7FAF2<\u002Fspan>; <span style=\"color:#82d0ff;\">--bg<\u002Fspan>: <span style=\"color:#f5b942;\">#EEF4E6<\u002Fspan>;\n  <span style=\"color:#7c8a72;\">/* status (state = color) */<\u002Fspan>\n  <span style=\"color:#82d0ff;\">--st-watering<\u002Fspan>: <span style=\"color:#f5b942;\">#17B6C4<\u002Fspan>;  <span style=\"color:#82d0ff;\">--st-dry<\u002Fspan>: <span style=\"color:#f5b942;\">#F5A623<\u002Fspan>;   <span style=\"color:#82d0ff;\">--st-due<\u002Fspan>: <span style=\"color:#f5b942;\">#E8703A<\u002Fspan>;\n  <span style=\"color:#82d0ff;\">--st-fault<\u002Fspan>: <span style=\"color:#f5b942;\">#E0483D<\u002Fspan>;     <span style=\"color:#82d0ff;\">--st-predicted<\u002Fspan>: <span style=\"color:#f5b942;\">#7C5CFF<\u002Fspan>;\n  <span style=\"color:#7c8a72;\">/* 7 bands (wet -&gt; dry) */<\u002Fspan>\n  <span style=\"color:#82d0ff;\">--band-saturated<\u002Fspan>: <span style=\"color:#f5b942;\">#0E7A86<\u002Fspan>; <span style=\"color:#82d0ff;\">--band-wet<\u002Fspan>: <span style=\"color:#f5b942;\">#17B6C4<\u002Fspan>;  <span style=\"color:#82d0ff;\">--band-moist<\u002Fspan>: <span style=\"color:#f5b942;\">#34A853<\u002Fspan>;\n  <span style=\"color:#82d0ff;\">--band-ideal<\u002Fspan>: <span style=\"color:#f5b942;\">#8BD24F<\u002Fspan>;     <span style=\"color:#82d0ff;\">--band-drying<\u002Fspan>: <span style=\"color:#f5b942;\">#F5A623<\u002Fspan>; <span style=\"color:#82d0ff;\">--band-dry<\u002Fspan>: <span style=\"color:#f5b942;\">#E8703A<\u002Fspan>;\n  <span style=\"color:#82d0ff;\">--band-parched<\u002Fspan>: <span style=\"color:#f5b942;\">#E0483D<\u002Fspan>;\n  <span style=\"color:#7c8a72;\">/* quality flags */<\u002Fspan>\n  <span style=\"color:#82d0ff;\">--q-ok<\u002Fspan>: <span style=\"color:#f5b942;\">#34A853<\u002Fspan>; <span style=\"color:#82d0ff;\">--q-suspect<\u002Fspan>: <span style=\"color:#f5b942;\">#F5A623<\u002Fspan>; <span style=\"color:#82d0ff;\">--q-saturated<\u002Fspan>: <span style=\"color:#f5b942;\">#17B6C4<\u002Fspan>; <span style=\"color:#82d0ff;\">--q-nosignal<\u002Fspan>: <span style=\"color:#f5b942;\">#9A8480<\u002Fspan>;\n  <span style=\"color:#7c8a72;\">/* type */<\u002Fspan>\n  <span style=\"color:#82d0ff;\">--font-display<\u002Fspan>: <span style=\"color:#f5b942;\">\"Baloo 2\"<\u002Fspan>; <span style=\"color:#82d0ff;\">--font-ui<\u002Fspan>: <span style=\"color:#f5b942;\">\"Hanken Grotesk\"<\u002Fspan>; <span style=\"color:#82d0ff;\">--font-data<\u002Fspan>: <span style=\"color:#f5b942;\">\"JetBrains Mono\"<\u002Fspan>;\n  <span style=\"color:#7c8a72;\">/* shape + space (4px base) */<\u002Fspan>\n  <span style=\"color:#82d0ff;\">--r-control<\u002Fspan>: <span style=\"color:#f5b942;\">8px<\u002Fspan>; <span style=\"color:#82d0ff;\">--r-tile<\u002Fspan>: <span style=\"color:#f5b942;\">14px<\u002Fspan>; <span style=\"color:#82d0ff;\">--r-card<\u002Fspan>: <span style=\"color:#f5b942;\">20px<\u002Fspan>; <span style=\"color:#82d0ff;\">--r-pill<\u002Fspan>: <span style=\"color:#f5b942;\">999px<\u002Fspan>;\n  <span style=\"color:#82d0ff;\">--e1<\u002Fspan>: <span style=\"color:#f5b942;\">0 1px 2px rgba(30,42,24,.06)<\u002Fspan>;  <span style=\"color:#82d0ff;\">--e2<\u002Fspan>: <span style=\"color:#f5b942;\">0 6px 18px rgba(30,42,24,.08)<\u002Fspan>;\n}\n<span style=\"color:#7c8a72;\">/* soil mode */<\u002Fspan>\n<span style=\"color:#9ee04a;\">[data-theme=\"dark\"]<\u002Fspan> {\n  <span style=\"color:#82d0ff;\">--ink<\u002Fspan>: <span style=\"color:#f5b942;\">#EAF2E0<\u002Fspan>;   <span style=\"color:#82d0ff;\">--muted<\u002Fspan>: <span style=\"color:#f5b942;\">#7C8A72<\u002Fspan>;   <span style=\"color:#82d0ff;\">--border<\u002Fspan>: <span style=\"color:#f5b942;\">#283322<\u002Fspan>;\n  <span style=\"color:#82d0ff;\">--surface<\u002Fspan>: <span style=\"color:#f5b942;\">#1B2417<\u002Fspan>; <span style=\"color:#82d0ff;\">--surface-2<\u002Fspan>: <span style=\"color:#f5b942;\">#121A0E<\u002Fspan>; <span style=\"color:#82d0ff;\">--bg<\u002Fspan>: <span style=\"color:#f5b942;\">#0E140B<\u002Fspan>;\n  <span style=\"color:#82d0ff;\">--leaf<\u002Fspan>: <span style=\"color:#f5b942;\">#9EE04A<\u002Fspan>; <span style=\"color:#82d0ff;\">--st-watering<\u002Fspan>: <span style=\"color:#f5b942;\">#3FD0DE<\u002Fspan>; <span style=\"color:#82d0ff;\">--st-fault<\u002Fspan>: <span style=\"color:#f5b942;\">#FF6B5E<\u002Fspan>;\n  <span style=\"color:#7c8a72;\">/* glow accents: add 0 0 8px currentColor on live dots */<\u002Fspan>\n}<\u002Fpre>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:18px;\">\n      <div style=\"background:#f7faf2; border:1px solid #e3e9d8; border-radius:14px; padding:18px;\">\n        <div style=\"font-family:'Hanken Grotesk',sans-serif; font-weight:700; font-size:14px; color:#1e2a18; margin-bottom:8px;\">Chart.js notes<\u002Fdiv>\n        <ul style=\"margin:0; padding-left:18px; font-size:13px; line-height:1.6; color:#4a5740;\">\n          <li>Per-channel line color is fixed: CH1 <code style=\"font-family:'JetBrains Mono',monospace;\">--leaf<\u002Fcode>, CH2 <code style=\"font-family:'JetBrains Mono',monospace;\">--st-watering<\u002Fcode>, CH3 <code style=\"font-family:'JetBrains Mono',monospace;\">--st-dry<\u002Fcode>.<\u002Fli>\n          <li>Prediction = same color, <code style=\"font-family:'JetBrains Mono',monospace;\">borderDash:[3,5]<\u002Fcode>.<\u002Fli>\n          <li>Zone tints &amp; deadband → <code style=\"font-family:'JetBrains Mono',monospace;\">annotation<\u002Fcode> box plugin at 8–16% alpha.<\u002Fli>\n          <li>Tension <code style=\"font-family:'JetBrains Mono',monospace;\">0.35<\u002Fcode>, border <code style=\"font-family:'JetBrains Mono',monospace;\">2.6<\u002Fcode>, no point markers except events.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div style=\"background:#f7faf2; border:1px solid #e3e9d8; border-radius:14px; padding:18px;\">\n        <div style=\"font-family:'Hanken Grotesk',sans-serif; font-weight:700; font-size:14px; color:#1e2a18; margin-bottom:8px;\">Rules of thumb<\u002Fdiv>\n        <ul style=\"margin:0; padding-left:18px; font-size:13px; line-height:1.6; color:#4a5740;\">\n          <li>Every number uses <code style=\"font-family:'JetBrains Mono',monospace;\">--font-data<\u002Fcode>, right-aligned, tabular.<\u002Fli>\n          <li>Band color names the meaning — never recolor a band.<\u002Fli>\n          <li>Gauges show <strong>raw + band<\u002Fstrong>; any 0–100 is labelled “index”.<\u002Fli>\n          <li>Mood derives from <strong>band<\u002Fstrong>, not from the index.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ FOOTER ============ -->\n  <div style=\"display:flex; align-items:center; justify-content:space-between; padding:6px 8px;\">\n    <div style=\"display:flex; align-items:center; gap:10px;\"><svg width=\"22\" height=\"26\" viewBox=\"0 0 24 28\" fill=\"#8bd24f\" stroke=\"#247a3a\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 26 V12\" fill=\"none\"><\u002Fpath><path d=\"M12 13 C8 11 6 8 7 5 C11 6 12 10 12 13 Z\"><\u002Fpath><path d=\"M12 13 C16 11 18 8 17 5 C13 6 12 10 12 13 Z\" fill=\"#34a853\"><\u002Fpath><\u002Fsvg><span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#8a9a78;\">SPROUT · DESIGN SYSTEM v1 · built for React + TypeScript + Tailwind<\u002Fspan><\u002Fdiv>\n    <span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#b3bfa6;\">tend well.<\u002Fspan>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1248,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = { moisture: 62 };\n\n  moodFor(m) {\n    if (m >= 70) return { key:'thriving', label:'Thriving',        ring:'#34a853', color:'#247a3a', soft:'#dff0cc', text:'#1f6b33', micro:'Lush and steady — no action needed.' };\n    if (m >= 48) return { key:'content',  label:'Content',         ring:'#8bd24f', color:'#5a8e2a', soft:'#e8f4d6', text:'#456b1f', micro:'Comfortable, sipping slowly.' };\n    if (m >= 34) return { key:'thirsty',  label:'Getting thirsty', ring:'#f5a623', color:'#b07d12', soft:'#fbe7c4', text:'#9a6410', micro:'Could use a drink before long.' };\n    if (m >= 18) return { key:'parched',  label:'Thirsty',         ring:'#e8703a', color:'#c2561f', soft:'#fad9c8', text:'#a3461a', micro:'Ready for water now.' };\n    return            { key:'critical', label:'Parched',         ring:'#e0483d', color:'#c0392e', soft:'#fad6d2', text:'#a32a22', micro:'Needs water urgently.' };\n  }\n\n  renderVals() {\n    const m = this.state.moisture;\n    const mood = this.moodFor(m);\n    const deg = Math.round(m * 3.6);\n    return {\n      moisture: m,\n      pct: m + '%',\n      setMoisture: (e) => this.setState({ moisture: Number(e.target.value) }),\n      water: () => this.setState({ moisture: 82 }),\n      dry: () => this.setState({ moisture: 22 }),\n      moodLabel: mood.label,\n      moodColor: mood.color,\n      moodSoft: mood.soft,\n      moodText: mood.text,\n      moodMicro: mood.micro,\n      ringStyle: `conic-gradient(${mood.ring} 0deg ${deg}deg, #e7eede ${deg}deg 360deg)`,\n      isPerky: mood.key === 'thriving' || mood.key === 'content',\n      isThirsty: mood.key === 'thirsty',\n      isDroop: mood.key === 'parched' || mood.key === 'critical'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Sprout Design System.dc"}
